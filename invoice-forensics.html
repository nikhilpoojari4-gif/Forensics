<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forensic Audit — Invoice Examination Suite</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
    font-feature-settings: "cv11","ss01","ss03";
    -webkit-font-smoothing: antialiased;
    color: #0b1220;
    background: #f5f7fa;
    font-size: 14px;
    line-height: 1.5;
  }
  .mono { font-family: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; font-size: 12.5px; }
  button { font-family: inherit; font-size: inherit; }

  /* Boot screen */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at top, #0f172a 0%, #060b18 80%);
    color: #e2e8f0; z-index: 9999;
    transition: opacity .4s ease;
    flex-direction: column; padding: 32px;
  }
  #boot.hidden { opacity: 0; pointer-events: none; }
  #boot .brand {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 32px;
  }
  #boot .brand-mark {
    width: 44px; height: 44px;
    border: 1.5px solid rgba(148,163,184,.4);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(148,163,184,.06);
  }
  #boot .brand-mark svg { width: 22px; height: 22px; stroke: #94a3b8; }
  #boot h1 { margin: 0; font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
  #boot .brand-sub { margin: 2px 0 0; font-size: 12.5px; color: #64748b; letter-spacing: 0.02em; }
  #boot .status { font-size: 13px; color: #94a3b8; margin-bottom: 20px; letter-spacing: 0.02em; }
  #boot .bar { width: 360px; height: 4px; background: rgba(148,163,184,.12); border-radius: 2px; overflow: hidden; }
  #boot .bar-fill { height: 100%; background: #22d3ee; transition: width .3s ease; width: 0%; }
  #boot .libs {
    margin-top: 24px; font-size: 11.5px; font-family: ui-monospace, Menlo, monospace;
    color: #64748b; min-width: 360px;
  }
  #boot .libs > div {
    display: flex; align-items: center; gap: 10px;
    padding: 3px 0; letter-spacing: 0.02em;
  }
  #boot .libs .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #475569; transition: background .2s;
    flex-shrink: 0;
  }
  #boot .libs .ok     .dot { background: #22c55e; }
  #boot .libs .err    .dot { background: #ef4444; }
  #boot .libs .pending .dot { background: #f59e0b; animation: pulse 1.4s infinite; }
  #boot .libs .ok { color: #94a3b8; }
  #boot .libs .err { color: #fca5a5; }
  #boot .libs .pending { color: #fcd34d; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  #boot .err-box {
    max-width: 520px; margin-top: 24px; padding: 16px 18px;
    background: rgba(239,68,68,.08);
    border: 1px solid rgba(239,68,68,.3);
    border-radius: 8px; font-size: 13px; display: none;
    color: #fca5a5; line-height: 1.6;
  }
  #boot .err-box strong { color: #fecaca; }
  #boot .err-box code {
    background: rgba(0,0,0,.3); padding: 1px 6px; border-radius: 3px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11.5px;
  }
</style>
</head>
<body>

<div id="boot">
  <div class="brand">
    <div class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2 L4 6 v6 c0 5 3.5 9 8 10 4.5 -1 8 -5 8 -10 V6 z"/>
        <path d="M9 12 l2 2 4 -4"/>
      </svg>
    </div>
    <div>
      <h1>Forensic Audit Suite</h1>
      <p class="brand-sub">Invoice examination & anti-fraud analysis</p>
    </div>
  </div>
  <div class="status" id="boot-sub">Loading analysis libraries…</div>
  <div class="bar"><div class="bar-fill" id="boot-bar"></div></div>
  <div class="libs" id="boot-libs"></div>
  <div class="err-box" id="boot-err"></div>
</div>

<div id="root"></div>

<!-- =================================================================
     LIBRARY LOADER — verified URLs + multi-mirror fallback
     ================================================================= -->
<script>
(function() {
  "use strict";

  const LIBS = [
    { name: "React", check: () => window.React,
      urls: [
        "https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js",
        "https://unpkg.com/react@18.3.1/umd/react.production.min.js",
      ] },
    { name: "ReactDOM", check: () => window.ReactDOM,
      urls: [
        "https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js",
        "https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js",
      ] },
    { name: "Babel", check: () => window.Babel,
      urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.28.4/babel.min.js",
        "https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js",
        "https://unpkg.com/@babel/standalone@7/babel.min.js",
      ] },
    { name: "PDF.js", check: () => window.pdfjsLib,
      urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js",
        "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js",
        "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js",
      ] },
    { name: "Tesseract.js", check: () => window.Tesseract,
      urls: [
        "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js",
        "https://unpkg.com/tesseract.js@5/dist/tesseract.min.js",
      ] },
    { name: "exifr", check: () => window.exifr,
      urls: [
        "https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js",
        "https://unpkg.com/exifr/dist/lite.umd.js",
      ] },
    { name: "jsPDF", check: () => window.jspdf,
      urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js",
        "https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js",
      ] },
    { name: "Chart.js", check: () => window.Chart,
      urls: [
        "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js",
        "https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js",
      ] },
    { name: "jsQR", check: () => window.jsQR,
      urls: [
        "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js",
        "https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js",
      ] },
    { name: "SheetJS", check: () => window.XLSX,
      urls: [
        "https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js",
        "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
      ] },
    { name: "PptxGenJS", check: () => window.PptxGenJS,
      urls: [
        "https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js",
      ] },
  ];

  const PDFJS_WORKER_URLS = [
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js",
    "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js",
    "https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js",
  ];

  // Inject Tailwind via CDN (styles only; no global needed)
  const tw = document.createElement("script");
  tw.src = "https://cdn.tailwindcss.com";
  document.head.appendChild(tw);

  const bootLibs = document.getElementById("boot-libs");
  const bootBar = document.getElementById("boot-bar");
  const bootSub = document.getElementById("boot-sub");
  const bootErr = document.getElementById("boot-err");

  const statusEls = {};
  for (const L of LIBS) {
    const d = document.createElement("div");
    d.className = "pending";
    d.innerHTML = `<span class="dot"></span><span>${L.name}</span>`;
    statusEls[L.name] = d;
    bootLibs.appendChild(d);
  }
  function setStatus(name, state, extra) {
    statusEls[name].className = state;
    statusEls[name].innerHTML = `<span class="dot"></span><span>${name}${extra ? " · " + extra : ""}</span>`;
  }

  function loadScriptOnce(url) {
    return new Promise((resolve, reject) => {
      const s = document.createElement("script");
      s.src = url; s.async = false;
      s.onload = () => resolve();
      s.onerror = () => reject(new Error(`Network error: ${url}`));
      document.head.appendChild(s);
    });
  }

  async function loadOne(L) {
    if (L.check()) { setStatus(L.name, "ok"); return; }
    let lastErr;
    for (let i = 0; i < L.urls.length; i++) {
      const url = L.urls[i];
      const cdn = new URL(url).hostname.replace("cdn.","").replace("www.","");
      setStatus(L.name, "pending", i === 0 ? cdn : `mirror ${i} · ${cdn}`);
      try {
        await loadScriptOnce(url);
        await new Promise(r => setTimeout(r, 25));
        if (L.check()) { setStatus(L.name, "ok"); return; }
        lastErr = new Error(`global missing after load from ${cdn}`);
      } catch (err) { lastErr = err; }
    }
    setStatus(L.name, "err", "all mirrors failed");
    throw lastErr || new Error(`${L.name} failed`);
  }

  async function boot() {
    let done = 0;
    for (const L of LIBS) {
      try { await loadOne(L); }
      catch (err) {
        bootErr.style.display = "block";
        bootErr.innerHTML =
          `<strong>Could not load ${L.name}</strong><br>` +
          `<span style="opacity:.8">${err.message}</span><br><br>` +
          `Tried all ${L.urls.length} mirror${L.urls.length === 1 ? "" : "s"}.<br><br>` +
          `<strong>Try:</strong> connecting to the internet, allowlisting <code>cdnjs.cloudflare.com</code>, <code>cdn.jsdelivr.net</code>, and <code>unpkg.com</code>, or disabling script blockers for this page.`;
        return;
      }
      done++;
      bootBar.style.width = `${(done / LIBS.length) * 100}%`;
    }

    bootSub.textContent = "Initializing PDF engine…";
    const loadedPdf = [...document.scripts].reverse().find(s =>
      s.src && /pdf\.min\.js/.test(s.src) && /pdfjs-dist|pdf\.js/.test(s.src));
    let workerUrl = PDFJS_WORKER_URLS[0];
    if (loadedPdf) {
      if (loadedPdf.src.includes("jsdelivr")) workerUrl = PDFJS_WORKER_URLS[1];
      else if (loadedPdf.src.includes("unpkg")) workerUrl = PDFJS_WORKER_URLS[2];
    }
    pdfjsLib.GlobalWorkerOptions.workerSrc = workerUrl;

    bootSub.textContent = "Starting…";
    window.dispatchEvent(new Event("if-libs-ready"));
  }

  boot();
})();
</script>

<!-- =================================================================
     FORENSIC ENGINE — corrected thresholds so genuine invoices
     get verified clean, and only real anomalies get highlighted.
     ================================================================= -->
<script>
window.IF = (function() {
  "use strict";
  const IF = {};

  // ============================================================
  // DETECTION THRESHOLDS — calibrated so that:
  //  - Clean scans don't trigger findings
  //  - Only genuine anomalies produce boxes
  //  - Each detector has a "trigger" threshold (below = silent)
  //    and a "strong" threshold (above = high-severity finding)
  // ============================================================
  IF.THRESHOLDS = {
    ela:             { trigger: 55, strong: 75, boxMin: 70 },
    sensor_pattern:  { trigger: 45, strong: 70, zScore: 3.0 },
    copy_move:       { trigger: 45, strong: 65, minMatches: 80 },
    typography:      { trigger: 30, strong: 55 },
    ai:              { trigger: 55, strong: 75 },
    pdf_structure:   { trigger: 40, strong: 70 },
    jpeg_ghost:      { trigger: 50, strong: 75 },
    benford:         { trigger: 50, strong: 75, minItems: 15 },
    double_compress: { trigger: 50, strong: 75 },
    alignment:       { trigger: 50, strong: 70 },
  };

  IF.DEFAULT_CHECKS = {
    metadata: true, ela: true, sensor_pattern: true, copy_move: true,
    typography: true, ocr: true, duplicate: true, content: true,
    ai_detect: true, pdf_structure: true, qr_code: true,
    jpeg_ghost: true, benford: true, double_compress: true, alignment: true,
  };
  IF.CHECK_LABELS = {
    metadata:        "Metadata forensics",
    ela:             "Compression residual analysis (ELA)",
    sensor_pattern:  "Sensor pattern analysis",
    copy_move:       "Copy-move forgery detection",
    typography:      "Typography coherence analysis",
    ocr:             "Text extraction (OCR)",
    duplicate:       "Duplicate detection",
    content:         "Content & field validation",
    ai_detect:       "Synthetic document detection",
    pdf_structure:   "PDF edit-history analysis",
    qr_code:         "QR code authenticity",
    jpeg_ghost:      "JPEG ghost analysis",
    benford:         "Benford's Law check",
    double_compress: "Double-compression detection",
    alignment:       "Baseline alignment analysis",
  };
  IF.CHECK_DESCRIPTIONS = {
    metadata:        "Examines EXIF, XMP and PDF metadata for traces of editing software (Photoshop, Canva, Acrobat Pro), timestamp mismatches between creation and modification, and suspicious absences of producer information. Strong indicator when tampering was done carelessly.",
    ela:             "Error Level Analysis — re-saves the image at a known JPEG quality and measures the per-pixel difference against the original. Regions that were previously saved at a different quality (i.e., pasted from elsewhere) show elevated residuals. The classic splice-detection technique.",
    sensor_pattern:  "Every camera/scanner leaves a uniform noise pattern across its output. This check divides the page into blocks and measures each block's noise statistics. Regions pasted from a different source rarely match the host's sensor profile, so outlier blocks reveal composited content.",
    copy_move:       "Finds blocks duplicated within the same page — a common forgery where an attacker clones a 'paid' stamp, signature, or logo and pastes it over a different area. Uses feature signatures per block and matches across the whole image, requiring distant spatial separation so adjacent similar blocks don't false-positive.",
    typography:      "Inspects the height of each OCR-recognized word against the median height of its text line. Retyped numbers or pasted characters often use a slightly different font or size; this deviation is invisible to the eye but measurable. Strong for detecting altered amounts or dates.",
    ocr:             "Extracts text with Tesseract.js so downstream checks can validate fields, detect font anomalies, match against historical archives, and use OCR confidence as a synthetic-document signal. Required for content, typography, and field-level duplicate checks.",
    duplicate:       "Three-tier comparison against your case archive: SHA-256 for byte-identical resubmission (critical), 64-bit perceptual hash for visually similar documents even after re-scanning or cropping, and fuzzy matching on vendor + amount + invoice number.",
    content:         "Validates extracted fields. Verifies GSTIN mod-36 checksum (fabricated GSTINs rarely pass), reconciles line-item sum against stated total, checks for missing standard fields, and flags dates that are in the future.",
    ai_detect:       "Combines four indicators of machine-generated documents: near-zero scanner noise, abnormally small color palette, uniformly high OCR confidence (real scans have variable confidence), and complete metadata absence. Works on AI-image generators and fully-digital fabricated invoices.",
    pdf_structure:   "Parses the PDF byte stream for edit markers. Multiple '%%EOF' tokens reveal incremental saves (a legitimate PDF written once has exactly one). Cross-reference '/Prev' entries expose the edit chain. Detects post-creation modifications even when metadata was scrubbed.",
    qr_code:         "Decodes any QR code found on the page and validates its contents. For Indian GST e-invoices: parses the NIC-signed JWT, cross-references IRN, GSTIN, invoice number, date, and amount against what OCR extracted. Mismatches suggest the QR was lifted from a different invoice.",
    jpeg_ghost:      "Re-compresses the image across multiple JPEG qualities (50-95) and measures where the residual energy drops to near-zero. A single-history JPEG converges uniformly; a spliced region shows 'ghost' artifacts at its original compression level, isolating it from the host image.",
    benford:         "First-digit frequencies in naturally occurring line-item amounts follow Benford's Law (1 is most common, 9 least). Fabricated numbers — especially round or sequential amounts — deviate significantly. Requires at least 8 line items to be statistically meaningful.",
    double_compress: "Examines the DCT coefficient histogram for periodic peaks. A JPEG compressed exactly once shows a smooth histogram; double-compression (save → edit → save again) introduces regular spikes. Complements ELA for photographs and scans.",
    alignment:       "Measures deviation of OCR baselines from the global text grid. Retyped or pasted text rarely lands exactly on the baseline of the surrounding text; even a 1-2 pixel offset betrays the edit. Reveals tampering the eye cannot see.",
  };

  IF.DEFAULT_WEIGHTS = {
    metadata: 0.20, visual: 0.30, content: 0.25, duplicate: 0.15, ai: 0.10,
  };

  // ============================================================
  // IndexedDB
  // ============================================================
  IF.db = (() => {
    const DB = "forensic_audit_v4";
    function open() {
      return new Promise((res, rej) => {
        const req = indexedDB.open(DB, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains("jobs")) {
            const s = db.createObjectStore("jobs", { keyPath: "id" });
            s.createIndex("sha256", "sha256");
            s.createIndex("phash", "phash");
            s.createIndex("created_at", "created_at");
          }
          if (!db.objectStoreNames.contains("reports"))
            db.createObjectStore("reports", { keyPath: "id" });
          if (!db.objectStoreNames.contains("settings"))
            db.createObjectStore("settings", { keyPath: "key" });
        };
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
      });
    }
    async function tx(store, mode, fn) {
      const db = await open();
      return new Promise((res, rej) => {
        const t = db.transaction(store, mode);
        const s = t.objectStore(store);
        const out = fn(s);
        t.oncomplete = () => res(out && out.result !== undefined ? out.result : out);
        t.onerror = () => rej(t.error);
      });
    }
    return {
      putJob:   r => tx("jobs","readwrite",  s => s.put(r)),
      getJob:   i => tx("jobs","readonly",   s => s.get(i)),
      allJobs:  () => tx("jobs","readonly",  s => s.getAll()),
      deleteJob: i => tx("jobs","readwrite", s => s.delete(i)),
      clearJobs: () => tx("jobs","readwrite", s => s.clear()),
      putReport: r => tx("reports","readwrite",  s => s.put(r)),
      getReport: i => tx("reports","readonly",   s => s.get(i)),
      deleteReport: i => tx("reports","readwrite", s => s.delete(i)),
      clearReports: () => tx("reports","readwrite", s => s.clear()),
      getSetting: k => tx("settings","readonly", s => s.get(k)),
      setSetting: (k, v) => tx("settings","readwrite", s => s.put({ key:k, value:v })),
    };
  })();

  // ============================================================
  // File classification
  // ============================================================
  IF.classifyFile = async function(file) {
    const ext = (file.name || "").toLowerCase().split(".").pop();
    if (["jpg","jpeg","png","webp","bmp","tif","tiff"].includes(ext)) return "image";
    if (ext === "pdf") {
      try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        let totalChars = 0;
        const n = Math.min(3, pdf.numPages);
        for (let i = 1; i <= n; i++) {
          const page = await pdf.getPage(i);
          const text = await page.getTextContent();
          totalChars += text.items.reduce((a,it) => a + (it.str || "").length, 0);
        }
        return totalChars > 40 ? "pdf_native" : "pdf_scanned";
      } catch { return "pdf_scanned"; }
    }
    return "unknown";
  };

  // Determine whether the source bytes are an actual JPEG (matters for
  // compression-history checks like JPEG ghost and double-compression which
  // are only meaningful on JPEG-origin files).
  IF.isJpegFile = async function(file, fileType) {
    if (fileType !== "image") return false;
    const ext = (file.name || "").toLowerCase().split(".").pop();
    if (ext === "jpg" || ext === "jpeg") return true;
    // Magic-byte sniff for files without canonical extension
    try {
      const head = new Uint8Array(await file.slice(0, 4).arrayBuffer());
      return head[0] === 0xFF && head[1] === 0xD8 && head[2] === 0xFF;
    } catch { return false; }
  };

  // ============================================================
  // Hashes
  // ============================================================
  IF.sha256 = async function(file) {
    const buf = await file.arrayBuffer();
    const h = await crypto.subtle.digest("SHA-256", buf);
    return [...new Uint8Array(h)].map(b => b.toString(16).padStart(2,"0")).join("");
  };

  IF.pHash = function(src) {
    const size = 32;
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const ctx = c.getContext("2d");
    ctx.drawImage(src, 0, 0, size, size);
    const px = ctx.getImageData(0, 0, size, size).data;
    const g = new Float64Array(size*size);
    for (let i = 0, j = 0; i < px.length; i += 4, j++)
      g[j] = 0.299*px[i] + 0.587*px[i+1] + 0.114*px[i+2];
    const cosTable = new Float64Array(size*size);
    for (let k = 0; k < size; k++)
      for (let n = 0; n < size; n++)
        cosTable[k*size+n] = Math.cos(((2*n+1)*k*Math.PI) / (2*size));
    const tmp = new Float64Array(size*size);
    for (let y = 0; y < size; y++)
      for (let k = 0; k < size; k++) {
        let s = 0;
        for (let n = 0; n < size; n++) s += g[y*size+n] * cosTable[k*size+n];
        tmp[y*size+k] = s;
      }
    const dct = new Float64Array(size*size);
    for (let x = 0; x < size; x++)
      for (let k = 0; k < size; k++) {
        let s = 0;
        for (let n = 0; n < size; n++) s += tmp[n*size+x] * cosTable[k*size+n];
        dct[k*size+x] = s;
      }
    const block = [];
    for (let y = 0; y < 8; y++)
      for (let x = 0; x < 8; x++)
        if (!(x === 0 && y === 0)) block.push(dct[y*size+x]);
    const sorted = [...block].sort((a,b) => a-b);
    const median = sorted[Math.floor(sorted.length/2)];
    let bits = "";
    for (let i = 0; i < 64; i++) {
      const v = i === 0 ? dct[0] : block[i-1];
      bits += v > median ? "1" : "0";
    }
    let hex = "";
    for (let i = 0; i < 64; i += 4) hex += parseInt(bits.slice(i,i+4),2).toString(16);
    return hex;
  };

  IF.hammingHex = function(a, b) {
    if (!a || !b || a.length !== b.length) return 64;
    const pc = [0,1,1,2,1,2,2,3,1,2,2,3,2,3,3,4];
    let d = 0;
    for (let i = 0; i < a.length; i++) d += pc[parseInt(a[i],16) ^ parseInt(b[i],16)];
    return d;
  };

  // ============================================================
  // Rendering
  // ============================================================
  IF.fileToImage = function(file) {
    return new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = () => rej(new Error("Failed to load image"));
      img.src = URL.createObjectURL(file);
    });
  };
  IF.pdfFirstPageToCanvas = async function(file, scale = 2.0) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);
    const vp = page.getViewport({ scale });
    const vp1 = page.getViewport({ scale: 1 });  // unscaled = page dimensions in pts
    const c = document.createElement("canvas");
    c.width = vp.width; c.height = vp.height;
    await page.render({ canvasContext: c.getContext("2d"), viewport: vp }).promise;
    return { canvas: c, numPages: pdf.numPages, pageWidthPt: vp1.width, pageHeightPt: vp1.height };
  };
  IF.imageToCanvas = function(img, maxDim = 1600) {
    const c = document.createElement("canvas");
    let { width, height } = img;
    if (Math.max(width, height) > maxDim) {
      const s = maxDim / Math.max(width, height);
      width = Math.round(width*s); height = Math.round(height*s);
    }
    c.width = width; c.height = height;
    c.getContext("2d").drawImage(img, 0, 0, width, height);
    return c;
  };

  // ============================================================
  // ELA — returns score + boxes ONLY if score exceeds trigger threshold
  // Each detector now returns `triggered: bool` so the pipeline knows
  // whether to surface boxes/findings or treat the detector as "clean".
  // ============================================================
  IF.ela = function(canvas, quality = 0.90, scale = 18) {
    return new Promise((resolve) => {
      const w = canvas.width, h = canvas.height;
      canvas.toBlob(async (blob) => {
        if (!blob) return resolve({ canvas: null, score: 0, boxes: [], triggered: false, measurements: {} });
        const recImg = await createImageBitmap(blob);
        const rec = document.createElement("canvas");
        rec.width = w; rec.height = h;
        rec.getContext("2d").drawImage(recImg, 0, 0, w, h);
        const a = canvas.getContext("2d").getImageData(0,0,w,h).data;
        const b = rec.getContext("2d").getImageData(0,0,w,h).data;
        const out = document.createElement("canvas");
        out.width = w; out.height = h;
        const outCtx = out.getContext("2d");
        const outData = outCtx.createImageData(w, h);
        let maxDiff = 1, sumDiff = 0;
        const diffs = new Float32Array(w*h);
        for (let i = 0, p = 0; i < a.length; i += 4, p++) {
          const d = Math.max(
            Math.abs(a[i]-b[i]), Math.abs(a[i+1]-b[i+1]), Math.abs(a[i+2]-b[i+2])
          );
          diffs[p] = d;
          if (d > maxDiff) maxDiff = d;
          sumDiff += d;
        }
        const amp = 255 / maxDiff * (scale / 18);
        // Adaptive threshold for box extraction: only flag pixels with
        // residuals above the 95th percentile AND above a minimum value.
        const T = IF.THRESHOLDS.ela;
        const meanDiff = sumDiff / (w*h);
        const mask = new Uint8Array(w*h);
        for (let p = 0; p < diffs.length; p++) {
          const v = Math.min(255, diffs[p] * amp);
          outData.data[p*4]   = v;
          outData.data[p*4+1] = v;
          outData.data[p*4+2] = v;
          outData.data[p*4+3] = 255;
          if (v > T.boxMin) mask[p] = 1;
        }
        outCtx.putImageData(outData, 0, 0);
        const score = Math.min(100, meanDiff * (100 / 25));
        const triggered = score >= T.trigger;
        // Full boxes: only when triggered
        const boxes = triggered
          ? IF.maskToBoxes(mask, w, h, Math.floor((w*h)*0.002))
          : [];
        // Sub-threshold boxes: for annotation even when not triggered (score > 20)
        // Use lower pixel threshold to show areas of interest
        let subMask = null;
        if (!triggered && score > 20) {
          subMask = new Uint8Array(w*h);
          for (let p = 0; p < diffs.length; p++) {
            const v = Math.min(255, diffs[p] * amp);
            if (v > T.boxMin * 0.6) subMask[p] = 1;
          }
        }
        const subthreshold_boxes = subMask
          ? IF.maskToBoxes(subMask, w, h, Math.floor((w*h)*0.003)).slice(0, 20)
          : [];
        resolve({
          canvas: out, score, boxes, triggered, subthreshold_boxes,
          measurements: { mean_residual: +meanDiff.toFixed(2), max_residual: maxDiff, threshold: T.trigger },
        });
      }, "image/jpeg", quality);
    });
  };

  IF.maskToBoxes = function(mask, w, h, minArea) {
    const visited = new Uint8Array(w*h);
    const boxes = [];
    const stack = [];
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const idx = y*w + x;
        if (!mask[idx] || visited[idx]) continue;
        let minX = x, maxX = x, minY = y, maxY = y, area = 0;
        stack.length = 0;
        stack.push(idx);
        while (stack.length) {
          const p = stack.pop();
          if (visited[p] || !mask[p]) continue;
          visited[p] = 1; area++;
          const px = p % w, py = (p - px) / w;
          if (px < minX) minX = px; if (px > maxX) maxX = px;
          if (py < minY) minY = py; if (py > maxY) maxY = py;
          if (px > 0     && !visited[p-1]) stack.push(p-1);
          if (px < w - 1 && !visited[p+1]) stack.push(p+1);
          if (py > 0     && !visited[p-w]) stack.push(p-w);
          if (py < h - 1 && !visited[p+w]) stack.push(p+w);
        }
        if (area >= minArea)
          boxes.push([minX, minY, maxX-minX+1, maxY-minY+1]);
        if (boxes.length >= 30) return boxes;
      }
    }
    return boxes;
  };

  // ============================================================
  // Noise inconsistency — only trigger if score crosses threshold
  // ============================================================
  IF.noiseInconsistency = function(canvas, block = 32) {
    const w = canvas.width, h = canvas.height;
    const T = IF.THRESHOLDS.sensor_pattern;
    const data = canvas.getContext("2d").getImageData(0,0,w,h).data;
    const gray = new Float32Array(w*h);
    for (let i = 0, p = 0; i < data.length; i += 4, p++)
      gray[p] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    const lap = new Float32Array(w*h);
    for (let y = 1; y < h-1; y++)
      for (let x = 1; x < w-1; x++) {
        const i = y*w + x;
        lap[i] = -4*gray[i] + gray[i-1] + gray[i+1] + gray[i-w] + gray[i+w];
      }
    const stds = [], coords = [];
    for (let y = 0; y + block < h; y += block)
      for (let x = 0; x + block < w; x += block) {
        let sum = 0, sum2 = 0, n = 0;
        for (let yy = y; yy < y+block; yy++)
          for (let xx = x; xx < x+block; xx++) {
            const v = lap[yy*w + xx];
            sum += v; sum2 += v*v; n++;
          }
        const mean = sum/n;
        stds.push(Math.sqrt(Math.max(0, sum2/n - mean*mean)));
        coords.push([x,y]);
      }
    if (stds.length < 20) return { score: 0, boxes: [], triggered: false, measurements: {} };
    const mu = stds.reduce((a,b)=>a+b,0)/stds.length;
    const variance = stds.reduce((a,b)=>a+(b-mu)*(b-mu),0)/stds.length;
    const sd = Math.sqrt(variance) || 1;
    const anomalies = [];
    for (let i = 0; i < stds.length; i++) {
      const z = Math.abs(stds[i]-mu)/sd;
      if (z > T.zScore) anomalies.push([coords[i][0], coords[i][1], block, block]);
    }
    const ratio = anomalies.length / stds.length;
    const score = Math.min(100, ratio * 500);
    const triggered = score >= T.trigger;
    return {
      score, boxes: triggered ? anomalies.slice(0, 40) : [], triggered,
      measurements: {
        mean_noise_std: +mu.toFixed(2),
        anomalous_blocks: anomalies.length,
        total_blocks: stds.length,
        anomaly_ratio: +(ratio*100).toFixed(1),
        threshold: T.trigger,
      },
    };
  };

  // ============================================================
  // Copy-move — only trigger if we find many matches
  // ============================================================
  IF.copyMove = function(canvas) {
    const w = canvas.width, h = canvas.height;
    const T = IF.THRESHOLDS.copy_move;
    const data = canvas.getContext("2d").getImageData(0,0,w,h).data;
    const gray = new Float32Array(w*h);
    for (let i = 0, p = 0; i < data.length; i += 4, p++)
      gray[p] = 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
    const B = 16, step = 8;
    const sigs = [];
    for (let y = 0; y + B < h; y += step)
      for (let x = 0; x + B < w; x += step) {
        let sum = 0, gx = 0, gy = 0, gd = 0;
        for (let yy = 0; yy < B; yy++)
          for (let xx = 0; xx < B; xx++) {
            const v = gray[(y+yy)*w + (x+xx)];
            sum += v;
            gx  += (xx - B/2) * v;
            gy  += (yy - B/2) * v;
            gd  += (xx - yy) * v;
          }
        const n = B*B;
        sigs.push({ x, y, m: sum/n, gx: gx/n, gy: gy/n, gd: gd/n });
      }
    const buckets = new Map();
    for (const s of sigs) {
      const k = Math.round(s.m/4);
      if (!buckets.has(k)) buckets.set(k, []);
      buckets.get(k).push(s);
    }
    const matches = [];
    for (const [, arr] of buckets) {
      for (let i = 0; i < arr.length; i++) {
        for (let j = i+1; j < arr.length; j++) {
          const a = arr[i], b = arr[j];
          const dist = Math.hypot(a.x-b.x, a.y-b.y);
          if (dist < 96) continue;
          const d = Math.abs(a.m-b.m) + Math.abs(a.gx-b.gx) + Math.abs(a.gy-b.gy) + Math.abs(a.gd-b.gd);
          // Skip near-uniform blocks — white backgrounds all hash identically
          // producing thousands of false matches across any invoice
          if (Math.abs(a.m - 255) < 8 && Math.abs(b.m - 255) < 8) continue;
          if (d < 1.5) matches.push([a, b]);   // raised from 2.0 to cut false positives
          if (matches.length > 400) break;
        }
        if (matches.length > 400) break;
      }
      if (matches.length > 400) break;
    }
    const triggered = matches.length >= T.minMatches;
    if (!triggered) {
      return { score: Math.min(100, matches.length * 2), boxes: [], triggered: false,
        measurements: { match_count: matches.length, threshold: T.minMatches } };
    }
    const boxes = [];
    const seen = new Set();
    for (const [a, b] of matches.slice(0, 200)) {
      for (const s of [a, b]) {
        const k = `${s.x},${s.y}`;
        if (!seen.has(k)) { seen.add(k); boxes.push([s.x, s.y, B, B]); }
      }
    }
    const score = Math.min(100, 20 * Math.log1p(matches.length));
    return {
      score, boxes: boxes.slice(0, 40), triggered,
      measurements: { match_count: matches.length, threshold: T.minMatches },
    };
  };

  // ============================================================
  // Typography coherence — measure word-height deviation per text line.
  // Bounding box height is dominated by ascenders/descenders, so it varies
  // up to 30-40% between words even in the same font. We only flag words
  // when:
  //  - the line has at least 4 words (so the median is statistically meaningful)
  //  - the word is at least 4 chars (short words are noisier)
  //  - the deviation is >55% (significantly above natural ascender/descender variation)
  //  - AND the overall ratio of anomalies is high (not just 1-2 outliers)
  // ============================================================
  IF.fontAnalysis = function(ocrWords) {
    const T = IF.THRESHOLDS.typography;
    if (!ocrWords || ocrWords.length < 5)
      return { score: 0, boxes: [], notes: [], triggered: false, measurements: {} };
    const lines = new Map();
    for (const w of ocrWords) {
      const bucket = Math.round((w.bbox?.y0 || 0) / 8);
      if (!lines.has(bucket)) lines.set(bucket, []);
      lines.get(bucket).push(w);
    }
    const anomalies = [], notes = [];
    let totalWords = 0;
    for (const [, words] of lines) {
      // Need 4+ words for a meaningful median
      if (words.length < 4) continue;
      // Only consider words of 4+ chars (avoid noise from "5", "to", etc.)
      const eligible = words.filter(w => (w.text || "").length >= 4);
      if (eligible.length < 3) continue;
      totalWords += eligible.length;
      const heights = eligible.map(w => (w.bbox.y1 - w.bbox.y0));
      const sorted = [...heights].sort((a,b) => a-b);
      const median = sorted[Math.floor(sorted.length/2)];
      if (median <= 0) continue;
      for (const w of eligible) {
        const hgt = w.bbox.y1 - w.bbox.y0;
        // 0.55 tolerance — natural ascender/descender variation is up to ~35%,
        // so 55% leaves comfortable headroom. Only words substantially out of
        // family get flagged.
        if (Math.abs(hgt - median) / median > 0.55) {
          anomalies.push([w.bbox.x0, w.bbox.y0, w.bbox.x1-w.bbox.x0, hgt]);
          notes.push(`"${w.text}" height ${hgt}px vs line median ${Math.round(median)}px`);
        }
      }
    }
    if (totalWords === 0) return { score: 0, boxes: [], notes: [], triggered: false, measurements: {} };
    const ratio = anomalies.length / totalWords;
    // Score scales with the proportion of anomalous words. 5% anomalies = 25 pts,
    // 10% = 50 pts, 15% = 75 pts. A clean document typically has <2%.
    const score = Math.min(100, ratio * 500);
    const triggered = score >= T.trigger;
    return {
      score, boxes: triggered ? anomalies.slice(0, 30) : [],
      notes: triggered ? notes.slice(0, 15) : [],
      triggered,
      measurements: {
        anomalous_words: anomalies.length,
        total_words: totalWords,
        anomaly_ratio_pct: +(ratio * 100).toFixed(1),
        threshold: T.trigger,
      },
    };
  };

  // ============================================================
  // Metadata forensics
  // ============================================================
  IF.EDITOR_TOKENS = ["photoshop","gimp","pixlr","canva","affinity",
                      "paint.net","coreldraw","acrobat pro","foxit editor",
                      "pdfescape","smallpdf","ilovepdf","inkscape"];

  IF.analyseMetadata = async function(file, fileType) {
    const findings = [];
    const positives = [];  // Things that look LEGITIMATE (green signals)
    let meta = {};

    if (fileType === "image") {
      try {
        const exif = await exifr.parse(file, { tiff:true, xmp:true, iptc:true, ifd0:true, exif:true });
        meta = exif || {};
        if (!exif) {
          findings.push({ category:"metadata", severity:"medium", code:"META_MISSING",
            message:"No image metadata extractable. Legitimate scans typically retain scanner/camera metadata.",
            details:{} });
        } else {
          const create = exif.CreateDate || exif.DateTimeOriginal;
          const modify = exif.ModifyDate;
          if (create?.getTime && modify?.getTime) {
            const deltaSec = Math.abs(create.getTime() - modify.getTime()) / 1000;
            if (deltaSec > 60) {
              findings.push({ category:"metadata", severity:"medium", code:"META_TIMESTAMP_MISMATCH",
                message:`Creation and modification timestamps differ by ${Math.round(deltaSec/60)} minutes.`,
                details:{ created: create.toISOString(), modified: modify.toISOString() } });
            } else {
              positives.push({ code:"META_TIMESTAMPS_CONSISTENT",
                message:"Creation and modification timestamps match (no post-capture edits recorded)." });
            }
          }
          const sw = (exif.Software || exif.CreatorTool || "").toString().toLowerCase();
          const editorFound = IF.EDITOR_TOKENS.find(t => sw.includes(t));
          if (editorFound) {
            findings.push({ category:"metadata", severity:"high", code:"META_EDITOR_TRACE",
              message:`Editing software trace: "${exif.Software || exif.CreatorTool}". Common in tampered invoices.`,
              details:{ value: String(exif.Software || exif.CreatorTool), matched_token: editorFound } });
          } else if (sw) {
            positives.push({ code:"META_PRODUCER_OK",
              message:`Producer/Creator: "${exif.Software || exif.CreatorTool}" — no known editing tools detected.` });
          }
        }
      } catch (e) {
        findings.push({ category:"metadata", severity:"low", code:"META_PARSE_ERROR",
          message:"Could not parse image metadata (file may be malformed).",
          details:{ error: String(e) } });
      }
    } else if (fileType.startsWith("pdf")) {
      try {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        const info = await pdf.getMetadata();
        meta = { info: info.info || {} };
        const producer = (meta.info.Producer || "").toString().toLowerCase();
        const creator  = (meta.info.Creator  || "").toString().toLowerCase();
        const editorFound = IF.EDITOR_TOKENS.find(t => producer.includes(t) || creator.includes(t));
        if (editorFound) {
          findings.push({ category:"metadata", severity:"high", code:"META_EDITOR_TRACE",
            message:`PDF modified in ${editorFound}: "${meta.info.Producer || meta.info.Creator}".`,
            details:{ producer: meta.info.Producer, creator: meta.info.Creator, matched_token: editorFound } });
        } else if (meta.info.Producer || meta.info.Creator) {
          positives.push({ code:"META_PRODUCER_OK",
            message:`Produced by: "${meta.info.Producer || meta.info.Creator}" — no editing traces.` });
        }
        if (meta.info.CreationDate && meta.info.ModDate && meta.info.CreationDate !== meta.info.ModDate) {
          findings.push({ category:"metadata", severity:"medium", code:"META_TIMESTAMP_MISMATCH",
            message:"PDF was modified after creation.",
            details:{ created: meta.info.CreationDate, modified: meta.info.ModDate } });
        } else if (meta.info.CreationDate) {
          positives.push({ code:"META_TIMESTAMPS_CONSISTENT",
            message:"PDF creation and modification timestamps match." });
        }
        if (!meta.info.Producer && !meta.info.Creator) {
          // Absence of Producer is common in scanner-generated and many legitimate
          // PDFs. Don't flag it as a finding — just note it as context.
          positives.push({ code:"META_NO_PRODUCER",
            message:"PDF has no Producer/Creator metadata — normal for scanner-generated documents." });
        }
      } catch (e) {
        findings.push({ category:"metadata", severity:"low", code:"META_PARSE_ERROR",
          message:"Could not parse PDF metadata.", details:{ error: String(e) } });
      }
    }
    const score = findings.length === 0 ? 0 :
      Math.max(...findings.map(f => ({ low:20, medium:45, high:70, critical:100 })[f.severity] || 0));
    return { meta, findings, positives, score };
  };

  // ============================================================
  // Field extraction
  // ============================================================
  IF.RE = {
    GSTIN:  /\b\d{2}[A-Z]{5}\d{4}[A-Z][1-9A-Z]Z[0-9A-Z]\b/,
    INV:    /(?:invoice\s*(?:no|number|#)|inv\s*no|bill\s*no)[:\s\-#]*([A-Z0-9\-\/]{3,30})/i,
    DATE:   /\b(\d{1,2}[\/\-\.\s](?:\d{1,2}|[A-Za-z]{3,9})[\/\-\.\s]\d{2,4})\b/,
    // Prefer specific grand/net/payable totals first; fall back to plain "Total".
    // The regex is tried in order — we pick the LAST match for plain "Total"
    // so subtotals mid-invoice don't shadow the final figure.
    TOTAL:  /(?:grand\s*total|total\s*amount|total\s*payable|amount\s*due|net\s*payable|balance\s*due|net\s*amount)[:\s]*(?:rs\.?|inr|₹|\$|€|£)?\s*([0-9][0-9,]*\.?\d{0,2})/i,
    // Fallback plain-total (used only if the above didn't match)
    TOTAL_PLAIN: /(?:^|\n)\s*total[:\s]*(?:rs\.?|inr|₹|\$|€|£)?\s*([0-9][0-9,]*\.?\d{0,2})/i,
    VENDOR: /^\s*(?:from|billed\s*by|vendor|supplier|sold\s*by)\s*[:\-]\s*(.+)$/im,
  };

  IF.parseFields = function(text) {
    const F = { raw_text: text || "", line_items: [] };
    let m;
    if ((m = IF.RE.INV.exec(text)))    F.invoice_number = m[1].trim();
    if ((m = IF.RE.DATE.exec(text)))   F.invoice_date = m[1].trim();
    // Try specific total labels first; fall back to plain "Total"
    if ((m = IF.RE.TOTAL.exec(text)))       F.amount = parseFloat(m[1].replace(/,/g,""));
    else if ((m = IF.RE.TOTAL_PLAIN.exec(text))) F.amount = parseFloat(m[1].replace(/,/g,""));
    if ((m = IF.RE.GSTIN.exec(text)))  F.gstin = m[0];
    if ((m = IF.RE.VENDOR.exec(text))) F.vendor_name = m[1].trim().slice(0,256);
    else {
      for (const line of (text||"").split("\n")) {
        const s = line.trim();
        if (s.length >= 3 && s.length <= 80) {
          const alpha = [...s].filter(c => /[A-Za-z]/.test(c)).length;
          if (alpha / s.length > 0.6) { F.vendor_name = s; break; }
        }
      }
    }

    // ── Line-item extraction ────────────────────────────────────────────────
    // Match:  <description>  <whitespace>  <amount>
    // Amount must be at the end of the line (after trailing spaces).
    const itemRe = /^(.{3,80}?)\s+([0-9][0-9,]*\.?\d{0,2})\s*$/;

    // Lines that are SUMMARY rows — should never be treated as items.
    const summaryRe = /^\s*(?:grand\s*total|sub[\s\-]?total|total\s*amount|total\s*payable|total\s*due|net\s*payable|net\s*total|amount\s*due|balance\s*due|amount\s*payable|bill\s*total|invoice\s*total|round[\s\-]?off|less\s*discount|discount|total)\s*[:\s]?/i;

    // Lines with contact/reference information — trailing number is never a price.
    const skipLineRe = /(?:mobile|phone|tel|fax|cell|contact|whatsapp|email|e-mail|pin\s*code|pincode|zip|cin\b|pan\b|gstin|tan\b|llpin|website|www\.|http|@|gst\s*no|reg\s*no|uin\b)/i;

    // Maximum plausible single line-item (~₹1 crore).
    const MAX_LINE_ITEM = 99_999_999;

    // Returns true if the raw number string looks like a phone/ID number.
    const isPhoneLike = (raw) => {
      const digits = raw.replace(/[,\.]/g, "");
      if (/^[6-9]\d{9}$/.test(digits)) return true;        // Indian mobile (10 digits, starts 6-9)
      if (digits.length >= 11 && !raw.includes(".")) return true; // 11+ digits, no decimal = likely reference
      return false;
    };

    for (const line of (text||"").split("\n")) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      if (skipLineRe.test(trimmed)) continue;    // skip contact lines
      if (summaryRe.test(trimmed)) continue;     // skip total/subtotal rows
      const mm = itemRe.exec(trimmed);
      if (!mm) continue;
      const rawAmount = mm[2];
      if (isPhoneLike(rawAmount)) continue;
      const amount = parseFloat(rawAmount.replace(/,/g,""));
      if (!isFinite(amount) || amount <= 0) continue;
      if (amount > MAX_LINE_ITEM) continue;
      F.line_items.push({ description: mm[1].trim(), amount });
      if (F.line_items.length >= 50) break;
    }
    return F;
  };

  IF.gstinChecksumOk = function(gstin) {
    const RE = /^\d{2}[A-Z]{5}\d{4}[A-Z][1-9A-Z]Z[0-9A-Z]$/;
    if (!RE.test(gstin)) return false;
    const A = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    let total = 0;
    for (let i = 0; i < gstin.length - 1; i++) {
      const v = A.indexOf(gstin[i]);
      const w = (i % 2 === 0) ? 1 : 2;
      const p = v * w;
      total += Math.floor(p / 36) + (p % 36);
    }
    return A[(36 - total % 36) % 36] === gstin[gstin.length - 1];
  };

  IF.contentScore = function(F) {
    let score = 0;
    const findings = [];
    const positives = [];
    const missing = [];
    if (!F.invoice_number) missing.push("invoice_number");
    if (!F.invoice_date)   missing.push("invoice_date");
    if (!F.amount)         missing.push("amount");
    if (!F.vendor_name)    missing.push("vendor_name");
    if (missing.length) {
      score += 15 * Math.min(3, missing.length);
      findings.push({ category:"content",
        severity: missing.length <= 2 ? "medium" : "high",
        code:"CONTENT_MISSING_FIELDS",
        message:`Missing fields: ${missing.join(", ")}. Expected on a standard invoice.`,
        details:{ missing } });
    } else {
      positives.push({ code:"CONTENT_ALL_FIELDS_PRESENT",
        message:"All standard invoice fields (number, date, amount, vendor) were extracted." });
    }
    if (F.gstin) {
      if (IF.gstinChecksumOk(F.gstin)) {
        positives.push({ code:"CONTENT_GSTIN_VALID",
          message:`GSTIN ${F.gstin} passes mod-36 checksum validation.` });
      } else {
        score += 35;
        findings.push({ category:"content", severity:"high", code:"CONTENT_GSTIN_INVALID",
          message:"GSTIN fails checksum validation — likely fabricated.",
          details:{ gstin: F.gstin } });
      }
    }
    if (F.amount && F.line_items?.length) {
      const sum = F.line_items.reduce((a,i) => a + (i.amount||0), 0);
      if (sum > 0) {
        const diffPct = Math.abs(sum - F.amount) / F.amount;
        // Plausibility guard: if the extracted line-item sum is more than
        // 1000× the stated total, the extraction almost certainly captured
        // non-price numbers (phone numbers, PINs, CIN/PAN, etc. that slipped
        // through filtering). In that case the reconciliation is meaningless —
        // record a note instead of a HIGH-severity finding.
        if (diffPct > 1000) {
          positives.push({ code:"CONTENT_RECONCILE_SKIPPED",
            message:`Line-item sum (${sum.toFixed(0)}) is implausibly large relative to stated total (${F.amount.toFixed(2)}) — likely contains non-price numbers. Reconciliation skipped.` });
        } else if (diffPct > 0.02) {
          score += 25;
          findings.push({ category:"content", severity:"high", code:"CONTENT_TOTAL_MISMATCH",
            message:`Invoice total (${F.amount.toFixed(2)}) does not reconcile with extracted line-item sum (${sum.toFixed(2)}) — difference of ${Math.abs(F.amount - sum).toFixed(2)} (${(diffPct*100).toFixed(1)}%).`,
            details:{ invoice_total: F.amount, line_item_sum: +sum.toFixed(2),
                      difference: +(F.amount - sum).toFixed(2), difference_pct: +(diffPct*100).toFixed(2) } });
        } else {
          positives.push({ code:"CONTENT_TOTAL_RECONCILES",
            message:`Line items (${sum.toFixed(2)}) reconcile with stated total (${F.amount.toFixed(2)}).` });
        }
      }
    }
    if (F.invoice_date) {
      // Try parsing in multiple orderings so US-style MM/DD/YYYY dates like
      // "03/13/2026" don't get flipped into an impossible day=13-of-month-3.
      // We pick the first interpretation that yields a real calendar date.
      const parsed = IF.parseDateFlexible(F.invoice_date);
      if (parsed) {
        // Only flag as "future" if it's more than a day ahead (allows for timezone slack)
        if (parsed.getTime() > Date.now() + 86400000) {
          score += 20;
          findings.push({ category:"content", severity:"medium", code:"CONTENT_DATE_IMPLAUSIBLE",
            message:`Invoice date '${F.invoice_date}' is in the future (parsed as ${parsed.toISOString().slice(0,10)}).`,
            details:{ date: F.invoice_date, parsed_iso: parsed.toISOString().slice(0,10) } });
        }
      }
    }
    return { score: Math.min(100, score), findings, positives };
  };

  // Parse an invoice date string into a Date, trying DD/MM/YYYY first (Indian
  // convention) then MM/DD/YYYY (US) then YYYY-MM-DD (ISO). Returns null if
  // none produce a valid calendar date.
  IF.parseDateFlexible = function(s) {
    if (!s) return null;
    const str = s.trim();
    const attempts = [];
    // ISO: YYYY-MM-DD
    let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
    if (m) attempts.push([+m[1], +m[2], +m[3]]);
    // Slash/dash/dot with 4-digit year in position 3
    m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if (m) {
      const a = +m[1], b = +m[2], y = +m[3];
      // DD/MM if b is a plausible month; MM/DD if a is a plausible month.
      // If both are ≤12 we can't tell — try DD/MM first (Indian default).
      if (b >= 1 && b <= 12) attempts.push([y, b, a]);       // DD/MM/YYYY
      if (a >= 1 && a <= 12 && (b < 1 || b > 12)) attempts.push([y, a, b]);  // must be MM/DD
      else if (a >= 1 && a <= 12) attempts.push([y, a, b]);   // ambiguous, try MM/DD second
    }
    // 2-digit year
    m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2})$/);
    if (m) {
      const a = +m[1], b = +m[2], y = 2000 + +m[3];
      if (b >= 1 && b <= 12) attempts.push([y, b, a]);
      if (a >= 1 && a <= 12 && (b < 1 || b > 12)) attempts.push([y, a, b]);
      else if (a >= 1 && a <= 12) attempts.push([y, a, b]);
    }
    for (const [y, mo, d] of attempts) {
      if (mo < 1 || mo > 12 || d < 1 || d > 31 || y < 1970 || y > 2100) continue;
      const dt = new Date(y, mo - 1, d);
      // Reject if JS rolled the date over (e.g. Feb 30 → March 2)
      if (dt.getFullYear() === y && dt.getMonth() === mo - 1 && dt.getDate() === d) return dt;
    }
    return null;
  };

  // ============================================================
  // Duplicate detection
  // ============================================================
  IF.checkDuplicates = async function(sha, phash, F, currentId, opts) {
    const skipDuplicate = opts && opts.skipDuplicate;
    const findings = [];
    const positives = [];
    const matches = [];
    const rows = (await IF.db.allJobs()).filter(r => r.id !== currentId);

    if (skipDuplicate) {
      positives.push({ code:"DUP_SKIPPED",
        message:"Duplicate check skipped (rescan mode)." });
      return { score: 0, findings, positives, matches };
    }

    const exact = rows.find(r => r.sha256 === sha);
    if (exact) {
      findings.push({ category:"duplicate", severity:"critical", code:"DUP_EXACT",
        message:`Byte-identical file previously processed as "${exact.filename}" on ${(exact.created_at||"").slice(0,10)}. This is the same binary file — not a tampered copy.`,
        details:{ previous_id: exact.id, filename: exact.filename, first_seen: exact.created_at } });
      // Score 80 not 100 — genuine duplicates exist (monthly invoices from same vendor),
      // and this should not force 90% risk via the old override (now removed).
      return { score: 80, findings, positives, matches: [{ type:"sha256", id: exact.id, filename: exact.filename }] };
    }
    if (phash) {
      // Hamming ≤ 6 catches re-scans of the same physical document (noise
      // from scanner angle/DPI causes ~2-4 bit flip). Threshold of 12 was too
      // loose — two invoices from the same company using the same letterhead
      // template produce Hamming distances of 8-12 despite being different docs.
      const near = rows.filter(r => r.phash)
        .map(r => ({ r, d: IF.hammingHex(phash, r.phash) }))
        .filter(x => x.d <= 6).sort((a,b) => a.d - b.d).slice(0, 3);
      if (near.length) {
        // Require at least one corroborating signal before raising a finding.
        // Same vendor name OR same invoice number strengthens the match significantly.
        const corroborated = near.filter(n => {
          const sameVendor = F.vendor_name && n.r.vendor &&
            F.vendor_name.toLowerCase().trim() === n.r.vendor.toLowerCase().trim();
          const sameInvNo = F.invoice_number && n.r.invoice_no &&
            F.invoice_number.replace(/\s/g,"") === n.r.invoice_no.replace(/\s/g,"");
          const sameAmount = F.amount && n.r.amount &&
            Math.abs(F.amount - n.r.amount) / Math.max(F.amount, n.r.amount) < 0.01;
          return sameVendor || sameInvNo || (sameAmount && n.d <= 4);
        });
        if (corroborated.length > 0) {
          findings.push({ category:"duplicate", severity:"high", code:"DUP_PHASH",
            message:`Visually near-identical to ${corroborated.length} previously-processed invoice${corroborated.length===1?"":"s"} (perceptual hash distance ≤ 6, corroborated by matching fields). Likely a re-scan or modified copy.`,
            details:{ matches: corroborated.map(n => ({ id: n.r.id, filename: n.r.filename, hamming: n.d })) } });
          matches.push(...corroborated.map(n => ({ type:"phash", id: n.r.id, filename: n.r.filename, hamming: n.d })));
        } else if (near.length > 0) {
          // Low Hamming but no corroborating fields — record as informational, not a finding
          positives.push({ code:"DUP_PHASH_UNCONFIRMED",
            message:`Perceptual hash is close (Hamming ${near[0].d}) to "${near[0].r.filename}" but no matching fields — likely same-template invoices from same vendor, not a duplicate.` });
        }
      }
    }
    if (F.vendor_name && F.amount) {
      const cands = rows.filter(r => r.vendor && r.amount && Math.abs(r.amount - F.amount) / F.amount < 0.005);
      const hits = [];
      for (const c of cands) {
        const tok = s => new Set((s||"").toLowerCase().replace(/[^a-z0-9 ]/g,"").split(/\s+/).filter(Boolean));
        const s1 = tok(F.vendor_name), s2 = tok(c.vendor);
        if (!s1.size || !s2.size) continue;
        const inter = [...s1].filter(x => s2.has(x)).length;
        const jacc  = inter / new Set([...s1, ...s2]).size;
        if (jacc >= 0.8) hits.push({ id: c.id, filename: c.filename, jaccard: +jacc.toFixed(2), amount: c.amount });
      }
      if (hits.length) {
        findings.push({ category:"duplicate", severity:"high", code:"DUP_FUZZY_FIELDS",
          message:`Same vendor + same amount as ${hits.length} prior invoice${hits.length===1?"":"s"}. Could indicate a duplicate submission — verify invoice numbers differ.`,
          details:{ matches: hits.slice(0,5) } });
        matches.push(...hits.map(h => ({ type:"fuzzy_fields", ...h })));
      }
    }
    if (rows.length > 0 && matches.length === 0) {
      positives.push({ code:"DUP_NONE_FOUND",
        message:`No duplicates found across ${rows.length} previously-examined invoice${rows.length===1?"":"s"}.` });
    } else if (rows.length === 0) {
      positives.push({ code:"DUP_FIRST_SUBMISSION",
        message:"First document in archive — no prior cases to compare against." });
    }
    const score = matches.some(m => m.type === "phash") ? 60 :
                  matches.some(m => m.type === "fuzzy_fields") ? 55 : 0;
    return { score, findings, positives, matches };
  };

  // ============================================================
  // AI-generation detection with threshold
  // ============================================================
  IF.aiDetect = function(canvas, ocrWords, hasMeta) {
    const w = canvas.width, h = canvas.height;
    const T = IF.THRESHOLDS.ai;
    const ctx = canvas.getContext("2d");
    const px = ctx.getImageData(0,0,w,h).data;
    const lapVals = [];
    let meanL = 0;
    for (let y = 1; y < h-1; y += 4)
      for (let x = 1; x < w-1; x += 4) {
        const i = (y*w + x) * 4;
        const g  = 0.299*px[i]   + 0.587*px[i+1]   + 0.114*px[i+2];
        const gu = 0.299*px[i-w*4] + 0.587*px[i-w*4+1] + 0.114*px[i-w*4+2];
        const gd = 0.299*px[i+w*4] + 0.587*px[i+w*4+1] + 0.114*px[i+w*4+2];
        const gl = 0.299*px[i-4]   + 0.587*px[i-3]     + 0.114*px[i-2];
        const gr = 0.299*px[i+4]   + 0.587*px[i+5]     + 0.114*px[i+6];
        lapVals.push(Math.abs(-4*g + gu + gd + gl + gr));
        meanL += lapVals[lapVals.length-1];
      }
    meanL /= lapVals.length;
    let lapStd = 0;
    for (const v of lapVals) lapStd += (v - meanL) ** 2;
    lapStd = Math.sqrt(lapStd / lapVals.length);
    const noiseCleanliness = lapStd >= 6 ? 0 : Math.max(0, (6 - lapStd) / 6);

    const tc = document.createElement("canvas");
    tc.width = 64; tc.height = 64;
    tc.getContext("2d").drawImage(canvas, 0, 0, 64, 64);
    const tpx = tc.getContext("2d").getImageData(0,0,64,64).data;
    const colors = new Set();
    for (let i = 0; i < tpx.length; i += 4)
      colors.add((tpx[i]<<16) | (tpx[i+1]<<8) | tpx[i+2]);
    const uniq = colors.size;
    const paletteFlatness = uniq <= 200 ? 1 : uniq >= 2000 ? 0 : (2000 - uniq) / 1800;

    let textPerfection = 0;
    if (ocrWords && ocrWords.length >= 20) {
      const confs = ocrWords.map(w => w.confidence || 0);
      const meanConf = confs.reduce((a,b) => a+b, 0) / confs.length;
      textPerfection = meanConf < 92 ? 0 : Math.min(1, (meanConf - 92) / 8);
    }
    const metadataVacuum = hasMeta ? 0 : 1;

    const features = { noise_cleanliness: noiseCleanliness, palette_flatness: paletteFlatness,
                       text_perfection: textPerfection, metadata_vacuum: metadataVacuum };
    const weights = { noise_cleanliness: 0.35, palette_flatness: 0.25,
                      text_perfection: 0.15, metadata_vacuum: 0.25 };
    const raw = Object.keys(features).reduce((a,k) => a + features[k] * weights[k], 0);
    const score = Math.min(100, raw * 100);
    const triggered = score >= T.trigger;
    const findings = [];
    const positives = [];
    if (triggered) {
      findings.push({ category:"ai",
        severity: score >= T.strong ? "high" : "medium",
        code:"AI_GENERATED_LIKELY",
        message:`Multiple indicators consistent with AI/synthetic generation (${score.toFixed(0)}/100).`,
        details:{ features: Object.fromEntries(Object.entries(features).map(([k,v]) => [k, +v.toFixed(2)])) } });
    } else if (score < 20) {
      positives.push({ code:"AI_GENUINE_ARTIFACTS_PRESENT",
        message:`Noise, palette, and text artifacts consistent with a real-world captured document.` });
    }
    return {
      score, findings, positives, triggered, features,
      measurements: {
        noise_std: +lapStd.toFixed(2),
        unique_colors: uniq,
        ocr_mean_confidence: ocrWords && ocrWords.length ? +(ocrWords.reduce((a,w) => a+(w.confidence||0), 0) / ocrWords.length).toFixed(1) : null,
        has_metadata: hasMeta,
      },
    };
  };

  // ============================================================
  // PDF structural analysis — detect incremental saves (edit history)
  // A clean PDF normally has exactly one "%%EOF" at end-of-line.
  // Linearized PDFs have 2 (linearization hint table + main body).
  // Re-saved or post-edited PDFs accumulate more.
  // We only fire when there's strong evidence: 2+ excess EOFs WITH /Prev xref
  // chains, OR 3+ excess EOFs (rare in any normal workflow).
  // ============================================================
  // ============================================================
  // PDF EDITING DETECTION — deep object-stream forensics
  // Parses raw PDF bytes for structural markers left by PDF editors:
  //   /Annot  — text annotations (most common edit method)
  //   /AcroForm — form field modifications
  //   Multiple /Font families — edited text uses editor's default font
  //   Object ID gaps — added objects get IDs much higher than originals
  //   Overlapping content streams — new content drawn over old
  //   /Redact — redaction objects (even "erased" content leaves traces)
  // ============================================================
  IF.pdfEditDetection = async function(file, fileType) {
    if (!fileType || !fileType.startsWith("pdf")) {
      return { score: 0, confidence: 0, findings: [], positives: [], triggered: false, measurements: {} };
    }
    try {
      const buf = await file.arrayBuffer();
      const decoder = new TextDecoder("latin1");
      const CHUNK = 131072; // 128 KB chunks
      let fullText = "";
      for (let off = 0; off < Math.min(buf.byteLength, 2097152); off += CHUNK) {
        fullText += decoder.decode(new Uint8Array(buf, off, Math.min(CHUNK, buf.byteLength - off)));
      }

      const findings = [];
      const positives = [];
      const signals = [];
      const measurements = {};

      // --- Signal 1: Annotation objects ---
      const annotCount = (fullText.match(/\/Annot\b/g) || []).length;
      // /Annots array references, not just the dictionary keys
      const annotArrays = (fullText.match(/\/Annots\s*\[/g) || []).length;
      measurements.annot_objects = annotCount;
      if (annotCount > 0) {
        signals.push({ type: "annotations", strength: Math.min(1, annotCount / 3),
          detail: `${annotCount} annotation object${annotCount === 1 ? "" : "s"} — text/highlight annotations are the most common PDF editing mechanism` });
      }

      // --- Signal 2: AcroForm (fillable form fields that may have been modified) ---
      const hasAcroForm = fullText.includes("/AcroForm");
      const hasXFA = fullText.includes("/XFA");
      measurements.has_acroform = hasAcroForm;
      if (hasAcroForm) {
        signals.push({ type: "acroform", strength: 0.5,
          detail: "PDF contains fillable form fields (AcroForm) — values may have been modified without creating an incremental save" });
      }

      // --- Signal 3: Multiple distinct font families ---
      const fontNames = new Set();
      const fontMatches = fullText.matchAll(/\/BaseFont\s*\/([A-Za-z0-9+_-]+)/g);
      for (const m of fontMatches) {
        // Strip subset prefix like "ABCDEF+" which encodes which characters are used
        const name = m[1].replace(/^[A-Z]{6}\+/, "");
        // Only count meaningful font families (not encoding artifacts)
        if (name.length > 2) fontNames.add(name.toLowerCase().replace(/(bold|italic|regular|medium|light|thin)/g, "").trim());
      }
      measurements.distinct_fonts = fontNames.size;
      measurements.font_names = [...fontNames].slice(0, 10);
      if (fontNames.size > 4) {
        signals.push({ type: "font_multiplicity", strength: Math.min(1, (fontNames.size - 4) / 6),
          detail: `${fontNames.size} distinct font families — legitimate invoices typically use 1-3; excess suggests text added by a different application` });
      }

      // --- Signal 4: Object ID gaps (added objects have high IDs) ---
      const objIds = [...fullText.matchAll(/^(\d+)\s+0\s+obj/gm)].map(m => parseInt(m[1])).sort((a, b) => a - b);
      let maxGap = 0;
      let gapAt = null;
      for (let i = 1; i < objIds.length; i++) {
        const gap = objIds[i] - objIds[i - 1];
        if (gap > maxGap) { maxGap = gap; gapAt = objIds[i - 1]; }
      }
      measurements.object_count = objIds.length;
      measurements.max_object_gap = maxGap;
      measurements.gap_position = gapAt;
      if (maxGap > 50 && objIds.length > 5) {
        signals.push({ type: "object_gap", strength: Math.min(1, maxGap / 200),
          detail: `Object ID gap of ${maxGap} at position ${gapAt} — large gaps suggest objects were added to the PDF after initial creation` });
      }

      // --- Signal 5: Redaction artifacts ---
      const hasRedact = fullText.includes("/Redact") || fullText.includes("/RichMedia");
      if (hasRedact) {
        signals.push({ type: "redaction", strength: 0.8,
          detail: "Redaction or rich media objects found — content may have been deliberately obscured or replaced" });
      }

      // --- Signal 6: Overlapping content (new stream placed over existing) ---
      // Look for /Type/Page objects with multiple content stream references
      const multiContentPages = (fullText.match(/\/Contents\s*\[[\d\s]+\d\s+\d[\d\s]*\]/g) || []).length;
      measurements.multi_content_pages = multiContentPages;
      if (multiContentPages > 0) {
        signals.push({ type: "multi_stream", strength: Math.min(1, multiContentPages / 2),
          detail: `${multiContentPages} page${multiContentPages === 1 ? "" : "s"} with multiple content streams — content layers added on top of existing content` });
      }

      // --- Signal 7: Suspicious producer change ---
      // Detect if the Creator and Producer fields suggest re-saving in an editor
      const producerMatch = fullText.match(/\/Producer\s*\(([^)]{1,80})\)/);
      const creatorMatch  = fullText.match(/\/Creator\s*\(([^)]{1,80})\)/);
      const producer = producerMatch ? producerMatch[1] : "";
      const creator  = creatorMatch  ? creatorMatch[1]  : "";
      const EDIT_APPS = ["acrobat", "foxit", "nitro", "pdf-xchange", "smallpdf",
                         "ilovepdf", "sejda", "pdfescape", "inkscape", "libreoffice draw"];
      const editApp = EDIT_APPS.find(a => producer.toLowerCase().includes(a) || creator.toLowerCase().includes(a));
      if (editApp) {
        signals.push({ type: "editor_producer", strength: 0.9,
          detail: `PDF was last saved by "${producer || creator}" — a known PDF editing tool` });
      }
      measurements.producer = producer;
      measurements.creator = creator;

      // --- Scoring ---
      // Weighted sum of signal strengths
      const scoreWeights = {
        annotations: 35, acroform: 15, font_multiplicity: 20,
        object_gap: 20, redaction: 30, multi_stream: 25, editor_producer: 35,
      };
      let rawScore = 0;
      for (const sig of signals) {
        rawScore += (scoreWeights[sig.type] || 15) * sig.strength;
      }
      const score = Math.min(100, rawScore);
      const triggered = score >= 35;  // Low threshold — editing evidence is serious
      const confidence = objIds.length > 3 ? 85 : 50;

      measurements.signals_detected = signals.map(s => s.type);

      if (triggered) {
        const severity = score >= 65 ? "high" : "medium";
        findings.push({
          category: "visual",
          severity,
          code: "PDF_EDIT_DETECTED",
          message: `${signals.length} PDF editing indicator${signals.length === 1 ? "" : "s"} detected: ${signals.map(s => s.type.replace("_", " ")).join(", ")}.`,
          details: {
            signals: signals.map(s => ({ type: s.type, detail: s.detail })),
            object_count: objIds.length,
            distinct_fonts: fontNames.size,
            annot_count: annotCount,
          },
        });
        // Individual signal explanations
        for (const sig of signals) {
          findings.push({
            category: "visual",
            severity: sig.strength >= 0.7 ? "high" : "medium",
            code: `PDF_EDIT_${sig.type.toUpperCase()}`,
            message: sig.detail,
            details: {},
          });
        }
      } else if (signals.length === 0) {
        positives.push({
          category: "visual",
          code: "PDF_EDIT_CLEAN",
          message: `No PDF editing indicators detected — no annotations, form fields, font anomalies, or object-stream irregularities.`,
        });
      } else {
        // Some signals but below threshold — note it
        positives.push({
          category: "visual",
          code: "PDF_EDIT_MINOR_SIGNALS",
          message: `Minor PDF structure signals (${signals.map(s => s.type).join(", ")}) — below threshold for a finding.`,
        });
      }

      return { score, confidence, findings, positives, triggered, measurements };
    } catch (err) {
      return { score: 0, confidence: 0, findings: [], positives: [], triggered: false,
               measurements: { error: String(err) } };
    }
  };

  IF.pdfStructure = async function(file, fileType) {
    if (!fileType || !fileType.startsWith("pdf")) {
      return { score: 0, confidence: 0, findings: [], positives: [], triggered: false, measurements: {} };
    }
    try {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      let eofCount = 0;
      let prevCount = 0;
      let linearized = false;
      const CHUNK = 65536;
      const decoder = new TextDecoder("latin1");
      for (let off = 0; off < bytes.length; off += CHUNK) {
        const slice = decoder.decode(bytes.slice(off, Math.min(bytes.length, off + CHUNK + 16)));
        // Match %%EOF only when followed by newline or end-of-input — avoids
        // matching the literal string when it appears inside encoded streams.
        eofCount += (slice.match(/%%EOF\s*(\r|\n|$)/g) || []).length;
        // /Prev followed by digits in trailer dict — proper xref-chain marker.
        prevCount += (slice.match(/\/Prev\s+\d+/g) || []).length;
        // /Linearized as a PDF dictionary key (followed by space/digit/<<)
        if (/\/Linearized\s/.test(slice)) linearized = true;
      }
      // Baseline allowance: linearized PDFs legitimately get 2 EOFs.
      const editThreshold = linearized ? 2 : 1;
      const incrementalSaves = Math.max(0, eofCount - editThreshold);
      const T = IF.THRESHOLDS.pdf_structure;
      const findings = [];
      const positives = [];
      // SCORING MODEL (raised to reduce false positives on legitimate workflows):
      //   1 incremental save WITHOUT /Prev:  score 0  (probably normal re-save / merge)
      //   1 incremental save WITH /Prev:     score 30 (xref chain — possible edit)
      //   2+ incremental saves:              score scales up (40, 60, 80)
      //   3+ incremental saves:              score 90+ (definite tampering signature)
      let score = 0;
      if (incrementalSaves === 1 && prevCount > 0) score = 30;
      else if (incrementalSaves === 2) score = prevCount > 0 ? 65 : 35;
      else if (incrementalSaves === 3) score = prevCount > 0 ? 85 : 60;
      else if (incrementalSaves >= 4) score = 95;
      // Single excess EOF without /Prev is ignored entirely — too noisy.
      const triggered = score >= T.trigger;
      const confidence = 90;
      if (triggered) {
        findings.push({
          category: "visual",
          severity: score >= T.strong ? "high" : "medium",
          code: "PDF_INCREMENTAL_SAVES",
          message: `PDF appears to have ${incrementalSaves} incremental save${incrementalSaves === 1 ? "" : "s"}` +
                   (prevCount > 0 ? ` with ${prevCount} cross-reference chain${prevCount === 1 ? "" : "s"} — strong indicator of post-creation editing.` : ` after creation.`),
          details: { eof_markers: eofCount, prev_xref_chains: prevCount, linearized, incremental_saves: incrementalSaves },
        });
      } else {
        const explain = linearized
          ? `linearized PDF, ${eofCount} %%EOF marker${eofCount === 1 ? "" : "s"} (expected for web-optimized PDFs)`
          : `${eofCount} %%EOF marker${eofCount === 1 ? "" : "s"}`;
        positives.push({
          category: "visual",
          code: "PDF_STRUCTURE_CLEAN",
          message: `PDF structure consistent with single-save workflow (${explain})${prevCount === 0 ? ", no cross-reference chains" : ""}.`,
        });
      }
      return {
        score, confidence, findings, positives, triggered,
        measurements: {
          eof_markers: eofCount, prev_xref_chains: prevCount,
          incremental_saves: incrementalSaves, linearized,
          baseline_allowance: editThreshold,
        },
      };
    } catch (err) {
      return {
        score: 0, confidence: 0, findings: [], positives: [], triggered: false,
        measurements: { error: String(err) },
      };
    }
  };

  // ============================================================
  // PDF deep object forensics — parse raw PDF byte stream for signs
  // of post-creation editing that %%EOF counting misses:
  //   /Annot objects (text annotations — primary edit tool in Acrobat/Foxit)
  //   /AcroForm / form fields (modified values)
  //   Multiple /Font dictionaries with mismatched BaseFont names
  //   /Subtype /Stamp objects (approval stamps often faked)
  //   Object ID discontinuities (newly added objects get anomalously high IDs)
  //   /Contents streams replaced or appended (overlaid text)
  // ============================================================
  IF.pdfDeepAnalysis = async function(file, fileType) {
    if (!fileType || !fileType.startsWith("pdf")) {
      return { score:0, confidence:0, findings:[], positives:[], triggered:false, measurements:{} };
    }
    try {
      const buf = await file.arrayBuffer();
      const bytes = new Uint8Array(buf);
      const CHUNK = 65536;
      const decoder = new TextDecoder("latin1");
      let fullText = "";
      for (let off = 0; off < bytes.length; off += CHUNK) {
        fullText += decoder.decode(bytes.slice(off, Math.min(bytes.length, off + CHUNK)));
      }
      // ---- Counters ----
      const annotCount   = (fullText.match(/\/Subtype\s*\/Text\b/g)     || []).length
                         + (fullText.match(/\/Subtype\s*\/FreeText\b/g)  || []).length
                         + (fullText.match(/\/Subtype\s*\/Widget\b/g)    || []).length;
      const stampCount   = (fullText.match(/\/Subtype\s*\/Stamp\b/g)     || []).length;
      const acroForm     = /\/AcroForm\s*<</.test(fullText);
      const hasXFA       = fullText.includes("/XFA");                       // dynamic form data
      const redactAnnot  = (fullText.match(/\/Subtype\s*\/Redact\b/g)    || []).length;

      // Font analysis — collect all BaseFont names
      const fontMatches  = [...fullText.matchAll(/\/BaseFont\s*\/([A-Za-z0-9+\-]+)/g)];
      const baseFonts    = new Set(fontMatches.map(m => m[1].replace(/^[A-Z]{6}\+/, ""))); // strip subset prefix
      // Suspicion: more than 4 distinct font families suggests edited content
      // (original invoice typically uses 1-2 families; editors add their own)
      const fontFamilies = new Set([...baseFonts].map(f => f.split("-")[0].split("_")[0]));

      // Object ID analysis — check for large gaps suggesting late additions
      const objIds = [...fullText.matchAll(/^(\d+)\s+0\s+obj\b/gm)].map(m => parseInt(m[1]));
      let maxGap = 0;
      const sortedIds = [...objIds].sort((a,b)=>a-b);
      for (let i = 1; i < sortedIds.length; i++) {
        const gap = sortedIds[i] - sortedIds[i-1];
        if (gap > maxGap) maxGap = gap;
      }
      // A gap > 50 in object IDs suggests objects were inserted from another document
      const hasIdGap = maxGap > 50 && objIds.length > 5;

      // Detect overlaid text: /BT ... ET blocks that appear AFTER the first one
      // (legitimate PDFs have one or two BT/ET runs per page; editors add more)
      const btBlocks = (fullText.match(/\bBT\b/g) || []).length;
      const etBlocks = (fullText.match(/\bET\b/g) || []).length;
      // If BT/ET blocks are extremely numerous relative to page count, suspect overlay
      // (approx 1 pdf page ≈ 2-6 text blocks)
      let pageCount = 1;
      try {
        const numPagesMatch = fullText.match(/\/N\s+(\d+)\s*\/Type\s*\/Pages/);
        if (numPagesMatch) pageCount = parseInt(numPagesMatch[1]) || 1;
      } catch {}
      const btPerPage = btBlocks / Math.max(1, pageCount);

      const findings  = [];
      const positives = [];
      const signals   = [];

      if (annotCount > 0) {
        signals.push({ type: "annotations", count: annotCount, weight: annotCount > 3 ? 1.0 : 0.65 });
      }
      if (stampCount > 0) {
        signals.push({ type: "stamp_objects", count: stampCount, weight: 0.75 });
      }
      if (acroForm) {
        signals.push({ type: "acroform_present", weight: 0.5 });
      }
      if (hasXFA) {
        signals.push({ type: "xfa_form_data", weight: 0.6 });
      }
      if (fontFamilies.size > 4) {
        signals.push({ type: "multiple_fonts", count: fontFamilies.size, weight: 0.6 });
      }
      if (hasIdGap) {
        signals.push({ type: "object_id_gap", gap: maxGap, weight: 0.7 });
      }
      if (btPerPage > 12) {
        signals.push({ type: "excessive_text_blocks", per_page: Math.round(btPerPage), weight: 0.65 });
      }

      const score = Math.min(100,
        signals.reduce((a, s) => a + s.weight * 35, 0)
      );
      const triggered = score >= 35;
      const confidence = 88;

      const measurements = {
        annotation_objects: annotCount,
        stamp_objects: stampCount,
        acroform: acroForm,
        xfa_form: hasXFA,
        font_families: fontFamilies.size,
        font_names: [...fontFamilies].slice(0,10),
        object_count: objIds.length,
        max_obj_id_gap: maxGap,
        bt_blocks_per_page: Math.round(btPerPage),
        signals_found: signals.length,
      };

      if (triggered) {
        const sigDesc = signals.map(s => {
          if (s.type === "annotations") return `${s.count} text annotation object${s.count>1?"s":""}`;
          if (s.type === "stamp_objects") return `${s.count} stamp object${s.count>1?"s":""}`;
          if (s.type === "acroform_present") return "form fields (AcroForm)";
          if (s.type === "xfa_form_data") return "XFA dynamic form data";
          if (s.type === "multiple_fonts") return `${s.count} distinct font families`;
          if (s.type === "object_id_gap") return `object ID gap of ${s.gap}`;
          if (s.type === "excessive_text_blocks") return `${s.per_page} text streams per page`;
