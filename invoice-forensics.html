      const qrSheet = XLSX.utils.aoa_to_sheet(qrRows);
      qrSheet["!cols"] = [{wch:28},{wch:60}];
      qrSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:1} }];
      XLSX.utils.book_append_sheet(wb, qrSheet, "QR Payload");
    }

    // ---- 9. Benford Distribution (conditional) ----
    if (report.benford_info && report.benford_info.distribution) {
      const b = report.benford_info;
      const benRows = [
        ["BENFORD'S LAW ANALYSIS — LINE-ITEM FIRST-DIGIT DISTRIBUTION"],
        [""],
        ["Chi-square statistic", b.chi_square],
        ["Sample size", b.sample_size],
        [""],
        ["Digit", "Observed count", "Observed %", "Expected % (Benford)", "Deviation %"],
      ];
      for (let d = 1; d <= 9; d++) {
        const row = b.distribution[d];
        if (!row) continue;
        const dev = +(row.observed_pct - row.expected_pct).toFixed(1);
        benRows.push([d, row.observed, row.observed_pct, row.expected_pct, dev]);
      }
      benRows.push([""]);
      benRows.push(["INTERPRETATION"]);
      benRows.push(["Benford's Law predicts first-digit frequencies for naturally occurring numerical data."]);
      benRows.push(["Digit 1 should appear ~30.1% of the time; digit 9 only ~4.6%."]);
      benRows.push(["Fabricated numbers often cluster around familiar digits and deviate significantly."]);
      benRows.push(["Chi-square > 15.5 (df=8, p<.05) indicates meaningful deviation."]);
      const benSheet = XLSX.utils.aoa_to_sheet(benRows);
      benSheet["!cols"] = [{wch:14},{wch:16},{wch:14},{wch:22},{wch:16}];
      benSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:4} }];
      XLSX.utils.book_append_sheet(wb, benSheet, "Benford Distribution");
    }

    // ---- 10. Methodology ----
    const methodology = [
      ["METHODOLOGY & INTERPRETATION GUIDE"],
      [""],
      ["This forensic examination runs up to 15 independent checks across five risk layers."],
      ["Each check produces a score (0-100), a confidence level, and either a finding (concern) or a positive (verified clean)."],
      [""],
      ["RISK LAYERS"],
      ["Layer", "Weight", "Description"],
      ["Metadata", "20%", "EXIF/PDF metadata for editor traces, timestamp mismatches, producer info."],
      ["Visual", "30%", "Pixel-level forensics — compression residuals, sensor patterns, copy-move, typography, alignment, JPEG ghost, double-compression, PDF edit history."],
      ["Content", "25%", "Field validation, GSTIN checksum, total reconciliation, QR authenticity, Benford's Law."],
      ["Duplicate", "15%", "SHA-256, perceptual hash, and fuzzy field matching against historical archive."],
      ["AI signals", "10%", "Synthetic-document indicators — noise cleanliness, palette flatness, OCR confidence uniformity, metadata vacuum."],
      [""],
      ["VERDICT BANDS"],
      ["Score", "Band", "Meaning"],
      ["0-19", "GENUINE", "No tampering indicators detected across any enabled check."],
      ["20-44", "LOW", "Minor inconsistencies, likely genuine but review recommended."],
      ["45-69", "SUSPICIOUS", "Multiple anomalies; manual review strongly recommended."],
      ["70-100", "HIGH_RISK", "Strong evidence of tampering, forgery, or synthetic generation."],
      [""],
      ["KEY CONCEPTS"],
      [""],
      ["Trigger threshold: Each detector has a calibrated score threshold. Below threshold, the"],
      ["detector produces a 'verified clean' positive; above, a finding. This prevents genuine"],
      ["documents from being flagged by natural variation (e.g. paper grain, JPEG edge effects)."],
      [""],
      ["Validity %: Inverse of suspicion score. A check with validity=100% means the detector"],
      ["found nothing suspicious. Validity=0% means a strong anomaly was detected."],
      [""],
      ["Confidence %: How reliable this detector's result is given available data."],
      ["Low confidence (<50%) usually means insufficient input — e.g. too few line items for Benford,"],
      ["too few OCR words for typography coherence, not applicable to file type (PDF structure on images)."],
      [""],
      ["PRIVACY"],
      [""],
      ["All analysis is performed locally in the browser. No files or data leave the device."],
      ["Historical archive is stored in browser IndexedDB and can be cleared from Settings."],
    ];
    const methodSheet = XLSX.utils.aoa_to_sheet(methodology);
    methodSheet["!cols"] = [{wch:18},{wch:10},{wch:90}];
    methodSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:2} }];
    XLSX.utils.book_append_sheet(wb, methodSheet, "Methodology");

    XLSX.writeFile(wb, `forensic_${report.job_id.slice(0,8)}.xlsx`);
  };

  // ============================================================
  // PowerPoint export — presentation-oriented deck
  // Slides: Title, Executive Summary, Risk Breakdown, Top Findings,
  // Verified Clean, Check Results Grid, Extracted Data, Visual Evidence,
  // QR (if present), Methodology
  // ============================================================
  IF.exportPpt = function(report) {
    if (!window.PptxGenJS) {
      alert("PowerPoint export library not loaded.");
      return;
    }
    const pptx = new PptxGenJS();
    pptx.layout = "LAYOUT_WIDE";  // 13.33 x 7.5 inches
    pptx.title = `Forensic Examination — ${report.filename}`;

    // Color palette aligned to verdict band
    const bandColors = {
      GENUINE:    { bg: "ECFDF5", fg: "065F46", accent: "10B981" },
      LOW:        { bg: "FEF9C3", fg: "713F12", accent: "EAB308" },
      SUSPICIOUS: { bg: "FED7AA", fg: "7C2D12", accent: "EA580C" },
      HIGH_RISK:  { bg: "FECACA", fg: "7F1D1D", accent: "DC2626" },
    };
    const C = bandColors[report.risk_band] || bandColors.LOW;
    const bandShort = { GENUINE:"GENUINE", LOW:"LOW RISK", SUSPICIOUS:"SUSPICIOUS", HIGH_RISK:"HIGH RISK" };

    // ---- Slide 1: Title ----
    let s = pptx.addSlide();
    s.background = { color: "0F172A" };
    s.addText("FORENSIC EXAMINATION", {
      x: 0.7, y: 2.2, w: 12, h: 0.5,
      fontSize: 16, fontFace: "Arial", color: "94A3B8", bold: true, charSpacing: 4,
    });
    s.addText(report.filename, {
      x: 0.7, y: 2.8, w: 12, h: 1.0,
      fontSize: 34, fontFace: "Arial", color: "FFFFFF", bold: true,
    });
    s.addShape(pptx.ShapeType.rect, {
      x: 0.7, y: 4.3, w: 4.2, h: 0.7, fill: { color: C.accent },
    });
    s.addText(bandShort[report.risk_band] || report.risk_band, {
      x: 0.7, y: 4.3, w: 4.2, h: 0.7,
      fontSize: 20, fontFace: "Arial", color: "FFFFFF", bold: true, align: "center", valign: "middle",
    });
    s.addText(`Score: ${report.risk_score.toFixed(0)} / 100`, {
      x: 5.1, y: 4.3, w: 4, h: 0.7,
      fontSize: 20, fontFace: "Arial", color: "E2E8F0", bold: true, valign: "middle",
    });
    s.addText(report.verdict.headline, {
      x: 0.7, y: 5.2, w: 12, h: 0.5,
      fontSize: 18, fontFace: "Arial", color: "CBD5E1", italic: true,
    });
    s.addText(`Generated ${new Date().toISOString().replace("T"," ").slice(0,19)} UTC · Job ${report.job_id.slice(0,12)}…`, {
      x: 0.7, y: 6.7, w: 12, h: 0.3,
      fontSize: 10, fontFace: "Arial", color: "64748B",
    });

    // ---- Slide 2: Executive Summary ----
    s = pptx.addSlide();
    s.addText("Executive Summary", {
      x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
    });
    s.addShape(pptx.ShapeType.rect, {
      x: 0.5, y: 1.0, w: 12.3, h: 1.2, fill: { color: C.bg }, line: { color: C.accent, width: 1.5 },
    });
    s.addText(report.verdict.headline, {
      x: 0.7, y: 1.15, w: 12, h: 0.5, fontSize: 20, bold: true, color: C.fg,
    });
    s.addText(report.verdict.subhead, {
      x: 0.7, y: 1.65, w: 12, h: 0.4, fontSize: 13, color: C.fg,
    });
    // Key metrics grid
    const highFindings = (report.findings.filter(f => f.severity === "high" || f.severity === "critical")).length;
    const metrics = [
      ["Total findings",     String(report.findings.length)],
      ["High-severity",      String(highFindings)],
      ["Verified clean",     String((report.positives||[]).length)],
      ["Evidence regions",   String(report.annotation_count || 0)],
      ["Checks run",         String(report.checks_run.length)],
      ["File type",          report.file_type.replace("_"," ")],
    ];
    metrics.forEach((m, i) => {
      const col = i % 3, row = Math.floor(i / 3);
      const x = 0.5 + col * 4.15;
      const y = 2.6 + row * 1.4;
      s.addShape(pptx.ShapeType.rect, {
        x, y, w: 3.9, h: 1.15, fill: { color: "F8FAFC" }, line: { color: "CBD5E1", width: 1 },
      });
      s.addText(m[0], { x: x + 0.2, y: y + 0.15, w: 3.6, h: 0.3, fontSize: 11, color: "64748B", bold: true });
      s.addText(m[1], { x: x + 0.2, y: y + 0.45, w: 3.6, h: 0.6, fontSize: 24, color: "0F172A", bold: true });
    });
    // Footer with file info
    s.addText(`File: ${report.filename} · ${(report.file_size/1024).toFixed(1)} KB · SHA: ${(report.sha256||"").slice(0,24)}…`, {
      x: 0.5, y: 7.0, w: 12.3, h: 0.3, fontSize: 9, color: "64748B",
    });

    // ---- Slide 3: Risk Breakdown ----
    s = pptx.addSlide();
    s.addText("Risk Breakdown", {
      x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
    });
    s.addText("Composite risk score is a weighted sum of five forensic layers.", {
      x: 0.5, y: 0.95, w: 12, h: 0.3, fontSize: 12, color: "64748B",
    });
    const bd = report.breakdown || {};
    const wts = report.weights_used || IF.DEFAULT_WEIGHTS;
    const layers = [
      { key: "metadata",  label: "Metadata",   score: bd.metadata  || 0, weight: wts.metadata },
      { key: "visual",    label: "Visual",     score: bd.visual    || 0, weight: wts.visual },
      { key: "content",   label: "Content",    score: bd.content   || 0, weight: wts.content },
      { key: "duplicate", label: "Duplicate",  score: bd.duplicate || 0, weight: wts.duplicate },
      { key: "ai",        label: "AI signals", score: bd.ai        || 0, weight: wts.ai },
    ];
    layers.forEach((l, i) => {
      const y = 1.5 + i * 1.05;
      s.addText(l.label, { x: 0.5, y, w: 2, h: 0.35, fontSize: 14, bold: true, color: "0F172A" });
      s.addText(`${l.score.toFixed(0)} / 100`, { x: 2.5, y, w: 1.5, h: 0.35, fontSize: 12, color: "0F172A" });
      s.addText(`weight ${(l.weight*100).toFixed(0)}%`, { x: 4.0, y, w: 1.5, h: 0.35, fontSize: 11, color: "64748B" });
      s.addText(`contrib ${(l.score * l.weight).toFixed(1)}`, { x: 5.5, y, w: 1.5, h: 0.35, fontSize: 11, color: "64748B" });
      // Bar
      const barX = 7.2, barW = 5.5;
      s.addShape(pptx.ShapeType.rect, {
        x: barX, y: y + 0.05, w: barW, h: 0.25,
        fill: { color: "E2E8F0" }, line: { type: "none" },
      });
      const barColor = l.score >= 70 ? "DC2626" : l.score >= 45 ? "EA580C" : l.score >= 20 ? "EAB308" : "10B981";
      s.addShape(pptx.ShapeType.rect, {
        x: barX, y: y + 0.05, w: barW * Math.min(1, l.score/100), h: 0.25,
        fill: { color: barColor }, line: { type: "none" },
      });
    });
    // Total
    s.addText("TOTAL", { x: 0.5, y: 6.9, w: 2, h: 0.4, fontSize: 14, bold: true, color: "0F172A" });
    s.addText(`${report.risk_score.toFixed(1)} / 100`, { x: 2.5, y: 6.9, w: 3, h: 0.4, fontSize: 14, bold: true, color: C.accent });

    // ---- Slide 4: Top Findings (if any) ----
    if (report.findings.length > 0) {
      s = pptx.addSlide();
      s.addText(`Findings (${report.findings.length})`, {
        x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
      });
      s.addText("Concerns flagged by forensic checks, sorted by severity.", {
        x: 0.5, y: 0.95, w: 12, h: 0.3, fontSize: 12, color: "64748B",
      });
      const order = { critical:0, high:1, medium:2, low:3 };
      const sorted = [...report.findings].sort((a,b) => (order[a.severity]||9) - (order[b.severity]||9));
      const tableRows = [
        [
          { text: "Severity", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
          { text: "Category", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
          { text: "Message",  options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
        ],
      ];
      const sevFill = { critical: "FECACA", high: "FED7AA", medium: "FEF9C3", low: "F1F5F9" };
      sorted.slice(0, 8).forEach(f => {
        tableRows.push([
          { text: f.severity.toUpperCase(), options: { fill: sevFill[f.severity] || "F1F5F9", fontSize: 10, bold: true } },
          { text: f.category, options: { fontSize: 10 } },
          { text: f.message, options: { fontSize: 10 } },
        ]);
      });
      s.addTable(tableRows, {
        x: 0.5, y: 1.4, w: 12.3,
        colW: [1.3, 1.5, 9.5],
        border: { type: "solid", color: "E2E8F0", pt: 0.5 },
        rowH: 0.55,
      });
      if (sorted.length > 8) {
        s.addText(`… and ${sorted.length - 8} more (see Excel export for full list).`, {
          x: 0.5, y: 6.8, w: 12, h: 0.3, fontSize: 10, italic: true, color: "64748B",
        });
      }
    }

    // ---- Slide 5: Verified Clean ----
    if ((report.positives || []).length > 0) {
      s = pptx.addSlide();
      s.addText(`Verified Clean (${(report.positives||[]).length})`, {
        x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "065F46",
      });
      s.addText("Checks that came back clean — visible evidence of genuineness.", {
        x: 0.5, y: 0.95, w: 12, h: 0.3, fontSize: 12, color: "64748B",
      });
      const pos = (report.positives || []).slice(0, 10);
      pos.forEach((p, i) => {
        const y = 1.5 + i * 0.55;
        s.addShape(pptx.ShapeType.ellipse, {
          x: 0.5, y: y + 0.1, w: 0.3, h: 0.3, fill: { color: "10B981" }, line: { type: "none" },
        });
        s.addText("✓", {
          x: 0.5, y: y + 0.08, w: 0.3, h: 0.32, fontSize: 14, bold: true, color: "FFFFFF", align: "center", valign: "middle",
        });
        s.addText(p.message, { x: 1.0, y, w: 11.8, h: 0.45, fontSize: 11, color: "0F172A" });
      });
      if ((report.positives || []).length > 10) {
        s.addText(`… and ${(report.positives||[]).length - 10} more (see Excel export).`, {
          x: 0.5, y: 7.1, w: 12, h: 0.3, fontSize: 10, italic: true, color: "64748B",
        });
      }
    }

    // ---- Slide 6: Check Results Grid ----
    s = pptx.addSlide();
    s.addText("Per-Check Results", {
      x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
    });
    s.addText("Every forensic detector and its validity percentage.", {
      x: 0.5, y: 0.95, w: 12, h: 0.3, fontSize: 12, color: "64748B",
    });
    const cr = report.check_results || {};
    const gridRows = [
      [
        { text: "Check",        options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
        { text: "Validity %",   options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10, align: "center" } },
        { text: "Confidence %", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10, align: "center" } },
        { text: "Verdict",      options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
      ],
    ];
    for (const [key, c] of Object.entries(cr)) {
      const validColor = c.confidence === 0 ? "94A3B8" : c.valid_pct >= 80 ? "10B981" : c.valid_pct >= 50 ? "EAB308" : "DC2626";
      const verdict = c.confidence === 0 ? "N/A"
                      : c.triggered && c.score >= 70 ? "Concern"
                      : c.triggered ? "Note"
                      : "Clean";
      gridRows.push([
        { text: c.label, options: { fontSize: 9 } },
        { text: c.confidence === 0 ? "—" : String(c.valid_pct) + "%", options: { fontSize: 9, align: "center", color: validColor, bold: true } },
        { text: c.confidence === 0 ? "—" : String(c.confidence) + "%", options: { fontSize: 9, align: "center" } },
        { text: verdict, options: { fontSize: 9 } },
      ]);
    }
    s.addTable(gridRows, {
      x: 0.5, y: 1.4, w: 12.3,
      colW: [5.5, 2, 2, 2.8],
      border: { type: "solid", color: "E2E8F0", pt: 0.5 },
      rowH: 0.3,
    });

    // ---- Slide 7: Extracted Data ----
    s = pptx.addSlide();
    s.addText("Extracted Invoice Data", {
      x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
    });
    const ex = report.extracted || {};
    const fieldPairs = [
      ["Invoice number",  ex.invoice_number || "— not extracted"],
      ["Date",            ex.invoice_date || "— not extracted"],
      ["Vendor",          ex.vendor_name || "— not extracted"],
      ["GSTIN",           ex.gstin || "— not extracted"],
      ["Amount",          ex.amount != null ? ex.amount.toFixed(2) : "— not extracted"],
      ["Line items",      String((ex.line_items||[]).length)],
    ];
    fieldPairs.forEach((fp, i) => {
      const y = 1.5 + i * 0.6;
      s.addText(fp[0], { x: 0.5, y, w: 3, h: 0.4, fontSize: 13, bold: true, color: "64748B" });
      s.addText(String(fp[1]), { x: 3.7, y, w: 9.1, h: 0.4, fontSize: 13, color: "0F172A" });
    });

    // ---- Slide 8: Visual Evidence ----
    if (report.annotated_data_url) {
      s = pptx.addSlide();
      s.addText(`Visual Evidence ${report.annotation_count > 0 ? `(${report.annotation_count} regions)` : "(clean)"}`, {
        x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
      });
      try {
        s.addImage({
          data: report.annotated_data_url,
          x: 1.5, y: 1.0, w: 10.3, h: 6.2,
          sizing: { type: "contain", w: 10.3, h: 6.2 },
        });
      } catch {}
    }

    // ---- Slide 9: QR Verification (conditional) ----
    if (report.qr_info) {
      s = pptx.addSlide();
      s.addText("QR Code Verification", {
        x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
      });
      const qr = report.qr_info;
      const qrPairs = [
        ["Format",           qr.jwt_format ? "Signed JWT (e-invoice format)" : "Plain JSON or text"],
        ["Issuer",           qr.issuer || "—"],
        ["Matched fields",   (qr.matched_fields||[]).join(", ") || "none"],
        ["Mismatched fields",(qr.mismatched_fields||[]).join(", ") || "none"],
      ];
      qrPairs.forEach((p, i) => {
        const y = 1.5 + i * 0.7;
        s.addText(p[0], { x: 0.5, y, w: 3, h: 0.4, fontSize: 14, bold: true, color: "64748B" });
        s.addText(p[1], { x: 3.7, y, w: 9.1, h: 0.4, fontSize: 14, color: "0F172A" });
      });
      if (qr.parsed) {
        s.addText("Decoded payload", {
          x: 0.5, y: 4.5, w: 12, h: 0.3, fontSize: 12, bold: true, color: "64748B",
        });
        const payloadText = JSON.stringify(qr.parsed, null, 2).slice(0, 1000);
        s.addText(payloadText, {
          x: 0.5, y: 4.9, w: 12.3, h: 2.3, fontSize: 10, fontFace: "Courier New", color: "0F172A",
        });
      }
    }

    // ---- Slide 10: Methodology ----
    s = pptx.addSlide();
    s.addText("Methodology", {
      x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A",
    });
    s.addText("How this verdict was reached.", {
      x: 0.5, y: 0.95, w: 12, h: 0.3, fontSize: 12, color: "64748B",
    });
    const methText = [
      "• 15 independent forensic checks grouped into 5 risk layers (metadata, visual, content, duplicate, AI).",
      "• Each detector has a calibrated trigger threshold. Below threshold, the detector produces a 'verified clean' positive rather than a low-confidence finding — preventing genuine documents from being falsely flagged.",
      "• Composite risk score = weighted sum of layer scores. Weights: Metadata 20%, Visual 30%, Content 25%, Duplicate 15%, AI 10%.",
      "• Verdict bands: 0-19 Genuine, 20-44 Low, 45-69 Suspicious, 70-100 High Risk.",
      "• All analysis is performed locally in the browser. No files leave the device.",
      "",
      "This tool supplements, not replaces, human review. For high-stakes decisions, always corroborate with source verification (e.g. direct vendor contact, GST portal lookup).",
    ];
    methText.forEach((t, i) => {
      s.addText(t, { x: 0.5, y: 1.5 + i * 0.55, w: 12.3, h: 0.5, fontSize: 12, color: "0F172A" });
    });

    pptx.writeFile({ fileName: `forensic_${report.job_id.slice(0,8)}.pptx` });
  };

  // ============================================================
  // Archive batch export — Excel workbook summarizing all cases
  // ============================================================
  IF.exportArchiveExcel = function(jobs) {
    if (!window.XLSX) { alert("Excel export library not loaded."); return; }
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();
    const nGenuine = jobs.filter(j => j.risk_band === "GENUINE").length;
    const nLow     = jobs.filter(j => j.risk_band === "LOW").length;
    const nSusp    = jobs.filter(j => j.risk_band === "SUSPICIOUS").length;
    const nHigh    = jobs.filter(j => j.risk_band === "HIGH_RISK").length;
    const totalAmt = jobs.reduce((a,j) => a + (j.amount || 0), 0);

    // Summary sheet
    const summary = [
      ["CASE ARCHIVE — BATCH SUMMARY"],
      [""],
      ["Generated", new Date().toISOString().replace("T"," ").slice(0,19) + " UTC"],
      ["Total examinations", jobs.length],
      [""],
      ["VERDICT DISTRIBUTION"],
      ["Verdict", "Count", "% of total"],
      ["Genuine",    nGenuine, jobs.length ? `${(nGenuine/jobs.length*100).toFixed(1)}%` : ""],
      ["Low risk",   nLow,     jobs.length ? `${(nLow/jobs.length*100).toFixed(1)}%` : ""],
      ["Suspicious", nSusp,    jobs.length ? `${(nSusp/jobs.length*100).toFixed(1)}%` : ""],
      ["High risk",  nHigh,    jobs.length ? `${(nHigh/jobs.length*100).toFixed(1)}%` : ""],
      [""],
      ["FINANCIAL EXPOSURE"],
      ["Total invoice value examined", +totalAmt.toFixed(2)],
      ["Value in concerning cases", +jobs.filter(j => j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK").reduce((a,j) => a + (j.amount || 0), 0).toFixed(2)],
    ];
    const sumSheet = XLSX.utils.aoa_to_sheet(summary);
    sumSheet["!cols"] = [{wch:34},{wch:14},{wch:14}];
    sumSheet["!merges"] = [{s:{r:0,c:0},e:{r:0,c:2}}];
    XLSX.utils.book_append_sheet(wb, sumSheet, "Batch Summary");

    // All cases sheet
    const headers = ["Filename","File type","Vendor","Invoice #","Date","Amount",
                     "GSTIN","Risk score","Genuineness %","Verdict","Findings","Examined at","Job ID","SHA-256"];
    const rows = [headers];
    for (const j of jobs) {
      rows.push([
        j.filename, (j.file_type || "").replace("_"," "), j.vendor || "",
        j.invoice_no || "", j.invoice_date || "",
        j.amount != null ? j.amount : "",
        j.gstin || "",
        j.risk_score != null ? +j.risk_score.toFixed(1) : "",
        j.risk_score != null ? +(100 - j.risk_score).toFixed(1) : "",
        j.risk_band || "",
        j.n_findings || 0,
        j.created_at || "",
        j.id || "",
        (j.sha256 || "").slice(0, 16) + "…",
      ]);
    }
    const allSheet = XLSX.utils.aoa_to_sheet(rows);
    allSheet["!cols"] = [{wch:32},{wch:14},{wch:24},{wch:16},{wch:12},{wch:12},
                         {wch:20},{wch:12},{wch:14},{wch:14},{wch:10},{wch:20},{wch:22},{wch:20}];
    XLSX.utils.book_append_sheet(wb, allSheet, "All Cases");

    // Concerning cases only
    const concerning = jobs.filter(j => j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK");
    const cRows = [headers];
    for (const j of concerning) {
      cRows.push([
        j.filename, (j.file_type || "").replace("_"," "), j.vendor || "",
        j.invoice_no || "", j.invoice_date || "",
        j.amount != null ? j.amount : "",
        j.gstin || "",
        j.risk_score != null ? +j.risk_score.toFixed(1) : "",
        j.risk_score != null ? +(100 - j.risk_score).toFixed(1) : "",
        j.risk_band || "", j.n_findings || 0, j.created_at || "", j.id || "",
        (j.sha256 || "").slice(0, 16) + "…",
      ]);
    }
    const cSheet = XLSX.utils.aoa_to_sheet(cRows);
    cSheet["!cols"] = allSheet["!cols"];
    XLSX.utils.book_append_sheet(wb, cSheet, "Concerning Cases");

    XLSX.writeFile(wb, `forensic_archive_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  // ============================================================
  // Archive batch export — PowerPoint deck summarizing all cases
  // ============================================================
  IF.exportArchivePpt = function(jobs) {
    if (!window.PptxGenJS) { alert("PowerPoint export library not loaded."); return; }
    const pptx = new PptxGenJS();
    pptx.layout = "LAYOUT_WIDE";
    pptx.title = `Forensic Archive — Batch Summary`;

    const nGenuine = jobs.filter(j => j.risk_band === "GENUINE").length;
    const nLow     = jobs.filter(j => j.risk_band === "LOW").length;
    const nSusp    = jobs.filter(j => j.risk_band === "SUSPICIOUS").length;
    const nHigh    = jobs.filter(j => j.risk_band === "HIGH_RISK").length;
    const concerning = jobs.filter(j => j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK");
    const totalAmt = jobs.reduce((a,j) => a + (j.amount || 0), 0);
    const concerningAmt = concerning.reduce((a,j) => a + (j.amount || 0), 0);

    // Slide 1: Title
    let s = pptx.addSlide();
    s.background = { color: "0F172A" };
    s.addText("FORENSIC ARCHIVE", {
      x: 0.7, y: 2.2, w: 12, h: 0.5,
      fontSize: 16, fontFace: "Arial", color: "94A3B8", bold: true, charSpacing: 4,
    });
    s.addText("Batch Summary Report", {
      x: 0.7, y: 2.8, w: 12, h: 1.0,
      fontSize: 38, fontFace: "Arial", color: "FFFFFF", bold: true,
    });
    s.addText(`${jobs.length} case${jobs.length === 1 ? "" : "s"} examined`, {
      x: 0.7, y: 4.2, w: 12, h: 0.5,
      fontSize: 20, fontFace: "Arial", color: "CBD5E1",
    });
    s.addText(`Generated ${new Date().toISOString().replace("T"," ").slice(0,19)} UTC`, {
      x: 0.7, y: 6.7, w: 12, h: 0.3,
      fontSize: 10, fontFace: "Arial", color: "64748B",
    });

    // Slide 2: Overall stats
    s = pptx.addSlide();
    s.addText("Overview", { x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A" });
    const tiles = [
      { label: "Cases examined",     value: String(jobs.length),   color: "0F172A" },
      { label: "Cleared as genuine", value: String(nGenuine),      color: "10B981" },
      { label: "Concerning",         value: String(nSusp + nHigh), color: nSusp + nHigh > 0 ? "DC2626" : "10B981" },
      { label: "Low-risk notes",     value: String(nLow),          color: "EAB308" },
      { label: "Total invoice value", value: totalAmt > 0 ? totalAmt.toFixed(2) : "—", color: "0F172A" },
      { label: "Value at risk",      value: concerningAmt > 0 ? concerningAmt.toFixed(2) : "—", color: concerningAmt > 0 ? "DC2626" : "0F172A" },
    ];
    tiles.forEach((t, i) => {
      const col = i % 3, row = Math.floor(i / 3);
      const x = 0.5 + col * 4.15, y = 1.3 + row * 1.6;
      s.addShape(pptx.ShapeType.rect, {
        x, y, w: 3.9, h: 1.35, fill: { color: "F8FAFC" }, line: { color: "CBD5E1", width: 1 },
      });
      s.addText(t.label, { x: x + 0.2, y: y + 0.18, w: 3.6, h: 0.3, fontSize: 11, color: "64748B", bold: true });
      s.addText(t.value, { x: x + 0.2, y: y + 0.52, w: 3.6, h: 0.75, fontSize: 30, color: t.color, bold: true });
    });

    // Slide 3: Verdict distribution chart
    s = pptx.addSlide();
    s.addText("Verdict Distribution", { x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A" });
    const distRows = [
      ["Verdict", "Count", "% of total"],
      ["Genuine",    nGenuine, jobs.length ? `${(nGenuine/jobs.length*100).toFixed(1)}%` : "—"],
      ["Low risk",   nLow,     jobs.length ? `${(nLow/jobs.length*100).toFixed(1)}%` : "—"],
      ["Suspicious", nSusp,    jobs.length ? `${(nSusp/jobs.length*100).toFixed(1)}%` : "—"],
      ["High risk",  nHigh,    jobs.length ? `${(nHigh/jobs.length*100).toFixed(1)}%` : "—"],
    ];
    const distColors = ["10B981", "EAB308", "EA580C", "DC2626"];
    distRows.forEach((r, i) => {
      const y = 1.3 + i * 0.55;
      const bg = i === 0 ? "0F172A" : "FFFFFF";
      const fg = i === 0 ? "FFFFFF" : "0F172A";
      s.addShape(pptx.ShapeType.rect, {
        x: 0.5, y, w: 12.3, h: 0.5, fill: { color: bg }, line: { color: "CBD5E1", width: 0.5 },
      });
      s.addText(r[0], { x: 0.7, y, w: 3, h: 0.5, fontSize: 13, bold: i === 0, color: fg, valign: "middle" });
      s.addText(String(r[1]), { x: 3.7, y, w: 2, h: 0.5, fontSize: 13, bold: i === 0, color: fg, valign: "middle" });
      s.addText(String(r[2]), { x: 5.7, y, w: 2, h: 0.5, fontSize: 13, bold: i === 0, color: fg, valign: "middle" });
      // Bar
      if (i > 0 && jobs.length > 0) {
        const pct = r[1] / jobs.length;
        const barX = 8.0, barW = 4.5;
        s.addShape(pptx.ShapeType.rect, {
          x: barX, y: y + 0.12, w: barW, h: 0.26,
          fill: { color: "E2E8F0" }, line: { type: "none" },
        });
        s.addShape(pptx.ShapeType.rect, {
          x: barX, y: y + 0.12, w: Math.max(0.02, barW * pct), h: 0.26,
          fill: { color: distColors[i - 1] }, line: { type: "none" },
        });
      }
    });

    // Slide 4+: Top concerning cases
    if (concerning.length > 0) {
      s = pptx.addSlide();
      s.addText(`Concerning Cases (${concerning.length})`, { x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A" });
      s.addText("Cases flagged as suspicious or high risk — sorted by risk score.", {
        x: 0.5, y: 0.95, w: 12, h: 0.3, fontSize: 12, color: "64748B",
      });
      const sorted = [...concerning].sort((a,b) => (b.risk_score || 0) - (a.risk_score || 0));
      const tableRows = [
        [
          { text: "File", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
          { text: "Vendor", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
          { text: "Amount", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
          { text: "Risk", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10, align: "center" } },
          { text: "Verdict", options: { bold: true, fill: "0F172A", color: "FFFFFF", fontSize: 10 } },
        ],
      ];
      sorted.slice(0, 12).forEach(j => {
        const fill = j.risk_band === "HIGH_RISK" ? "FECACA" : "FED7AA";
        tableRows.push([
          { text: (j.filename || "").slice(0, 40), options: { fontSize: 9, fill } },
          { text: (j.vendor || "—").slice(0, 28), options: { fontSize: 9, fill } },
          { text: j.amount != null ? j.amount.toFixed(2) : "—", options: { fontSize: 9, fill } },
          { text: j.risk_score != null ? j.risk_score.toFixed(0) : "—", options: { fontSize: 9, fill, bold: true, align: "center" } },
          { text: j.risk_band === "HIGH_RISK" ? "High risk" : "Suspicious", options: { fontSize: 9, fill } },
        ]);
      });
      s.addTable(tableRows, {
        x: 0.5, y: 1.45, w: 12.3,
        colW: [4.5, 3.5, 1.5, 1.0, 1.8],
        border: { type: "solid", color: "E2E8F0", pt: 0.5 },
        rowH: 0.4,
      });
      if (sorted.length > 12) {
        s.addText(`… and ${sorted.length - 12} more (see Excel export for complete list).`, {
          x: 0.5, y: 7.1, w: 12, h: 0.3, fontSize: 10, italic: true, color: "64748B",
        });
      }
    }

    // Final slide: methodology
    s = pptx.addSlide();
    s.addText("About these findings", { x: 0.5, y: 0.3, w: 12, h: 0.6, fontSize: 24, bold: true, color: "0F172A" });
    const method = [
      "• Each case was examined against up to 15 independent forensic checks covering metadata, image forensics, field validation, duplicate detection, and synthetic-document signals.",
      "• Verdicts: Genuine (0–19), Low risk (20–44), Suspicious (45–69), High risk (70–100).",
      "• \"Genuineness %\" = 100 – risk score. A case at 92% genuine has a 8-point risk score; one at 25% genuine has a 75-point risk score (high risk).",
      "• All analysis ran locally in the examining browser. No files or data were transmitted.",
      "",
      "This batch report supplements — it does not replace — human review. For high-stakes decisions, corroborate with source verification (direct vendor contact, GST portal lookup, payment records).",
    ];
    method.forEach((t, i) => {
      s.addText(t, { x: 0.5, y: 1.4 + i * 0.7, w: 12.3, h: 0.65, fontSize: 12, color: "0F172A" });
    });

    pptx.writeFile({ fileName: `forensic_archive_${new Date().toISOString().slice(0,10)}.pptx` });
  };

  // ============================================================
  // Analytics
  // ============================================================
  IF.analytics = async function() {
    const jobs = await IF.db.allJobs();
    const byBand = { GENUINE:0, LOW:0, SUSPICIOUS:0, HIGH_RISK:0 };
    const byType = { image:0, pdf_native:0, pdf_scanned:0, unknown:0 };
    let totalAmount = 0, nWithAmount = 0;
    const vendorCounts = new Map();
    const hashCollisions = new Map();
    for (const j of jobs) {
      byBand[j.risk_band] = (byBand[j.risk_band] || 0) + 1;
      byType[j.file_type] = (byType[j.file_type] || 0) + 1;
      if (j.amount) { totalAmount += j.amount; nWithAmount++; }
      if (j.vendor) vendorCounts.set(j.vendor, (vendorCounts.get(j.vendor) || 0) + 1);
      if (j.sha256) {
        if (!hashCollisions.has(j.sha256)) hashCollisions.set(j.sha256, []);
        hashCollisions.get(j.sha256).push(j);
      }
    }
    const topVendors = [...vendorCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 10);
    const hashDuplicates = [...hashCollisions.entries()].filter(([, v]) => v.length > 1);
    const uf = new Map();
    const find = x => { while (uf.get(x) !== x) { uf.set(x, uf.get(uf.get(x))); x = uf.get(x); } return x; };
    const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) uf.set(ra, rb); };
    for (const j of jobs) if (j.phash) uf.set(j.id, j.id);
    const withPhash = jobs.filter(j => j.phash);
    for (let i = 0; i < withPhash.length; i++)
      for (let k = i+1; k < withPhash.length; k++)
        if (IF.hammingHex(withPhash[i].phash, withPhash[k].phash) <= 8)
          union(withPhash[i].id, withPhash[k].id);
    const clusters = new Map();
    for (const j of withPhash) {
      const root = find(j.id);
      if (!clusters.has(root)) clusters.set(root, []);
      clusters.get(root).push(j);
    }
    const phashClusters = [...clusters.values()].filter(arr => arr.length > 1);
    const daily = new Map();
    const now = new Date();
    for (let i = 0; i < 30; i++) {
      const d = new Date(now); d.setDate(d.getDate() - i);
      daily.set(d.toISOString().slice(0,10), { total:0, high:0 });
    }
    for (const j of jobs) {
      const day = (j.created_at || "").slice(0,10);
      if (daily.has(day)) {
        daily.get(day).total++;
        if (j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK") daily.get(day).high++;
      }
    }
    const trend = [...daily.entries()].reverse().map(([d, v]) => ({ date: d, ...v }));

    return {
      n_total: jobs.length,
      n_genuine: byBand.GENUINE,
      n_concerning: byBand.SUSPICIOUS + byBand.HIGH_RISK,
      total_amount: totalAmount,
      n_with_amount: nWithAmount,
      by_band: byBand,
      by_type: byType,
      top_vendors: topVendors.map(([v, n]) => ({ vendor: v, count: n })),
      hash_duplicates: hashDuplicates.map(([sha, arr]) => ({ sha, jobs: arr })),
      phash_clusters: phashClusters,
      trend,
    };
  };

  return IF;
})();
</script>

function MetricCard({ label, value, hint, tone, icon }) {

    neutral: { text: "text-slate-900",   iconBg: "bg-slate-100 text-slate-700" },

  return (
    <Card padding="p-4">

        <div className="min-w-0 flex-1">
          <div className="text-[11px] font-medium tracking-wider uppercase text-slate-500">{label}</div>

function VerdictBadge({ band, score, size = "md" }) {

// ============================================================
// CHART WRAPPER
// ============================================================
function ChartCanvas({ type, data, options, height = 220, id }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (inst.current) inst.current.destroy();
    inst.current = new window.Chart(ref.current, {
      type, data,
      options: Object.assign({
        maintainAspectRatio: false, responsive: true,
        plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, boxWidth: 10, boxHeight: 10, usePointStyle: true, padding: 14 } } },
      }, options || {}),
    });
    return () => inst.current?.destroy();
  }, [type, JSON.stringify(data), JSON.stringify(options)]);
  return <div style={{ height, position: "relative" }}><canvas ref={ref} id={id} /></div>;
}

          <Btn variant="default" size="lg" onClick={() => onGoto("upload")}>
            Start a new examination <Icon name="chevron" size={14} />
          </Btn>
        </Card>
      </>
    );
  }

  const bandChart = {
    labels: ["Genuine", "Low risk", "Suspicious", "High risk"],
    datasets: [{
      data: [data.by_band.GENUINE, data.by_band.LOW, data.by_band.SUSPICIOUS, data.by_band.HIGH_RISK],

    }],
  };
  const trendChart = {
    labels: data.trend.map(t => t.date.slice(5)),
    datasets: [
      { label: "All examinations", data: data.trend.map(t => t.total),
        borderColor: "#64748b", backgroundColor: "rgba(100,116,139,.12)", tension: 0.35, fill: true, pointRadius: 0 },
      { label: "Concerning",        data: data.trend.map(t => t.high),
        borderColor: "#dc2626", backgroundColor: "rgba(220,38,38,.18)", tension: 0.35, fill: true, pointRadius: 0 },
    ],
  };
  const vendorChart = {
    labels: data.top_vendors.map(v => v.vendor.length > 24 ? v.vendor.slice(0,22) + "…" : v.vendor),
    datasets: [{ label: "Invoices", data: data.top_vendors.map(v => v.count), backgroundColor: "#6366f1", borderWidth: 0, borderRadius: 4 }],
  };

  return (
    <>
      <PageHeader eyebrow="Overview" title="Dashboard"
                  subtitle="Cross-examination analytics across your case archive"

function UploadPage({ onViewJob, onDone }) {
  const [checks, setChecks] = useState(window.IF.DEFAULT_CHECKS);
  const [queue, setQueue] = useState([]);
  const [running, setRunning] = useState(false);
  const [showCheckDetail, setShowCheckDetail] = useState(null);

  const toggleCheck = (k) => setChecks(c => ({ ...c, [k]: !c[k] }));
  const allOn = () => setChecks(Object.fromEntries(Object.keys(window.IF.DEFAULT_CHECKS).map(k => [k, true])));
  const fastMode = () => setChecks({ ...window.IF.DEFAULT_CHECKS, ocr: false, font: false, copy_move: false });

  const addFiles = (fileList) => {
    const entries = [...fileList].map(f => ({
      id: crypto.randomUUID().replace(/-/g, ""), file: f,
      filename: f.name, size: f.size,
      status: "pending", progress: "",
      risk_band: null, risk_score: null, error: null,
    }));
    setQueue(q => [...q, ...entries]);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    if (e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
  };

  const processEntry = async (entry, update) => {
    update({ status: "running", progress: "starting" });
    try {
      const weights = (await window.IF.db.getSetting("weights"))?.value || window.IF.DEFAULT_WEIGHTS;
      const report = await window.IF.runPipeline(entry.file, entry.id, {
        checks, weights,
        onProgress: (stage, msg) => update({ progress: msg || stage }),
      });
      update({
        status: "done", progress: "",
        risk_band: report.risk_band, risk_score: report.risk_score,
      });
    } catch (err) {
      console.error(err);
      update({ status: "error", error: err.message || String(err), progress: "" });
    }
  };

  const processAll = async () => {
    if (running) return;
    setRunning(true);
    const pending = queue.filter(q => q.status === "pending");
    const inFlight = new Set();
    let index = 0;
    const update = (id, patch) => setQueue(q => q.map(x => x.id === id ? { ...x, ...patch } : x));
    while (index < pending.length || inFlight.size > 0) {
      while (inFlight.size < 2 && index < pending.length) {
        const entry = pending[index++];
        const p = processEntry(entry, patch => update(entry.id, patch)).finally(() => inFlight.delete(p));
        inFlight.add(p);
      }
      if (inFlight.size > 0) await Promise.race(inFlight);
    }
    setRunning(false);
    if (onDone) onDone();
  };

  const pending = queue.filter(q => q.status === "pending").length;
  const done = queue.filter(q => q.status === "done").length;
  const errors = queue.filter(q => q.status === "error").length;
  const activeChecks = Object.values(checks).filter(Boolean).length;

  return (
    <>
      <PageHeader eyebrow="Intake" title="New forensic examination"
                  subtitle="Drop invoices for tampering analysis — PDF, scanned images, and native PDFs, mixed in one batch"
                  actions={
                    <>
                      <Btn variant="secondary" size="md" onClick={fastMode}>Fast mode</Btn>
                      <Btn variant="secondary" size="md" onClick={allOn}>Full examination</Btn>
                    </>
                  } />

      {/* Check selector */}
      <Card className="mb-5">
        <div className="flex items-center justify-between mb-3">
          <div>
            <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider">Forensic checks to run</div>
            <div className="text-[11px] text-slate-400 mt-0.5">{activeChecks} of {Object.keys(checks).length} enabled</div>
          </div>
        </div>
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
          {Object.entries(window.IF.CHECK_LABELS).map(([k, label]) => {
            const slow = (k === "ocr" || k === "copy_move");
            const on = !!checks[k];
            return (
              <button key={k} onClick={() => toggleCheck(k)}
                      onMouseEnter={() => setShowCheckDetail(k)}
                      onMouseLeave={() => setShowCheckDetail(null)}
                      className={`relative text-left p-2.5 rounded-md border transition-all ${
                        on ? "border-slate-900 bg-slate-50"
                           : "border-slate-200 bg-white hover:border-slate-300"
                      }`}>
                <div className="flex items-start gap-2">
                  <div className={`flex-shrink-0 w-4 h-4 rounded mt-0.5 flex items-center justify-center transition-colors ${
                    on ? "bg-slate-900 text-white" : "border border-slate-300"
                  }`}>
                    {on && <Icon name="check" size={11} className="stroke-[3]" />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <span className="text-sm font-medium text-slate-900">{label}</span>
                      {slow && <span className="text-[9px] px-1 py-0 bg-amber-100 text-amber-800 rounded font-medium uppercase tracking-wider">slow</span>}
                    </div>
                  </div>
                </div>
                {showCheckDetail === k && (
                  <div className="absolute top-full left-0 right-0 mt-1 bg-slate-900 text-slate-100 text-[11px] p-2.5 rounded-md shadow-lg z-10 leading-relaxed">
                    {window.IF.CHECK_DESCRIPTIONS[k]}
                  </div>
                )}
              </button>
            );
          })}
        </div>
      </Card>

      {/* Drop zone */}
      <Card className="mb-5">
        <div
          onDragOver={(e) => e.preventDefault()}
          onDrop={handleDrop}
          className="border-2 border-dashed border-slate-300 hover:border-slate-400 rounded-lg p-10 text-center transition-colors"
        >
          <div className="mx-auto w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 mb-3">
            <Icon name="upload" size={22} />
          </div>
          <div className="text-sm text-slate-700 mb-1 font-medium">Drop files here</div>
          <div className="text-xs text-slate-500 mb-4">PDF · JPG · PNG · TIFF · mixed formats in one batch</div>
          <label className="inline-block">
            <Btn variant="default" size="md">Browse files</Btn>
            <input type="file" multiple hidden
                   accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp,.webp"
                   onChange={(e) => { if (e.target.files.length) addFiles(e.target.files); e.target.value = ""; }} />
          </label>
        </div>
      </Card>

      {/* Queue */}
      {queue.length > 0 && (
        <Card padding="p-0" className="overflow-hidden">
          <div className="flex items-center justify-between px-5 py-3 border-b border-slate-200 flex-wrap gap-2">
            <div className="flex items-center gap-4 text-xs">
              <span className="font-semibold text-slate-700">{queue.length} file{queue.length===1?"":"s"} in batch</span>
              <span className="text-slate-500">
                {pending > 0 && <span className="text-amber-700 mr-3">{pending} pending</span>}
                {done > 0 && <span className="text-emerald-700 mr-3">{done} done</span>}
                {errors > 0 && <span className="text-red-700">{errors} error{errors===1?"":"s"}</span>}
              </span>
            </div>
            <div className="flex gap-2">
              <Btn variant="secondary" size="md" disabled={running} onClick={() => setQueue([])}>Clear</Btn>
              <Btn variant="default" size="md" disabled={running || pending === 0} onClick={processAll}>
                {running ? "Examining…" : `Analyze ${pending} file${pending===1?"":"s"}`}
              </Btn>
            </div>
          </div>
          <div className="divide-y divide-slate-100">
            {queue.map(q => <QueueRow key={q.id} entry={q} onView={onViewJob}
                                      onRemove={id => setQueue(qq => qq.filter(x => x.id !== id))} />)}
          </div>
        </Card>
      )}
    </>
  );
}

function QueueRow({ entry, onView, onRemove }) {
  const iconMap = {
    pending: { icon: "file",  cls: "text-slate-400" },
    running: { icon: "zap",   cls: "text-blue-500 animate-pulse" },
    done:    { icon: "check", cls: "text-emerald-500" },
    error:   { icon: "x",     cls: "text-red-500" },
  };
  const st = iconMap[entry.status] || iconMap.pending;
  return (
    <div className="flex items-center gap-3 px-5 py-3 hover:bg-slate-50 transition-colors">
      <div className={`${st.cls} flex-shrink-0`}>
        <Icon name={st.icon} size={18} />
      </div>
      <div className="flex-1 min-w-0">
        <div className="text-sm font-medium text-slate-900 truncate">{entry.filename}</div>
        <div className="text-xs text-slate-500 flex items-center gap-2 mt-0.5">
          <span className="tabular-nums">{(entry.size / 1024).toFixed(1)} KB</span>
          {entry.status === "running" && entry.progress && (
            <>
              <span className="text-slate-300">·</span>
              <span className="italic text-blue-600">{entry.progress}</span>
            </>
          )}
          {entry.status === "error" && (
            <>
              <span className="text-slate-300">·</span>
              <span className="text-red-600 truncate">{entry.error}</span>
            </>
          )}
        </div>
      </div>
      {entry.risk_band && <VerdictBadge band={entry.risk_band} score={entry.risk_score} size="sm" />}
      {entry.status === "done" && (
        <Btn size="sm" variant="secondary" onClick={() => onView(entry.id)}>
          View <Icon name="chevron" size={11} />
        </Btn>
      )}
      {entry.status === "pending" && (
        <button onClick={() => onRemove(entry.id)} className="text-slate-400 hover:text-slate-700" title="Remove">
          <Icon name="x" size={14} />
        </button>
      )}
    </div>
  );
}

// HISTORY
// ============================================================
function HistoryPage({ onViewJob, refreshKey }) {
  const [jobs, setJobs] = useState([]);
  const [filter, setFilter] = useState("");
  const [bandFilter, setBandFilter] = useState("ALL");
  const [sortBy, setSortBy] = useState("created_desc");
  const [viewMode, setViewMode] = useState("table");
  const [selectedIds, setSelectedIds] = useState(new Set());

  const load = useCallback(async () => setJobs(await window.IF.db.allJobs()), []);
  useEffect(() => { load(); }, [load, refreshKey]);

  const filtered = useMemo(() => {
    let out = jobs;
    if (bandFilter !== "ALL") out = out.filter(j => j.risk_band === bandFilter);
    if (filter) {
      const f = filter.toLowerCase();
      out = out.filter(j => (
        (j.filename || "").toLowerCase().includes(f) ||
        (j.vendor || "").toLowerCase().includes(f) ||
        (j.invoice_no || "").toLowerCase().includes(f) ||
        (j.gstin || "").toLowerCase().includes(f)
      ));
    }
    const sorters = {
      created_desc: (a,b) => (b.created_at||"").localeCompare(a.created_at||""),
      created_asc:  (a,b) => (a.created_at||"").localeCompare(b.created_at||""),
      risk_desc:    (a,b) => (b.risk_score||0) - (a.risk_score||0),
      risk_asc:     (a,b) => (a.risk_score||0) - (b.risk_score||0),
      amount_desc:  (a,b) => (b.amount||0) - (a.amount||0),
      genuine_desc: (a,b) => (100-(a.risk_score||0)) - (100-(b.risk_score||0)),
    };
    return [...out].sort(sorters[sortBy] || sorters.created_desc);
  }, [jobs, filter, bandFilter, sortBy]);

  // Summary stats (across the full archive, not just the filter view)
  const archiveStats = useMemo(() => {
    const byBand = { GENUINE: 0, LOW: 0, SUSPICIOUS: 0, HIGH_RISK: 0 };
    let totalAmount = 0, concerningAmount = 0;
    for (const j of jobs) {
      byBand[j.risk_band] = (byBand[j.risk_band] || 0) + 1;
      totalAmount += j.amount || 0;
      if (j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK")
        concerningAmount += j.amount || 0;
    }
    return {
      total: jobs.length,
      genuine: byBand.GENUINE,
      concerning: byBand.SUSPICIOUS + byBand.HIGH_RISK,
      low: byBand.LOW,
      totalAmount, concerningAmount,
      byBand,
    };
  }, [jobs]);

  const deleteJob = async (id) => {
    if (!confirm("Delete this case from history?")) return;
    await window.IF.db.deleteJob(id);
    await window.IF.db.deleteReport(id);
    setSelectedIds(s => { const n = new Set(s); n.delete(id); return n; });
    await load();
  };

  const bulkDelete = async () => {
    if (selectedIds.size === 0) return;
    if (!confirm(`Delete ${selectedIds.size} selected case${selectedIds.size === 1 ? "" : "s"}? This cannot be undone.`)) return;
    for (const id of selectedIds) {
      await window.IF.db.deleteJob(id);
      await window.IF.db.deleteReport(id);
    }
    setSelectedIds(new Set());
    await load();
  };

  const toggleSelect = (id) => {
    setSelectedIds(s => {
      const n = new Set(s);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  };

  const selectAll = () => {
    if (selectedIds.size === filtered.length) {
      setSelectedIds(new Set());  // deselect all
    } else {
      setSelectedIds(new Set(filtered.map(j => j.id)));  // select all visible
    }
  };

  const exportCsv = () => {
    const headers = ["id","filename","file_type","vendor","invoice_no","invoice_date","amount","gstin",
                     "risk_score","genuineness_pct","risk_band","n_findings","created_at"];
    const rows = filtered.map(j => headers.map(h => {
      let v;
      if (h === "genuineness_pct") v = j.risk_score != null ? (100 - j.risk_score).toFixed(1) : "";
      else v = j[h];
      if (v == null) return "";
      const s = String(v);
      return s.includes(",") || s.includes('"') ? `"${s.replace(/"/g, '""')}"` : s;
    }).join(","));
    const csv = [headers.join(","), ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `forensic_archive_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  const exportBatchExcel = () => window.IF.exportArchiveExcel(filtered);
  const exportBatchPpt = () => window.IF.exportArchivePpt(filtered);

  const quickExportCase = async (id, kind) => {
    const entry = await window.IF.db.getReport(id);
    if (!entry) { alert("Full report not available. Re-examine the file to regenerate."); return; }
    if (kind === "excel") window.IF.exportExcel(entry.report);
    else if (kind === "ppt") window.IF.exportPpt(entry.report);
    else if (kind === "pdf") window.IF.exportPdf(entry.report);
  };

  return (
    <>
      <PageHeader eyebrow="Archive" title="Case archive"
                  subtitle={`${jobs.length} examination${jobs.length===1?"":"s"} · searchable, filterable, exportable`}
                  actions={
                    <>
                      <Btn variant="secondary" onClick={exportCsv} disabled={filtered.length === 0}>
                        <Icon name="download" size={14} /> CSV
                      </Btn>
                      <Btn variant="secondary" onClick={exportBatchExcel} disabled={filtered.length === 0}>
                        <Icon name="download" size={14} /> Excel
                      </Btn>
                      <Btn variant="default" onClick={exportBatchPpt} disabled={filtered.length === 0}>
                        <Icon name="download" size={14} /> PowerPoint
                      </Btn>
                    </>
                  } />

      {/* Archive mini-dashboard */}
      {jobs.length > 0 && (
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
          <MetricCard label="Cases examined" value={archiveStats.total} icon="file" tone="neutral" />
          <MetricCard label="Cleared genuine" value={archiveStats.genuine}
                      hint={archiveStats.total ? `${Math.round(archiveStats.genuine*100/archiveStats.total)}% of archive` : ""}
                      tone="good" icon="check" />
          <MetricCard label="Concerning" value={archiveStats.concerning}
                      hint={archiveStats.total ? `${Math.round(archiveStats.concerning*100/archiveStats.total)}% flagged` : ""}
                      tone={archiveStats.concerning > 0 ? "bad" : "good"} icon="alert" />
          <MetricCard label="Value at risk" value={archiveStats.concerningAmount > 0 ? archiveStats.concerningAmount.toFixed(2) : "—"}
                      hint={`of ${archiveStats.totalAmount.toFixed(2)} total`}
                      tone={archiveStats.concerningAmount > 0 ? "bad" : "neutral"} icon="zap" />
        </div>
      )}

      {/* View mode toggle */}
      {jobs.length > 0 && (
        <div className="flex items-center justify-between mb-4">
          <div className="inline-flex bg-slate-100 rounded-md p-1">
            <button onClick={() => setViewMode("table")}
                    className={`px-3 py-1.5 text-xs font-medium rounded transition ${
                      viewMode === "table" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600 hover:text-slate-900"
                    }`}>
              <span className="inline-flex items-center gap-1.5"><Icon name="layers" size={12} /> Table view</span>
            </button>
            <button onClick={() => setViewMode("dashboard")}
                    className={`px-3 py-1.5 text-xs font-medium rounded transition ${
                      viewMode === "dashboard" ? "bg-white text-slate-900 shadow-sm" : "text-slate-600 hover:text-slate-900"
                    }`}>
              <span className="inline-flex items-center gap-1.5"><Icon name="dashboard" size={12} /> Dashboard view</span>
            </button>
          </div>
          {viewMode === "dashboard" && (
            <span className="text-[11px] text-slate-500">Charts reflect filters — set them in Table view.</span>
          )}
        </div>
      )}

      {/* DASHBOARD VIEW */}
      {viewMode === "dashboard" && jobs.length > 0 && (
        <ArchiveDashboard jobs={filtered} allJobs={jobs} onViewJob={onViewJob} />
      )}

      {/* TABLE VIEW */}
      {viewMode === "table" && (
        <>
          {/* Filter bar */}
          <Card className="mb-4">
            <div className="flex flex-wrap items-center gap-2.5">
              <div className="relative flex-1 min-w-[220px]">
                <div className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">
                  <Icon name="search" size={14} />
                </div>
                <input type="text" value={filter} onChange={(e) => setFilter(e.target.value)}
                       placeholder="Search filename, vendor, invoice #, GSTIN…"
                       className="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-300 rounded-md placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-slate-400" />
              </div>
              <select value={bandFilter} onChange={(e) => setBandFilter(e.target.value)}
                      className="px-2.5 py-1.5 text-sm border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-slate-400">
                <option value="ALL">All verdicts</option>
                <option value="GENUINE">Genuine</option>
                <option value="LOW">Low risk</option>
                <option value="SUSPICIOUS">Suspicious</option>
                <option value="HIGH_RISK">High risk</option>
              </select>
              <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}
                      className="px-2.5 py-1.5 text-sm border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-slate-400">
                <option value="created_desc">Newest first</option>
                <option value="created_asc">Oldest first</option>
                <option value="risk_desc">Highest risk</option>
                <option value="risk_asc">Lowest risk</option>
                <option value="genuine_desc">Most genuine</option>
                <option value="amount_desc">Highest amount</option>
              </select>
              <span className="text-[11px] text-slate-500 ml-auto">
                Showing {filtered.length} of {jobs.length}
              </span>
            </div>
          </Card>

          {/* Table */}
          <Card padding="p-0" className="overflow-hidden">
            {jobs.length === 0 ? (
              <div className="p-16 text-center">
                <div className="mx-auto w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mb-3 text-slate-400">
                  <Icon name="upload" size={24} />
                </div>
                <div className="text-base font-semibold text-slate-900 mb-1">No cases yet</div>
                <div className="text-sm text-slate-500">Upload invoices to start building your forensic archive.</div>
              </div>
            ) : filtered.length === 0 ? (
              <div className="p-16 text-center">
                <div className="text-slate-400 mx-auto mb-3 flex justify-center"><Icon name="search" size={32} /></div>
                <div className="text-sm text-slate-500">No cases match these filters.</div>
              </div>
            ) : (
              <div className="overflow-x-auto">
                {selectedIds.size > 0 && (
                  <div className="px-4 py-2 bg-blue-50 border-b border-blue-200 flex items-center gap-3">
                    <span className="text-sm text-blue-800 font-medium">
                      {selectedIds.size} case{selectedIds.size === 1 ? "" : "s"} selected
                    </span>
                    <Btn variant="danger" size="sm" onClick={bulkDelete}>
                      <Icon name="trash" size={13} /> Delete selected
                    </Btn>
                    <Btn variant="ghost" size="sm" onClick={() => setSelectedIds(new Set())}>
                      Clear selection
                    </Btn>
                  </div>
                )}
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-slate-50 text-[10px] uppercase tracking-wider text-slate-500 font-semibold border-b border-slate-200">
                      <th className="px-3 py-2.5 w-8">
                        <input type="checkbox"
                               checked={filtered.length > 0 && selectedIds.size === filtered.length}
                               ref={el => { if (el) el.indeterminate = selectedIds.size > 0 && selectedIds.size < filtered.length; }}
                               onChange={selectAll}
                               className="rounded border-slate-300 cursor-pointer" />
                      </th>
                      <th className="px-4 py-2.5 text-left">File</th>
                      <th className="px-4 py-2.5 text-left">Vendor</th>
                      <th className="px-4 py-2.5 text-left">Invoice #</th>
                      <th className="px-4 py-2.5 text-right">Amount</th>
                      <th className="px-4 py-2.5 text-center">Genuineness</th>
                      <th className="px-4 py-2.5 text-center">Verdict</th>
                      <th className="px-4 py-2.5 text-left">Examined</th>
                      <th className="px-4 py-2.5 w-32"></th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {filtered.map(j => <HistoryRow key={j.id} job={j}
                                                   selected={selectedIds.has(j.id)}
                                                   onToggle={() => toggleSelect(j.id)}
                                                   onView={() => onViewJob(j.id)}
                                                   onDelete={() => deleteJob(j.id)}
                                                   onQuickExport={(kind) => quickExportCase(j.id, kind)} />)}
                  </tbody>
                </table>
              </div>
            )}
          </Card>
        </>
      )}
    </>
  );
}

function HistoryRow({ job, selected, onToggle, onView, onDelete, onQuickExport }) {

  const genuinePct = job.risk_score != null ? +(100 - job.risk_score).toFixed(1) : null;
  const genuineColor =
    genuinePct == null        ? "text-slate-400" :
    genuinePct >= 81          ? "text-emerald-700" :
    genuinePct >= 56          ? "text-yellow-700"  :
    genuinePct >= 31          ? "text-orange-700"  :
                                "text-red-700";
  const genuineBarColor =
    genuinePct == null ? "bg-slate-300" :
    genuinePct >= 81   ? "bg-emerald-500" :
    genuinePct >= 56   ? "bg-yellow-500"  :
    genuinePct >= 31   ? "bg-orange-500"  :
                         "bg-red-500";
  return (
    <tr className={`transition-colors ${selected ? "bg-blue-50 hover:bg-blue-100" : "hover:bg-slate-50"}`}>
      <td className="px-3 py-2.5 w-8">

      <td className="px-4 py-2.5 max-w-xs">

          <div className="truncate font-medium text-slate-900 hover:text-slate-700">{job.filename}</div>
          <div className="text-[10px] uppercase tracking-wider text-slate-500 mt-0.5">{(job.file_type||"").replace("_"," ")}</div>

      </td>
      <td className="px-4 py-2.5 max-w-[200px] truncate text-slate-700">{job.vendor || <span className="text-slate-400">—</span>}</td>
      <td className="px-4 py-2.5 mono text-[11px] text-slate-700">{job.invoice_no || <span className="text-slate-400">—</span>}</td>
      <td className="px-4 py-2.5 text-right tabular-nums text-slate-700">{job.amount != null ? job.amount.toFixed(2) : <span className="text-slate-400">—</span>}</td>
      <td className="px-4 py-2.5">
        <div className="flex items-center gap-2 justify-center">
          <div className={`tabular-nums font-semibold text-sm ${genuineColor}`} style={{ minWidth: "3rem", textAlign: "right" }}>
            {genuinePct != null ? `${genuinePct}%` : "—"}

          <div className="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden flex-shrink-0">
            <div className={`h-full ${genuineBarColor}`} style={{ width: `${genuinePct || 0}%` }} />
          </div>

      </td>
      <td className="px-4 py-2.5 text-center"><VerdictBadge band={job.risk_band} score={job.risk_score} size="sm" /></td>
      <td className="px-4 py-2.5 text-[11px] text-slate-500 tabular-nums">{(job.created_at||"").slice(0,16).replace("T"," ")}</td>
      <td className="px-4 py-2.5">
        <div className="flex gap-1 justify-end">
          <button onClick={onView}
                  className="p-1.5 text-slate-500 hover:bg-slate-200 hover:text-slate-900 rounded transition" title="View details">
            <Icon name="eye" size={14} />

            <button onClick={() => setExportOpen(o => !o)}
                    className="p-1.5 text-slate-500 hover:bg-slate-200 hover:text-slate-900 rounded transition" title="Export this case">

// ARCHIVE DASHBOARD — analytics view inside Case archive
// ============================================================
function ArchiveDashboard({ jobs, allJobs, onViewJob }) {
  // Verdict distribution
  const byBand = { GENUINE: 0, LOW: 0, SUSPICIOUS: 0, HIGH_RISK: 0 };
  for (const j of jobs) byBand[j.risk_band] = (byBand[j.risk_band] || 0) + 1;

  // Genuineness histogram (10 buckets of 10%)
  const buckets = new Array(10).fill(0);
  for (const j of jobs) {
    if (j.risk_score == null) continue;
    const g = 100 - j.risk_score;
    const idx = Math.min(9, Math.max(0, Math.floor(g / 10)));
    buckets[idx]++;
  }

  // Top vendors by count
  const vendorCount = new Map();
  for (const j of jobs) if (j.vendor) vendorCount.set(j.vendor, (vendorCount.get(j.vendor) || 0) + 1);
  const topVendors = [...vendorCount.entries()]
    .sort((a, b) => b[1] - a[1]).slice(0, 8)
    .map(([v, c]) => ({ vendor: v, count: c }));

  // 30-day trend
  const dayMap = new Map();
  const today = new Date();
  for (let i = 29; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    dayMap.set(d.toISOString().slice(0, 10), { all: 0, concerning: 0 });
  }
  for (const j of jobs) {
    const day = (j.created_at || "").slice(0, 10);
    if (dayMap.has(day)) {
      dayMap.get(day).all++;
      if (j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK") dayMap.get(day).concerning++;
    }
  }
  const trendDays = [...dayMap.entries()];

  // Highest-risk cases (sorted)
  const concerning = jobs
    .filter(j => j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK")
    .sort((a, b) => (b.risk_score || 0) - (a.risk_score || 0))
    .slice(0, 8);

  // Most-genuine cases
  const mostGenuine = jobs
    .filter(j => j.risk_band === "GENUINE")
    .sort((a, b) => (a.risk_score || 0) - (b.risk_score || 0))
    .slice(0, 8);

  // Charts
  const verdictChart = {
    labels: ["Genuine", "Low risk", "Suspicious", "High risk"],
    datasets: [{
      data: [byBand.GENUINE, byBand.LOW, byBand.SUSPICIOUS, byBand.HIGH_RISK],
      backgroundColor: ["#10b981", "#eab308", "#f97316", "#dc2626"],
      borderWidth: 0,
    }],
  };
  const genuineHistChart = {
    labels: buckets.map((_, i) => `${i*10}-${(i+1)*10}%`),
    datasets: [{
      label: "Cases",
      data: buckets,
      backgroundColor: buckets.map((_, i) =>
        i >= 8 ? "#10b981" : i >= 5 ? "#eab308" : i >= 3 ? "#f97316" : "#dc2626"),
      borderWidth: 0, borderRadius: 4,
    }],
  };
  const trendChart = {
    labels: trendDays.map(([d]) => d.slice(5)),
    datasets: [
      { label: "All examinations", data: trendDays.map(([, v]) => v.all),
        borderColor: "#64748b", backgroundColor: "rgba(100,116,139,.15)",
        tension: 0.35, fill: true, pointRadius: 0 },
      { label: "Concerning",       data: trendDays.map(([, v]) => v.concerning),
        borderColor: "#dc2626", backgroundColor: "rgba(220,38,38,.18)",
        tension: 0.35, fill: true, pointRadius: 0 },
    ],
  };
  const vendorChart = {
    labels: topVendors.map(v => v.vendor.length > 24 ? v.vendor.slice(0,22) + "…" : v.vendor),
    datasets: [{
      label: "Invoices",
      data: topVendors.map(v => v.count),
      backgroundColor: "#6366f1", borderWidth: 0, borderRadius: 4,
    }],
  };

  return (
    <div className="space-y-4">
      {/* Top: distribution + histogram */}
      <div className="grid lg:grid-cols-2 gap-4">
        <Card>
          <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-3">Verdict distribution</div>
          {jobs.length > 0 ? (
            <ChartCanvas type="doughnut" data={verdictChart} height={240}
                         options={{ cutout: "60%", plugins: { legend: { position: "bottom", labels: { font: { size: 11 }, boxWidth: 10, usePointStyle: true, padding: 14 } } } }} />
          ) : <div className="text-center py-12 text-sm text-slate-500">No cases match current filters.</div>}
        </Card>
        <Card>
          <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-3">Genuineness distribution</div>
          {jobs.length > 0 ? (
            <ChartCanvas type="bar" data={genuineHistChart} height={240}
                         options={{ plugins: { legend: { display: false } },
                                    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }} />
          ) : <div className="text-center py-12 text-sm text-slate-500">—</div>}
          <div className="text-[11px] text-slate-500 mt-2">Higher-genuineness cases on the right; concerning ones on the left.</div>
        </Card>
      </div>

      {/* Trend */}
      <Card>
        <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-3">30-day examination activity</div>
        <ChartCanvas type="line" data={trendChart} height={220}
                     options={{ scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
                                interaction: { mode: "index", intersect: false } }} />
      </Card>

      {/* Vendors + concerning + genuine */}
      <div className="grid lg:grid-cols-3 gap-4">
        <Card>
          <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-3">Top vendors</div>
          {topVendors.length > 0 ? (
            <ChartCanvas type="bar" data={vendorChart} height={Math.max(180, topVendors.length * 32 + 40)}
                         options={{ indexAxis: "y", plugins: { legend: { display: false } },
                                    scales: { x: { beginAtZero: true, ticks: { precision: 0 } } } }} />
          ) : <div className="text-center py-12 text-sm text-slate-500">No vendor data extracted.</div>}
        </Card>

        <Card padding="p-0">
          <div className="px-4 py-3 border-b border-slate-200 flex items-center gap-2">
            <Icon name="alert" size={14} className="text-red-600" />
            <div className="text-xs uppercase font-semibold text-slate-700 tracking-wider">Highest risk</div>
          </div>
          <div className="divide-y divide-slate-100">
            {concerning.length === 0 ? (
              <div className="p-6 text-center text-sm text-emerald-700">
                <Icon name="check" size={20} className="mx-auto mb-1" />
                No concerning cases in scope.
              </div>
            ) : concerning.map(j => (
              <button key={j.id} onClick={() => onViewJob(j.id)}
                      className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-3">
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-900 truncate">{j.filename}</div>
                  <div className="text-[11px] text-slate-500 truncate">{j.vendor || "— no vendor"}</div>
                </div>
                <VerdictBadge band={j.risk_band} score={j.risk_score} size="sm" />
              </button>
            ))}
          </div>
        </Card>

        <Card padding="p-0">
          <div className="px-4 py-3 border-b border-slate-200 flex items-center gap-2">
            <Icon name="check" size={14} className="text-emerald-600" />
            <div className="text-xs uppercase font-semibold text-slate-700 tracking-wider">Most genuine</div>
          </div>
          <div className="divide-y divide-slate-100">
            {mostGenuine.length === 0 ? (
              <div className="p-6 text-center text-sm text-slate-500">No genuine-band cases yet.</div>
            ) : mostGenuine.map(j => (
              <button key={j.id} onClick={() => onViewJob(j.id)}
                      className="w-full text-left px-4 py-2 hover:bg-slate-50 flex items-center gap-3">
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-slate-900 truncate">{j.filename}</div>
                  <div className="text-[11px] text-slate-500 truncate">{j.vendor || "— no vendor"}</div>
                </div>
                <span className="text-xs font-semibold text-emerald-700 tabular-nums">
                  {j.risk_score != null ? `${(100 - j.risk_score).toFixed(0)}%` : "—"}
                </span>
              </button>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}
