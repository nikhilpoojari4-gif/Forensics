          return s.type;
        }).join(", ");
        findings.push({
          category: "visual",
          severity: score >= 65 ? "high" : "medium",
          code: "PDF_EDIT_OBJECTS",
          message: `PDF internal structure contains editing indicators: ${sigDesc}. These suggest the document was modified after original creation.`,
          details: measurements,
        });
      } else if (signals.length === 0) {
        positives.push({
          category: "visual",
          code: "PDF_STRUCTURE_CLEAN",
          message: `PDF object structure is clean — no annotation objects, form fields, font anomalies, or object ID gaps detected.`,
        });
      }

      return { score, confidence, findings, positives, triggered, measurements };
    } catch (err) {
      return { score:0, confidence:0, findings:[], positives:[], triggered:false,
               measurements:{ error: String(err) } };
    }
  };

  // ============================================================
  // PDF incremental-region locator — pinpoints WHERE edits happened
  // When Acrobat edits a PDF it appends new content after the first
  // %%EOF. Each incremental section contains only the changed objects.
  // We parse those sections, extract BT…ET text blocks + coordinates,
  // convert PDF space (origin bottom-left, points) → canvas pixels,
  // and return bounding boxes so the annotated image can show exactly
  // which text regions were modified — not just "the PDF was edited".
  // ============================================================

  // ============================================================
  // PDF incremental-region locator — PDF.js-accurate coordinates
  //
  // Two-stage approach:
  //   Stage 1 (raw bytes): scan incremental-save sections (after first
  //     %%EOF) for content streams and extract { x, y, fontSize, str }
  //     items using BT/ET PDF operator parsing.
  //   Stage 2 (PDF.js): load the page, get its viewport transform, and
  //     call pdfjsLib.Util.applyTransform(point, viewport.transform) to
  //     convert every raw PDF-space coordinate to canvas pixels — which
  //     handles Y-flip, page rotation, and render scale automatically.
  //     Also call page.getAnnotations() for FreeText/Widget rects.
  //
  // This replaces all manual (pageHeightPt - y) * scale math with
  // PDF.js's own coordinate system, giving pixel-accurate boxes.
  // ============================================================
  IF.pdfIncrementalRegions = async function(file, fileType, _unused, renderScale) {
    if (!fileType || !fileType.startsWith("pdf")) return [];
    renderScale = renderScale || 1.8;
    try {
      const buf = await file.arrayBuffer();
      const decoder = new TextDecoder("latin1");
      const raw = decoder.decode(new Uint8Array(buf));

      // ── Stage 1: extract raw text items from incremental sections ─
      const eofPositions = [];
      let em; const eofRe = /%%EOF/g;
      while ((em = eofRe.exec(raw)) !== null) eofPositions.push(em.index);
      if (eofPositions.length < 2) return [];   // single save — nothing edited

      const incrementalText = raw.slice(eofPositions[0] + 5);
      const rawItems = [];   // { x, y, fontSize, str }
      let om;
      const objRe = /\d+\s+\d+\s+obj([\s\S]*?)endobj/g;

      while ((om = objRe.exec(incrementalText)) !== null) {
        const objBody = om[1];
        // Skip annotation objects — handled via page.getAnnotations() below
        if (/\/Type\s*\/Annot/.test(objBody)) continue;
        // Only process objects that contain a content stream with BT blocks
        const streamM = /stream\r?\n([\s\S]*?)\r?\nendstream/.exec(objBody);
        if (!streamM || !streamM[1].includes("BT")) continue;
        const btBlocks = streamM[1].match(/BT[\s\S]*?ET/g) || [];
        for (const block of btBlocks) {
          rawItems.push(...IF._extractRawTextItems(block));
        }
      }

      // ── Stage 2: use PDF.js viewport for accurate canvas coordinates ─
      const pdfDoc = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
      const page   = await pdfDoc.getPage(1);
      const viewport = page.getViewport({ scale: renderScale });
      // viewport.transform = [a, b, c, d, e, f] maps PDF user-space → canvas pixels.
      // pdfjsLib.Util.applyTransform handles Y-axis flip, rotation, and scale.
      const vt = viewport.transform;

      const boxes = [];

      for (const item of rawItems) {
        if (!item.str) continue;
        // Map bottom-left origin of the text run to canvas space
        const [cx, cy] = pdfjsLib.Util.applyTransform([item.x, item.y], vt);
        // Width: approximate based on char count and font size
        const w = Math.max(item.str.length * item.fontSize * 0.55 * renderScale, 8);
        // Height: font size scaled by the y-component of the viewport matrix
        const h = Math.max(Math.abs(item.fontSize * vt[3]), 6);
        // cy is the baseline position in canvas space; box extends upward by h
        if (cx > 0 && (cy - h) > 0 && w > 0) {
          boxes.push([
            Math.round(cx - 2),
            Math.round(cy - h - 2),
            Math.round(w + 4),
            Math.round(h + 6),
          ]);
        }
      }

      // Annotation rects via PDF.js (FreeText overlays placed by the editor)
      try {
        const annotations = await page.getAnnotations({ intent: "any" });
        for (const annot of annotations) {
          if (annot.subtype !== "FreeText" && annot.subtype !== "Widget") continue;
          const rect = annot.rect;   // [x1, y1, x2, y2] in PDF user-space
          if (!rect || rect.length < 4) continue;
          const [ax1, ay1] = pdfjsLib.Util.applyTransform([rect[0], rect[1]], vt);
          const [ax2, ay2] = pdfjsLib.Util.applyTransform([rect[2], rect[3]], vt);
          const bx = Math.min(ax1, ax2), by = Math.min(ay1, ay2);
          const bw = Math.abs(ax2 - ax1), bh = Math.abs(ay2 - ay1);
          if (bw > 3 && bh > 3) {
            boxes.push([Math.round(bx-2), Math.round(by-2),
                        Math.round(bw+4), Math.round(bh+4)]);
          }
        }
      } catch { /* optional */ }

      return IF._deduplicateBoxes(boxes, 8);
    } catch { return []; }
  };

  // Extract raw { x, y, fontSize, str } from a single BT…ET block.
  // Handles Tm (absolute), Td/TD (relative move), T* (next line),
  // Tf (font+size), Tj (string), TJ (kerned string array).
  // Coordinates are raw PDF user-space — converted in Stage 2.
  IF._extractRawTextItems = function(block) {
    const items = [];
    let cx = 0, cy = 0, fs = 12, lineLeading = fs * 1.2;
    // Ensure each PDF operator lands on its own line for reliable parsing
    const lines = block
      .replace(/\r\n?/g, "\n")
      .replace(/\b(Tf|Tm|Td|TD|TL|T\*|Tj|TJ)\b\s*/g, "$1\n")
      .split("\n");

    for (const rawLine of lines) {
      const t = rawLine.trim();
      if (!t || t === "BT" || t === "ET") continue;

      let r;
      // Tf: /FontName size Tf
      r = t.match(/\/\S+\s+([\d.]+)\s+Tf/);
      if (r) { fs = parseFloat(r[1]); lineLeading = fs * 1.2; continue; }

      // TL: leading Tl
      r = t.match(/([\d.]+)\s+TL/);
      if (r) { lineLeading = parseFloat(r[1]); continue; }

      // Tm: a b c d e f Tm  →  e=x, f=y absolute in user space
      r = t.match(/([-\d.]+)\s+([-\d.]+)\s+([-\d.]+)\s+([-\d.]+)\s+([-\d.]+)\s+([-\d.]+)\s+Tm/);
      if (r) { cx = parseFloat(r[5]); cy = parseFloat(r[6]); continue; }

      // Td / TD: dx dy Td  →  relative move (PDF ops are case-sensitive: Td ≠ TD)
      r = t.match(/([-\d.]+)\s+([-\d.]+)\s+(?:Td|TD)(?:\s|$)/);
      if (r) { cx += parseFloat(r[1]); cy += parseFloat(r[2]); continue; }

      // T*: move to next line  (equivalent to 0 -leading Td)
      if (t === "T*") { cy -= lineLeading; continue; }

      // Tj: (string) Tj
      r = t.match(/\(([^)]*)\)\s+Tj/);
      if (r) {
        items.push({ x: cx, y: cy, fontSize: fs, str: r[1] });
        cx += r[1].length * fs * 0.55;
        continue;
      }

      // TJ: [(str) kern (str) ...] TJ
      r = t.match(/\[([^\]]+)\]\s+TJ/);
      if (r) {
        const pieces = r[1].match(/\(([^)]*)\)/g) || [];
        const str = pieces.map(s => s.slice(1, -1)).join("");
        items.push({ x: cx, y: cy, fontSize: fs, str });
        cx += str.length * fs * 0.55;
      }
    }
    return items;
  };

  IF._deduplicateBoxes = function(boxes, tol) {
    if (!boxes.length) return [];
    const used = new Array(boxes.length).fill(false);
    const merged = [];
    for (let i = 0; i < boxes.length; i++) {
      if (used[i]) continue;
      let [x, y, w, h] = boxes[i];
      let x2 = x+w, y2 = y+h;
      for (let j = i+1; j < boxes.length; j++) {
        if (used[j]) continue;
        const [bx, by, bw, bh] = boxes[j];
        if (Math.abs(bx - x) < tol && Math.abs(by - y) < tol) {
          x = Math.min(x,bx); y = Math.min(y,by);
          x2 = Math.max(x2, bx+bw); y2 = Math.max(y2, by+bh);
          used[j] = true;
        }
      }
      merged.push([x, y, x2-x, y2-y]);
    }
    return merged;
  };

  IF.qrAnalysis = function(canvas, fields) {
    if (!window.jsQR) {
      return {
        score: 0, confidence: 0, findings: [], positives: [], triggered: false,
        measurements: { error: "jsQR not loaded" }, qr_data: null, qr_bbox: null,
      };
    }
    const ctx = canvas.getContext("2d");
    const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const qr = window.jsQR(img.data, img.width, img.height, { inversionAttempts: "attemptBoth" });

    if (!qr) {
      // Not an error — many invoices don't have QR codes
      return {
        score: 0, confidence: 0, findings: [], positives: [], triggered: false,
        measurements: { qr_detected: false },
        qr_data: null, qr_bbox: null, qr_present: false,
      };
    }
    const raw = qr.data;
    // Bounding box from corner points
    const corners = qr.location;
    const xs = [corners.topLeftCorner.x, corners.topRightCorner.x,
                corners.bottomRightCorner.x, corners.bottomLeftCorner.x];
    const ys = [corners.topLeftCorner.y, corners.topRightCorner.y,
                corners.bottomRightCorner.y, corners.bottomLeftCorner.y];
    const bbox = [Math.min(...xs), Math.min(...ys),
                  Math.max(...xs) - Math.min(...xs), Math.max(...ys) - Math.min(...ys)];

    // Try to parse as JWT (three base64url segments separated by .)
    const findings = [];
    const positives = [];
    let parsed = null;
    let payloadIssuer = null;
    let jwtValid = false;
    const jwtMatch = raw.match(/^([A-Za-z0-9_-]+)\.([A-Za-z0-9_-]+)\.([A-Za-z0-9_-]+)$/);
    if (jwtMatch) {
      try {
        const payloadB64 = jwtMatch[2].replace(/-/g, "+").replace(/_/g, "/")
                                     .padEnd(Math.ceil(jwtMatch[2].length/4)*4, "=");
        const payloadJson = atob(payloadB64);
        // GST e-invoice JWTs wrap a `data` field that contains JSON
        const outer = JSON.parse(payloadJson);
        if (outer.data) {
          try { parsed = JSON.parse(outer.data); }
          catch { parsed = { _raw: outer.data }; }
        } else {
          parsed = outer;
        }
        payloadIssuer = outer.iss || null;
        jwtValid = true;
      } catch {}
    } else {
      // Try plain JSON
      try { parsed = JSON.parse(raw); } catch {}
    }

    const measurements = {
      qr_detected: true,
      payload_length: raw.length,
      jwt_format: jwtValid,
      issuer: payloadIssuer,
      payload_keys: parsed ? Object.keys(parsed).slice(0, 20) : null,
      bbox,
    };

    if (!parsed) {
      // QR decoded but payload not parseable as JWT/JSON — just a plain text QR
      positives.push({
        category: "content",
        code: "QR_DECODED_PLAIN",
        message: `QR code present and decodes to text (${raw.length} chars). Not a signed e-invoice format.`,
      });
      return {
        score: 0, confidence: 70, findings, positives, triggered: false,
        measurements, qr_data: raw, qr_bbox: bbox, qr_present: true,
        qr_parsed: null, qr_summary: raw.slice(0, 200),
      };
    }

    // Cross-validate against OCR fields
    const mismatches = [];
    const matches = [];
    // Common field mappings in GST e-invoice QR payload
    const fieldMap = {
      "SellerGstin": "gstin",
      "SellerGSTIN": "gstin",
      "seller_gstin": "gstin",
      "DocNo": "invoice_number",
      "doc_no": "invoice_number",
      "InvoiceNumber": "invoice_number",
      "TotInvVal": "amount",
      "total_inv_val": "amount",
      "TotalAmount": "amount",
      "DocDt": "invoice_date",
      "doc_dt": "invoice_date",
    };
    for (const [qrKey, ocrKey] of Object.entries(fieldMap)) {
      if (parsed[qrKey] == null) continue;
      const ocrVal = fields[ocrKey];
      if (ocrVal == null) continue;
      const qrVal = parsed[qrKey];
      let match = false;
      if (ocrKey === "amount") {
        const q = parseFloat(qrVal), o = parseFloat(ocrVal);
        match = Math.abs(q - o) / Math.max(q, o, 1) < 0.01;
      } else {
        match = String(qrVal).replace(/\s+/g, "").toUpperCase() ===
                String(ocrVal).replace(/\s+/g, "").toUpperCase();
      }
      (match ? matches : mismatches).push({ field: ocrKey, qr: String(qrVal), ocr: String(ocrVal) });
    }
    measurements.fields_matched = matches.length;
    measurements.fields_mismatched = mismatches.length;
    measurements.matched_fields = matches.map(m => m.field);
    measurements.mismatched_fields = mismatches.map(m => m.field);

    let score = 0;
    let triggered = false;
    let confidence = 80;
    if (mismatches.length > 0) {
      score = Math.min(100, mismatches.length * 35);
      triggered = true;
      confidence = 90;
      findings.push({
        category: "content",
        severity: mismatches.length >= 2 ? "critical" : "high",
        code: "QR_FIELD_MISMATCH",
        message: `QR code payload contradicts OCR-extracted fields on ${mismatches.length} field${mismatches.length === 1 ? "" : "s"}. The QR may have been lifted from a different invoice.`,
        details: { mismatches, payload_issuer: payloadIssuer },
      });
    } else if (matches.length >= 2) {
      positives.push({
        category: "content",
        code: "QR_FIELDS_VERIFIED",
        message: `QR code decoded as ${payloadIssuer ? "signed e-invoice" : "structured data"} and ${matches.length} field${matches.length === 1 ? "" : "s"} (${matches.map(m=>m.field).join(", ")}) match OCR extraction.`,
      });
      confidence = 90;
    } else if (matches.length === 1) {
      positives.push({
        category: "content",
        code: "QR_PARTIAL_MATCH",
        message: `QR code decoded successfully; 1 field matched OCR (${matches[0].field}). Limited verification.`,
      });
      confidence = 60;
    } else {
      positives.push({
        category: "content",
        code: "QR_DECODED",
        message: `QR code decoded (${jwtValid ? "signed format" : "structured data"}) but no overlapping fields to cross-validate with OCR.`,
      });
      confidence = 40;
    }

    return {
      score, confidence, findings, positives, triggered,
      measurements, qr_data: raw, qr_bbox: bbox, qr_present: true,
      qr_parsed: parsed, qr_summary: JSON.stringify(parsed).slice(0, 300),
    };
  };

  // ============================================================
  // JPEG ghost analysis — recompress at multiple qualities, detect
  // regions where residual converges to near-zero (the original quality).
  // Splices show "ghost" at their original q; host image shows ghost at its q.
  // ============================================================
  IF.jpegGhost = async function(canvas) {
    const T = IF.THRESHOLDS.jpeg_ghost;
    const qualities = [0.55, 0.65, 0.75, 0.85, 0.95];
    const w = canvas.width, h = canvas.height;
    const src = canvas.getContext("2d").getImageData(0, 0, w, h).data;

    // Block-wise minimum residual across qualities — if blocks converge at
    // different q's, some were compressed before at different qualities.
    const B = 32;   // block size for ghost map
    const blockMinQ = new Map();   // "x,y" -> quality at which this block's residual is minimized
    const blockMinRes = new Map(); // "x,y" -> that minimum residual

    for (const q of qualities) {
      const blob = await new Promise(r => canvas.toBlob(r, "image/jpeg", q));
      if (!blob) continue;
      const recImg = await createImageBitmap(blob);
      const rec = document.createElement("canvas");
      rec.width = w; rec.height = h;
      rec.getContext("2d").drawImage(recImg, 0, 0);
      const recData = rec.getContext("2d").getImageData(0, 0, w, h).data;

      for (let by = 0; by + B <= h; by += B) {
        for (let bx = 0; bx + B <= w; bx += B) {
          let sum = 0;
          for (let yy = 0; yy < B; yy++) {
            const rowOff = ((by + yy) * w + bx) * 4;
            for (let xx = 0; xx < B * 4; xx += 4) {
              sum += Math.abs(src[rowOff + xx]     - recData[rowOff + xx]);
              sum += Math.abs(src[rowOff + xx + 1] - recData[rowOff + xx + 1]);
              sum += Math.abs(src[rowOff + xx + 2] - recData[rowOff + xx + 2]);
            }
          }
          const avg = sum / (B * B * 3);
          const key = `${bx},${by}`;
          if (!blockMinRes.has(key) || avg < blockMinRes.get(key)) {
            blockMinRes.set(key, avg);
            blockMinQ.set(key, q);
          }
        }
      }
    }
    // Count the distribution of "optimal quality" across blocks.
    // A uniform JPEG has blocks mostly converging at one quality.
    // A spliced one has a bimodal distribution.
    const qCounts = new Map();
    for (const q of blockMinQ.values()) qCounts.set(q, (qCounts.get(q) || 0) + 1);
    const total = blockMinQ.size;
    const sorted = [...qCounts.entries()].sort((a, b) => b[1] - a[1]);
    const primaryFreq = sorted[0] ? sorted[0][1] / total : 1;
    const secondaryFreq = sorted[1] ? sorted[1][1] / total : 0;

    // Clean image: primary mode captures >75%. Spliced: primary 50-70%, secondary 20%+.
    // Score: how much of the image is NOT in the primary mode, weighted by how separated the secondary is from primary.
    let score = 0;
    const boxes = [];
    if (sorted.length >= 2) {
      const primaryQ = sorted[0][0];
      const secondaryQ = sorted[1][0];
      const qGap = Math.abs(primaryQ - secondaryQ);
      // Secondary must be meaningfully present AND meaningfully different from primary
      if (secondaryFreq >= 0.15 && qGap >= 0.15) {
        score = Math.min(100, secondaryFreq * 100 * (qGap / 0.4));
        // Produce boxes for blocks NOT in primary mode
        for (const [key, q] of blockMinQ.entries()) {
          if (q !== primaryQ) {
            const [x, y] = key.split(",").map(Number);
            boxes.push([x, y, B, B]);
          }
          if (boxes.length >= 50) break;
        }
      }
    }
    const triggered = score >= T.trigger;
    const confidence = blockMinQ.size > 50 ? 80 : 40;

    const findings = [];
    const positives = [];
    if (triggered) {
      findings.push({
        category: "visual",
        severity: score >= T.strong ? "high" : "medium",
        code: "JPEG_GHOST_ANOMALY",
        message: `Compression history not uniform: ${Math.round(secondaryFreq*100)}% of blocks converge at a different JPEG quality than the rest of the page — suggests composited regions.`,
        details: {
          primary_quality: sorted[0]?.[0],
          secondary_quality: sorted[1]?.[0],
          primary_freq: +primaryFreq.toFixed(2),
          secondary_freq: +secondaryFreq.toFixed(2),
        },
      });
    } else {
      positives.push({
        category: "visual",
        code: "JPEG_GHOST_UNIFORM",
        message: `Compression history consistent — ${Math.round(primaryFreq*100)}% of blocks converge at q=${sorted[0]?.[0]}.`,
      });
    }

    return {
      score, confidence, findings, positives, triggered,
      boxes: triggered ? boxes : [],
      measurements: {
        primary_quality: sorted[0]?.[0],
        primary_freq: +primaryFreq.toFixed(2),
        secondary_freq: +secondaryFreq.toFixed(2),
        blocks_analyzed: blockMinQ.size,
      },
    };
  };

  // ============================================================
  // Benford's Law — first-digit distribution of line-item amounts
  // Expected: P(d) = log10(1 + 1/d) for d=1..9
  // ============================================================
  IF.benfordCheck = function(lineItems) {
    const T = IF.THRESHOLDS.benford;
    // Extract first digits from absolute values
    const digits = [];
    for (const it of (lineItems || [])) {
      const amt = Math.abs(it.amount || 0);
      if (amt < 1) continue;
      const firstDigit = parseInt(String(amt).replace(/[^1-9]/g, "").charAt(0));
      if (firstDigit >= 1 && firstDigit <= 9) digits.push(firstDigit);
    }
    const n = digits.length;
    if (n < T.minItems) {
      return {
        score: 0, confidence: 0, findings: [], positives: [], triggered: false,
        measurements: { sample_size: n, min_required: T.minItems },
      };
    }
    const observed = {};
    for (let d = 1; d <= 9; d++) observed[d] = 0;
    for (const d of digits) observed[d]++;
    const expected = {};
    for (let d = 1; d <= 9; d++) expected[d] = Math.log10(1 + 1/d);
    // Chi-square statistic
    let chi2 = 0;
    for (let d = 1; d <= 9; d++) {
      const obs = observed[d];
      const exp = expected[d] * n;
      chi2 += ((obs - exp) ** 2) / exp;
    }
    // Critical values for chi-square with 8 df: 15.51 (p=.05), 20.09 (p=.01)
    // Map chi2 into 0-100 score
    const score = Math.min(100, Math.max(0, (chi2 - 10) * 6));
    const triggered = score >= T.trigger;
    const confidence = Math.min(95, 40 + n * 3);  // More samples = higher confidence

    const findings = [];
    const positives = [];
    const distribution = {};
    for (let d = 1; d <= 9; d++) {
      distribution[d] = {
        observed: observed[d],
        observed_pct: +(observed[d] / n * 100).toFixed(1),
        expected_pct: +(expected[d] * 100).toFixed(1),
      };
    }

    if (triggered) {
      findings.push({
        category: "content",
        severity: score >= T.strong ? "high" : "medium",
        code: "BENFORD_DEVIATION",
        message: `Line-item amounts deviate significantly from Benford's Law (χ²=${chi2.toFixed(1)}). Fabricated numbers typically show unnatural first-digit patterns.`,
        details: {
          chi_square: +chi2.toFixed(2),
          sample_size: n,
          distribution,
        },
      });
    } else {
      positives.push({
        category: "content",
        code: "BENFORD_CONFORMS",
        message: `Line-item amounts (${n} values) follow the natural Benford distribution (χ²=${chi2.toFixed(1)}) — consistent with organically-generated data.`,
      });
    }
    return {
      score, confidence, findings, positives, triggered,
      measurements: {
        chi_square: +chi2.toFixed(2), sample_size: n, distribution,
      },
    };
  };

  // ============================================================
  // Double-compression detection — periodicity in DCT histograms
  // Analyzes the distribution of pixel differences to find the
  // "staircase" pattern introduced by a second round of JPEG compression.
  // ============================================================
  IF.doubleCompression = function(canvas) {
    const T = IF.THRESHOLDS.double_compress;
    const w = canvas.width, h = canvas.height;
    const data = canvas.getContext("2d").getImageData(0, 0, w, h).data;
    // Compute 8x8 block mean intensities, then look at histogram periodicity
    const means = [];
    for (let by = 0; by + 8 <= h; by += 8) {
      for (let bx = 0; bx + 8 <= w; bx += 8) {
        let sum = 0;
        for (let yy = 0; yy < 8; yy++) {
          const rowOff = ((by + yy) * w + bx) * 4;
          for (let xx = 0; xx < 8 * 4; xx += 4) {
            sum += (data[rowOff + xx] + data[rowOff + xx + 1] + data[rowOff + xx + 2]) / 3;
          }
        }
        means.push(sum / 64);
      }
    }
    // Histogram of differences between adjacent blocks
    const diffs = [];
    for (let i = 1; i < means.length; i++) diffs.push(Math.abs(means[i] - means[i-1]));
    // Compute FFT-style periodicity: look at autocorrelation at common JPEG quantization steps
    const hist = new Array(256).fill(0);
    for (const d of diffs) hist[Math.min(255, Math.round(d))]++;
    // Detect "comb" pattern: periodic peaks every N steps
    // Test N = 4, 6, 8, 10 (common DCT quantization step sizes)
    let maxPeriodicity = 0;
    let bestPeriod = 0;
    for (const period of [4, 6, 8, 10, 12, 16]) {
      let onPeakSum = 0, offPeakSum = 0, samples = 0;
      for (let i = period; i < hist.length - period; i += period) {
        onPeakSum += hist[i];
        offPeakSum += (hist[i - Math.floor(period/2)] + hist[i + Math.floor(period/2)]) / 2;
        samples++;
      }
      if (samples > 0 && offPeakSum > 0) {
        const ratio = onPeakSum / offPeakSum;
        if (ratio > maxPeriodicity) { maxPeriodicity = ratio; bestPeriod = period; }
      }
    }
    // ratio > 1.5 suggests comb pattern; >2 is strong
    const score = Math.min(100, Math.max(0, (maxPeriodicity - 1.2) * 80));
    const triggered = score >= T.trigger;
    const confidence = means.length > 100 ? 75 : 40;

    const findings = [];
    const positives = [];
    if (triggered) {
      findings.push({
        category: "visual",
        severity: score >= T.strong ? "high" : "medium",
        code: "DOUBLE_COMPRESSION",
        message: `Periodic pattern in block-difference histogram (period ${bestPeriod}, ratio ${maxPeriodicity.toFixed(2)}) indicates the image was saved as JPEG, edited, then re-saved.`,
        details: {
          periodicity_ratio: +maxPeriodicity.toFixed(2),
          period: bestPeriod,
          blocks_analyzed: means.length,
        },
      });
    } else {
      positives.push({
        category: "visual",
        code: "SINGLE_COMPRESSION",
        message: `No periodicity detected in block histogram (ratio ${maxPeriodicity.toFixed(2)}) — consistent with single-save history.`,
      });
    }
    return {
      score, confidence, findings, positives, triggered,
      measurements: {
        periodicity_ratio: +maxPeriodicity.toFixed(2),
        period: bestPeriod,
        blocks_analyzed: means.length,
      },
    };
  };

  // ============================================================
  // Baseline alignment analysis — do OCR words sit on a regular grid?
  // Pasted text typically lands 1-3 px off the baseline of surrounding text.
  // ============================================================
  IF.alignmentAnalysis = function(ocrWords) {
    const T = IF.THRESHOLDS.alignment;
    if (!ocrWords || ocrWords.length < 20) {
      return { score: 0, confidence: 0, findings: [], positives: [], triggered: false,
               boxes: [], measurements: { sample_size: ocrWords ? ocrWords.length : 0 } };
    }
    // Group words by approximate baseline (bottom of bbox)
    const lines = new Map();
    for (const w of ocrWords) {
      if (!w.bbox) continue;
      const baseline = w.bbox.y1;
      const bucket = Math.round(baseline / 10);
      if (!lines.has(bucket)) lines.set(bucket, []);
      lines.get(bucket).push({ word: w, baseline });
    }
    const anomalies = [];
    const boxes = [];
    let totalChecked = 0;
    for (const [, words] of lines) {
      if (words.length < 4) continue;
      totalChecked += words.length;
      const baselines = words.map(w => w.baseline);
      // Median baseline of the line
      const sorted = [...baselines].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      for (const { word, baseline } of words) {
        const dev = Math.abs(baseline - median);
        // Absolute tolerance of 2 pixels, or 10% of word height
        const tol = Math.max(2, (word.bbox.y1 - word.bbox.y0) * 0.1);
        if (dev > tol) {
          anomalies.push({ text: word.text, deviation: +dev.toFixed(1) });
          boxes.push([word.bbox.x0, word.bbox.y0,
                      word.bbox.x1 - word.bbox.x0, word.bbox.y1 - word.bbox.y0]);
        }
      }
    }
    if (totalChecked === 0) {
      return { score: 0, confidence: 0, findings: [], positives: [], triggered: false,
               boxes: [], measurements: { sample_size: 0 } };
    }
    const ratio = anomalies.length / totalChecked;
    const score = Math.min(100, ratio * 500);
    const triggered = score >= T.trigger;
    const confidence = totalChecked > 50 ? 75 : 45;

    const findings = [];
    const positives = [];
    if (triggered) {
      findings.push({
        category: "visual",
        severity: score >= T.strong ? "high" : "medium",
        code: "ALIGNMENT_DEVIATION",
        message: `${anomalies.length} of ${totalChecked} words deviate from their line baseline — possible retyped or pasted content.`,
        details: {
          anomalous_words: anomalies.length,
          total_words: totalChecked,
          examples: anomalies.slice(0, 8),
        },
      });
    } else {
      positives.push({
        category: "visual",
        code: "ALIGNMENT_CONSISTENT",
        message: `All ${totalChecked} text baselines align to their line median (${(ratio * 100).toFixed(1)}% deviation).`,
      });
    }
    return {
      score, confidence, findings, positives, triggered,
      boxes: triggered ? boxes.slice(0, 40) : [],
      measurements: {
        anomalous_words: anomalies.length, total_words: totalChecked,
        deviation_pct: +(ratio * 100).toFixed(1),
      },
    };
  };

  // ============================================================
  // Image edit detection — composite indicator from multiple image-level signals
  // This is a summary detector for the "Edit Detection" user-facing check.
  // It aggregates metadata editor traces + JPEG ghost + double-compression
  // into a single unified score for the UI.
  // ============================================================
  IF.imageEditDetection = function(metaFindings, jpegGhost, doubleComp) {
    const sigs = [];
    for (const f of (metaFindings || [])) {
      if (f.code === "META_EDITOR_TRACE") sigs.push({ source: "metadata", weight: 1.0, detail: f.details.value });
      else if (f.code === "META_TIMESTAMP_MISMATCH") sigs.push({ source: "timestamp", weight: 0.6, detail: `${f.details.created} → ${f.details.modified}` });
    }
    if (jpegGhost && jpegGhost.triggered) sigs.push({ source: "compression history", weight: 0.9 });
    if (doubleComp && doubleComp.triggered) sigs.push({ source: "double-compression", weight: 0.85 });

    const score = Math.min(100, sigs.reduce((a, s) => a + s.weight * 40, 0));
    const findings = [];
    const positives = [];
    if (sigs.length >= 2 || (sigs.length === 1 && sigs[0].weight >= 0.9)) {
      findings.push({
        category: "visual",
        severity: sigs.length >= 2 ? "high" : "medium",
        code: "IMG_EDIT_CONFIRMED",
        message: `${sigs.length} independent indicator${sigs.length === 1 ? "" : "s"} suggest this image was edited after capture.`,
        details: { signals: sigs },
      });
    } else if (sigs.length === 0) {
      positives.push({
        category: "visual",
        code: "IMG_EDIT_NONE",
        message: "No image-edit signals detected across metadata, compression history, or DCT analysis.",
      });
    }
    return { score, confidence: 70, findings, positives, signals: sigs };
  };


  IF.bandFor = function(s) {
    return s < 20 ? "GENUINE" : s < 45 ? "LOW" : s < 70 ? "SUSPICIOUS" : "HIGH_RISK";
  };
  IF.bandLabel = function(band) {
    return { GENUINE: "Genuine", LOW: "Minor concerns", SUSPICIOUS: "Suspicious", HIGH_RISK: "High risk" }[band];
  };
  IF.combine = function(m, v, c, d, a, weights) {
    const W = weights || IF.DEFAULT_WEIGHTS;
    // Pure weighted sum — no artificial overrides.
    // An exact duplicate already has d=100 contributing d*W.duplicate = 15 pts
    // which, combined with matching content/metadata, naturally produces a
    // high final score. Forcing a floor of 90 was causing false HIGH_RISK on
    // ALL re-uploads regardless of anything else.
    const t = m*W.metadata + v*W.visual + c*W.content + d*W.duplicate + a*W.ai;
    return Math.max(0, Math.min(100, t));
  };

  // ============================================================
  // Annotation — only draws boxes for TRIGGERED detectors
  // ============================================================
  IF.annotate = function(sourceCanvas, boxesByCat, subthresholdByCat) {
    const c = document.createElement("canvas");
    const W = sourceCanvas.width;
    const H = sourceCanvas.height;
    const meta = {
      ela:         { color: "#ef4444", label: "Compression anomaly (ELA)" },
      sensor:      { color: "#f97316", label: "Sensor pattern mismatch" },
      copy_move:   { color: "#eab308", label: "Copy-move duplicate" },
      typography:  { color: "#06b6d4", label: "Typography height anomaly" },
      ghost:       { color: "#a855f7", label: "JPEG ghost (compression history)" },
      alignment:   { color: "#ec4899", label: "Baseline alignment off" },
      qr_verified: { color: "#10b981", label: "QR code — verified" },
      qr_mismatch: { color: "#dc2626", label: "QR code — field mismatch" },
      pdf_edited:  { color: "#ff3d00", label: "PDF edited region (incremental save)" },
    };
    subthresholdByCat = subthresholdByCat || {};

    const activeCats      = Object.entries(boxesByCat).filter(([,b]) => b.length > 0);
    const activeSubCats   = Object.entries(subthresholdByCat).filter(([,b]) => b.length > 0);
    const totalBoxes      = activeCats.reduce((a,[,b]) => a + b.length, 0);
    const totalSubBoxes   = activeSubCats.reduce((a,[,b]) => a + b.length, 0);

    if (totalBoxes === 0 && totalSubBoxes === 0) {
      c.width = W; c.height = H;
      c.getContext("2d").drawImage(sourceCanvas, 0, 0);
      return { canvas: c, total_boxes: 0 };
    }

    const allLegendCats = [...new Set([...activeCats.map(([k]) => k), ...activeSubCats.map(([k]) => k)])];
    const LEGEND_ROW_H = 22;
    const legendH = allLegendCats.length * LEGEND_ROW_H + 16;
    c.width = W; c.height = H + legendH;
    const ctx = c.getContext("2d");
    ctx.drawImage(sourceCanvas, 0, 0);

    // Legend
    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0, H, W, legendH);
    allLegendCats.forEach((cat, i) => {
      const m = meta[cat] || { color: "#64748b", label: cat };
      const y = H + 8 + i * LEGEND_ROW_H + LEGEND_ROW_H / 2;
      ctx.fillStyle = m.color;
      ctx.beginPath(); ctx.arc(16, y, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e2e8f0";
      ctx.font = "12px -apple-system, system-ui, sans-serif";
      ctx.textBaseline = "middle";
      ctx.textAlign = "start";
      ctx.fillText(m.label, 30, y);
    });

    // Sub-threshold boxes — dashed border, no fill badge, lighter colour
    // These indicate "areas of interest" even when below the scoring trigger
    ctx.setLineDash([4, 4]);
    ctx.lineWidth = 1.5;
    for (const [cat, boxes] of activeSubCats) {
      const m = meta[cat] || { color: "#64748b" };
      ctx.strokeStyle = m.color + "99";  // ~60% opacity
      for (const [x, y, w, h] of boxes) {
        ctx.strokeRect(x+1, y+1, w-2, h-2);
        ctx.fillStyle = m.color + "11";
        ctx.fillRect(x+1, y+1, w-2, h-2);
      }
    }
    ctx.setLineDash([]);

    // Confirmed boxes — solid border, semi-transparent fill, numbered badge
    ctx.lineWidth = 2;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    let n = 0;
    for (const [cat, boxes] of activeCats) {
      const m = meta[cat] || { color: "#64748b" };
      ctx.strokeStyle = m.color;
      for (const [x, y, w, h] of boxes) {
        n++;
        ctx.strokeRect(x+1, y+1, w-2, h-2);
        ctx.fillStyle = m.color + "22";
        ctx.fillRect(x+1, y+1, w-2, h-2);
        if (w > 20 && h > 20 && n <= 40) {
          const BADGE_R = 9;
          const bx = Math.min(x + w - BADGE_R - 2, W - BADGE_R - 2);
          const by = Math.max(y + BADGE_R + 2, BADGE_R + 2);
          ctx.fillStyle = m.color;
          ctx.beginPath(); ctx.arc(bx, by, BADGE_R, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "white";
          ctx.font = "bold 10px -apple-system, system-ui, sans-serif";
          ctx.fillText(String(n), bx, by);
        }
      }
    }
    ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
    return { canvas: c, total_boxes: totalBoxes, subthreshold_boxes: totalSubBoxes };
  };

  // ============================================================
  // PIPELINE
  // ============================================================
  IF.runPipeline = async function(file, jobId, opts) {
    opts = opts || {};
    const checks = Object.assign({}, IF.DEFAULT_CHECKS, opts.checks || {});
    const weights = opts.weights || IF.DEFAULT_WEIGHTS;
    const onProgress = opts.onProgress || (() => {});
    const findings = [];
    const positives = [];
    const checkResults = {};
    const recordCheck = (key, label, score, confidence, triggered, detail) => {
      checkResults[key] = {
        label,
        score: Math.round(score || 0),
        confidence: Math.round(confidence || 0),
        triggered: !!triggered,
        valid_pct: Math.round(100 - (score || 0)),
        detail: detail || null,
      };
    };

    onProgress("classify", "Classifying file type");
    const fileType = await IF.classifyFile(file);
    if (fileType === "unknown") throw new Error(`Unsupported file type: ${file.name}`);

    onProgress("hash", "Computing cryptographic hashes");
    const sha = await IF.sha256(file);

    onProgress("render", "Rendering document page");
    let sourceCanvas;
    let pageHeightPt = 842;  // A4 default; overwritten for PDFs below
    if (fileType === "image") {
      const img = await IF.fileToImage(file);
      sourceCanvas = IF.imageToCanvas(img);
    } else {
      const { canvas, pageHeightPt: phpPt } = await IF.pdfFirstPageToCanvas(file, 1.8);
      sourceCanvas = canvas;
      if (phpPt) pageHeightPt = phpPt;
    }

    onProgress("phash", "Computing perceptual hash");
    const phash = IF.pHash(sourceCanvas);

    // ---- OCR (needed for text-dependent checks) ----
    let rawText = "";
    let ocrWords = [];
    const needsText = checks.ocr || checks.typography || checks.content
                      || checks.duplicate || checks.alignment || checks.benford;
    if (needsText) {
      onProgress("ocr", "Extracting text");
      if (fileType === "pdf_native") {
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        const chunks = [];
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const tc = await page.getTextContent();
          chunks.push(tc.items.map(it => it.str).join(" "));
        }
        rawText = chunks.join("\n");
      } else if (checks.ocr) {
        const { data } = await Tesseract.recognize(sourceCanvas, "eng", {
          logger: m => {
            if (m.status === "recognizing text")
              onProgress("ocr", `Extracting text — ${Math.round(m.progress*100)}%`);
          }
        });
        rawText = data.text || "";
        ocrWords = data.words || [];
      }
    }
    const fields = IF.parseFields(rawText);
    if (needsText) {
      recordCheck("ocr", "Text extraction (OCR)", 0,
                  rawText.length > 100 ? 90 : 40, false,
                  rawText.length > 0
                    ? `${rawText.length} chars extracted, ${ocrWords.length} words located`
                    : "no text extracted");
    }

    // ---- Metadata forensics ----
    let metaResult = { meta: {}, findings: [], positives: [], score: 0 };
    if (checks.metadata) {
      onProgress("metadata", "Inspecting file metadata");
      metaResult = await IF.analyseMetadata(file, fileType);
      findings.push(...metaResult.findings);
      positives.push(...metaResult.positives.map(p => ({...p, category:"metadata"})));
      recordCheck("metadata", "Metadata forensics",
                  metaResult.score, 85, metaResult.findings.length > 0,
                  metaResult.findings.length > 0
                    ? metaResult.findings[0].message
                    : "No editing traces in metadata");
    }

    // ---- PDF structural analysis ----
    let pdfStructResult = { score:0, confidence:0, findings:[], positives:[], triggered:false, measurements:{} };
    let pdfDeepResult   = { score:0, confidence:0, findings:[], positives:[], triggered:false, measurements:{signals_found:0} };
    if (checks.pdf_structure && fileType.startsWith("pdf")) {
      onProgress("pdf_structure", "Examining PDF edit history");
      pdfStructResult = await IF.pdfStructure(file, fileType);
      findings.push(...pdfStructResult.findings);
      positives.push(...pdfStructResult.positives);
      recordCheck("pdf_structure", "PDF edit-history analysis",
                  pdfStructResult.score, pdfStructResult.confidence, pdfStructResult.triggered,
                  pdfStructResult.measurements.incremental_saves > 0
                    ? `${pdfStructResult.measurements.incremental_saves} post-creation edit(s) detected`
                    : "Single-save PDF structure");

      // Deep object forensics — separate from %%EOF counting
      onProgress("pdf_deep", "Scanning PDF object structure");
      pdfDeepResult = await IF.pdfDeepAnalysis(file, fileType);
      findings.push(...pdfDeepResult.findings);
      positives.push(...pdfDeepResult.positives);
      if (pdfDeepResult.measurements.signals_found > 0 || pdfDeepResult.triggered) {
        recordCheck("pdf_deep", "PDF object forensics",
                    pdfDeepResult.score, pdfDeepResult.confidence, pdfDeepResult.triggered,
                    pdfDeepResult.triggered
                      ? `${pdfDeepResult.measurements.signals_found} editing indicator(s) found`
                      : "No object-level edit indicators");
      }
    } else if (checks.pdf_structure) {
      recordCheck("pdf_structure", "PDF edit-history analysis", 0, 0, false,
                  "Not applicable (image file)");
    }

    // ---- Visual / image forensics ----
    let elaResult        = { canvas:null, score:0, boxes:[], triggered:false, measurements:{}, subthreshold_boxes:[] };
    let sensorResult     = { score:0, boxes:[], triggered:false, measurements:{}, subthreshold_boxes:[] };
    let cmResult         = { score:0, boxes:[], triggered:false, measurements:{} };
    let typoResult       = { score:0, boxes:[], notes:[], triggered:false, measurements:{} };
    let jpegGhostResult  = { score:0, confidence:0, boxes:[], findings:[], positives:[], triggered:false, measurements:{} };
    let doubleCompResult = { score:0, confidence:0, findings:[], positives:[], triggered:false, measurements:{} };
    let alignResult      = { score:0, confidence:0, boxes:[], findings:[], positives:[], triggered:false, measurements:{} };

    // isJpegOrScan: true for JPEG images AND scanned PDFs.
    // Scanned PDFs are raster images embedded in a PDF container — they have
    // real compression history, sensor noise, and are susceptible to the same
    // image-level tampering as JPEGs. pdf_native documents (vector/digital) are
    // excluded because they render to a fresh canvas with no compression history.
    const isJpeg = await IF.isJpegFile(file, fileType);
    const isJpegOrScan = isJpeg || fileType === "pdf_scanned";

    if (checks.ela) {
      if (isJpegOrScan) {
        onProgress("ela", "Compression residual analysis (ELA)");
        elaResult = await IF.ela(sourceCanvas);
        if (elaResult.triggered) {
          findings.push({
            category:"visual",
            severity: elaResult.score >= IF.THRESHOLDS.ela.strong ? "high" : "medium",
            code:"VIS_ELA_ANOMALY",
            message:`Compression residuals elevated (${elaResult.score.toFixed(0)}/100) — possible content spliced from a different JPEG source.`,
            details: elaResult.measurements,
          });
        } else {
          positives.push({ category:"visual", code:"VIS_ELA_CLEAN",
            message:`Compression residuals within expected range (${elaResult.measurements.mean_residual}/25) — single compression history.` });
        }
        recordCheck("ela", "Compression residual (ELA)",
                    elaResult.score, 80, elaResult.triggered,
                    elaResult.triggered
                      ? `${elaResult.boxes.length} region(s) with elevated residuals`
                      : "Uniform compression across page");
      } else {
        recordCheck("ela", "Compression residual (ELA)", 0, 0, false,
                    "Not applicable — source file is not a JPEG");
      }
    }

    if (checks.sensor_pattern) {
      onProgress("sensor_pattern", "Sensor pattern analysis");
      sensorResult = IF.noiseInconsistency(sourceCanvas);
      if (sensorResult.triggered) {
        findings.push({
          category:"visual",
          severity: sensorResult.score >= IF.THRESHOLDS.sensor_pattern.strong ? "high" : "medium",
          code:"VIS_SENSOR_INCONSISTENT",
          message:`${sensorResult.measurements.anomalous_blocks} of ${sensorResult.measurements.total_blocks} blocks show inconsistent sensor-noise signature — possible composited regions.`,
          details: sensorResult.measurements,
        });
      } else {
        positives.push({ category:"visual", code:"VIS_SENSOR_UNIFORM",
          message:`Sensor noise pattern uniform (${sensorResult.measurements.anomaly_ratio}% outlier blocks, threshold ${sensorResult.measurements.threshold}%).` });
      }
      recordCheck("sensor_pattern", "Sensor pattern analysis",
                  sensorResult.score, 80, sensorResult.triggered,
                  sensorResult.triggered
                    ? `${sensorResult.measurements.anomalous_blocks} anomalous blocks`
                    : `Uniform noise across ${sensorResult.measurements.total_blocks || 0} blocks`);
    }

    if (checks.copy_move) {
      if (isJpeg) {
        // Copy-move is only forensically meaningful on photographic JPEG images.
        // On PDFs rendered to canvas, repeated structural elements (table borders,
        // background regions, template repeats) produce hundreds of false matches.
        onProgress("copy_move", "Copy-move forgery detection");
        cmResult = IF.copyMove(sourceCanvas);
        if (cmResult.triggered) {
          findings.push({
            category:"visual",
            severity: cmResult.score >= IF.THRESHOLDS.copy_move.strong ? "high" : "medium",
            code:"VIS_COPY_MOVE",
            message:`${cmResult.measurements.match_count} duplicated non-background blocks detected — regions of the image appear copied from elsewhere on the same page.`,
            details: cmResult.measurements,
          });
        } else {
          positives.push({ category:"visual", code:"VIS_COPY_MOVE_CLEAN",
            message:`No copy-move duplicates detected (${cmResult.measurements.match_count} content matches, threshold ${cmResult.measurements.threshold}).` });
        }
        recordCheck("copy_move", "Copy-move detection",
                    cmResult.score, 75, cmResult.triggered,
                    cmResult.triggered
                      ? `${cmResult.measurements.match_count} matching block pairs`
                      : "No block duplication detected");
      } else {
        // For PDFs and PNGs, document layout has intentionally repeated elements
        // (table borders, template structure) — copy-move has no forensic value here.
        positives.push({ category:"visual", code:"VIS_COPY_MOVE_NA",
          message:"Copy-move detection not applicable to PDF/vector documents — repeated structural elements are expected in document layouts." });
        recordCheck("copy_move", "Copy-move detection", 0, 0, false,
                    "Not applicable to PDF — use ELA and sensor checks for documents");
      }
    }

    if (checks.typography && ocrWords.length > 0) {
      onProgress("typography", "Typography coherence analysis");
      typoResult = IF.fontAnalysis(ocrWords);
      if (typoResult.triggered) {
        findings.push({
          category:"visual",
          severity: typoResult.score >= IF.THRESHOLDS.typography.strong ? "high" : "medium",
          code:"VIS_TYPOGRAPHY_INCONSISTENT",
          message:`${typoResult.measurements.anomalous_words} word(s) show character-height deviation from their line median — possible retyped or pasted text.`,
          details: { ...typoResult.measurements, examples: typoResult.notes },
        });
      } else if (typoResult.measurements.total_words > 0) {
        positives.push({ category:"visual", code:"VIS_TYPOGRAPHY_COHERENT",
          message:`Typography coherent across ${typoResult.measurements.total_words} words.` });
      }
      recordCheck("typography", "Typography coherence",
                  typoResult.score,
                  typoResult.measurements.total_words > 40 ? 80 : 50,
                  typoResult.triggered,
                  typoResult.triggered
                    ? `${typoResult.measurements.anomalous_words} words with size anomalies`
                    : `Consistent heights across ${typoResult.measurements.total_words || 0} words`);
    }

    // JPEG ghost and double-compression checks are only meaningful when the
    // SOURCE file is itself a JPEG. For PDFs and PNGs there's no original
    // compression history to recover; running these would produce noise.
    if (checks.jpeg_ghost) {
      if (isJpegOrScan) {
        onProgress("jpeg_ghost", "JPEG ghost analysis (multi-quality)");
        jpegGhostResult = await IF.jpegGhost(sourceCanvas);
        findings.push(...jpegGhostResult.findings);
        positives.push(...jpegGhostResult.positives);
        recordCheck("jpeg_ghost", "JPEG ghost analysis",
                    jpegGhostResult.score, jpegGhostResult.confidence, jpegGhostResult.triggered,
                    jpegGhostResult.triggered
                      ? `${Math.round(jpegGhostResult.measurements.secondary_freq*100)}% of blocks at divergent quality`
                      : `Uniform compression history (q=${jpegGhostResult.measurements.primary_quality})`);
      } else {
        recordCheck("jpeg_ghost", "JPEG ghost analysis", 0, 0, false,
                    "Not applicable — source file is not a JPEG");
      }
    }

    if (checks.double_compress) {
      if (isJpegOrScan) {
        onProgress("double_compress", "Double-compression detection");
        doubleCompResult = IF.doubleCompression(sourceCanvas);
        findings.push(...doubleCompResult.findings);
        positives.push(...doubleCompResult.positives);
        recordCheck("double_compress", "Double-compression",
                    doubleCompResult.score, doubleCompResult.confidence, doubleCompResult.triggered,
                    doubleCompResult.triggered
                      ? `Periodic histogram (ratio ${doubleCompResult.measurements.periodicity_ratio})`
                      : "No double-compression artifacts");
      } else {
        recordCheck("double_compress", "Double-compression", 0, 0, false,
                    "Not applicable — source file is not a JPEG");
      }
    }

    if (checks.alignment && ocrWords.length >= 20) {
      onProgress("alignment", "Baseline alignment analysis");
      alignResult = IF.alignmentAnalysis(ocrWords);
      findings.push(...alignResult.findings);
      positives.push(...alignResult.positives);
      recordCheck("alignment", "Baseline alignment",
                  alignResult.score, alignResult.confidence, alignResult.triggered,
                  alignResult.triggered
                    ? `${alignResult.measurements.anomalous_words} off-baseline words`
                    : `${alignResult.measurements.total_words} words on baseline grid`);
    }

    // Visual layer score = max of all triggered visual detectors
    const visualScore = Math.max(
      elaResult.triggered        ? elaResult.score        : 0,
      sensorResult.triggered     ? sensorResult.score     : 0,
      cmResult.triggered         ? cmResult.score         : 0,
      typoResult.triggered       ? typoResult.score       : 0,
      pdfStructResult.triggered  ? pdfStructResult.score  : 0,
      pdfDeepResult.triggered    ? pdfDeepResult.score    : 0,
      jpegGhostResult.triggered  ? jpegGhostResult.score  : 0,
      doubleCompResult.triggered ? doubleCompResult.score : 0,
      alignResult.triggered      ? alignResult.score      : 0,
    );

    // ---- Content-layer checks ----
    let contentResult = { score: 0, findings: [], positives: [] };
    if (checks.content) {
      onProgress("content", "Validating content fields");
      contentResult = IF.contentScore(fields);
      findings.push(...contentResult.findings);
      positives.push(...contentResult.positives.map(p => ({...p, category:"content"})));
      recordCheck("content", "Content & field validation",
                  contentResult.score, 90, contentResult.findings.length > 0,
                  contentResult.findings.length > 0
                    ? contentResult.findings[0].message
                    : "All field validations passed");
    }

    let benfordResult = { score:0, confidence:0, findings:[], positives:[], triggered:false, measurements:{} };
    if (checks.benford) {
      onProgress("benford", "Benford's Law analysis");
      benfordResult = IF.benfordCheck(fields.line_items);
      findings.push(...benfordResult.findings);
      positives.push(...benfordResult.positives);
      recordCheck("benford", "Benford's Law",
                  benfordResult.score, benfordResult.confidence, benfordResult.triggered,
                  benfordResult.confidence === 0
                    ? `Insufficient line items (${benfordResult.measurements.sample_size || 0}/${IF.THRESHOLDS.benford.minItems} needed)`
                    : benfordResult.triggered
                      ? `χ²=${benfordResult.measurements.chi_square} — unnatural distribution`
                      : `χ²=${benfordResult.measurements.chi_square} — natural distribution`);
    }

    let qrResult = {
      score:0, confidence:0, findings:[], positives:[], triggered:false,
      measurements:{}, qr_present:false, qr_data:null, qr_bbox:null, qr_parsed:null, qr_summary:null,
    };
    if (checks.qr_code) {
      onProgress("qr_code", "QR code authenticity check");
      qrResult = IF.qrAnalysis(sourceCanvas, fields);
      findings.push(...qrResult.findings);
      positives.push(...qrResult.positives);
      recordCheck("qr_code", "QR code authenticity",
                  qrResult.score, qrResult.confidence, qrResult.triggered,
                  !qrResult.qr_present
                    ? "No QR code found on document"
                    : qrResult.triggered
                      ? `QR payload contradicts ${qrResult.measurements.fields_mismatched} field(s)`
                      : qrResult.measurements.fields_matched >= 2
                        ? `QR verified against ${qrResult.measurements.fields_matched} OCR fields`
                        : "QR present, limited cross-reference data");
    }

    let dupResult = { score: 0, findings: [], positives: [], matches: [] };
    if (checks.duplicate) {
      onProgress("duplicate", "Checking against prior submissions");
      dupResult = await IF.checkDuplicates(sha, phash, fields, jobId, { skipDuplicate: opts.skipDuplicate });
      findings.push(...dupResult.findings);
      positives.push(...dupResult.positives.map(p => ({...p, category:"duplicate"})));
      recordCheck("duplicate", "Duplicate detection",
                  dupResult.score, 95, dupResult.findings.length > 0,
                  dupResult.findings.length > 0
                    ? dupResult.findings[0].message
                    : "No matches in archive");
    }

    let aiResult = { score:0, findings:[], positives:[], triggered:false, features:{}, measurements:{} };
    if (checks.ai_detect) {
      onProgress("ai_detect", "Synthetic document detection");
      const hasMeta = Object.keys(metaResult.meta || {}).length > 0;
      aiResult = IF.aiDetect(sourceCanvas, ocrWords, hasMeta);
      findings.push(...aiResult.findings);
      positives.push(...aiResult.positives.map(p => ({...p, category:"ai"})));
      recordCheck("ai_detect", "Synthetic document detection",
                  aiResult.triggered ? aiResult.score : 0, 70, aiResult.triggered,
                  aiResult.triggered
                    ? `Multiple AI-indicators (score ${aiResult.score.toFixed(0)})`
                    : "Real-world artifacts consistent with captured document");
    }

    // Composite "image was edited" indicator — aggregates metadata + ghost + double-compress
    const imgEditResult = IF.imageEditDetection(metaResult.findings, jpegGhostResult, doubleCompResult);

    // Content layer now includes QR + Benford results
    const contentCombined = Math.max(
      contentResult.score,
      qrResult.triggered ? qrResult.score : 0,
      benfordResult.triggered ? benfordResult.score : 0,
    );

    const total = IF.combine(
      metaResult.score, visualScore, contentCombined,
      dupResult.score, aiResult.triggered ? aiResult.score : 0,
      weights
    );
    const band = IF.bandFor(total);

    const highFindings = findings.filter(f => f.severity === "high" || f.severity === "critical");
    const verdict = {
      band, score: total, label: IF.bandLabel(band),
      headline:
        band === "GENUINE"    ? "No tampering indicators detected" :
        band === "LOW"        ? "Minor inconsistencies, likely genuine" :
        band === "SUSPICIOUS" ? "Multiple anomalies — manual review recommended" :
                                "Strong evidence of tampering",
      subhead:
        highFindings.length === 0
          ? `${positives.length} clean checks, ${findings.length} minor note${findings.length===1?"":"s"}`
          : `${highFindings.length} high-severity finding${highFindings.length===1?"":"s"}, ${positives.length} clean check${positives.length===1?"":"s"}`,
    };

    onProgress("highlight", "Annotating evidence");

    // For PDFs with edit indicators, extract the specific regions that were
    // modified from the incremental save sections. These become "pdf_edited"
    // boxes — distinct red-orange boxes showing exactly what changed.
    let pdfEditedBoxes = [];
    if (fileType.startsWith("pdf") && pdfDeepResult.triggered) {
      onProgress("highlight", "Locating modified regions in PDF…");
      pdfEditedBoxes = await IF.pdfIncrementalRegions(file, fileType, pageHeightPt, 1.8);
    }

    const boxesByCat = {
      ela:        elaResult.triggered        ? elaResult.boxes        : [],
      sensor:     sensorResult.triggered     ? sensorResult.boxes     : [],
      copy_move:  cmResult.triggered         ? cmResult.boxes         : [],
      typography: typoResult.triggered       ? typoResult.boxes       : [],
      ghost:      jpegGhostResult.triggered  ? jpegGhostResult.boxes  : [],
      alignment:  alignResult.triggered      ? alignResult.boxes      : [],
      pdf_edited: pdfEditedBoxes,   // regions from incremental save sections
    };
    if (qrResult.qr_present && qrResult.qr_bbox) {
      boxesByCat.qr_verified = qrResult.triggered ? [] : [qrResult.qr_bbox];
      boxesByCat.qr_mismatch = qrResult.triggered ? [qrResult.qr_bbox] : [];
    }
    // Sub-threshold boxes: show "areas of interest" even below trigger
    // (dashed border, lighter colour in annotated image)
    const subthresholdByCat = {
      ela:    !elaResult.triggered && (elaResult.subthreshold_boxes||[]).length > 0
                ? elaResult.subthreshold_boxes : [],
      sensor: !sensorResult.triggered && (sensorResult.subthreshold_boxes||[]).length > 0
                ? sensorResult.subthreshold_boxes : [],
    };
    const { canvas: annotatedCanvas, total_boxes, subthreshold_boxes: total_sub } =
      IF.annotate(sourceCanvas, boxesByCat, subthresholdByCat);

    const record = {
      id: jobId, filename: file.name, file_size: file.size, file_type: fileType,
      sha256: sha, phash,
      vendor: fields.vendor_name || null,
      amount: fields.amount || null,
      invoice_no: fields.invoice_number || null,
      invoice_date: fields.invoice_date || null,
      gstin: fields.gstin || null,
      risk_score: total,
      risk_band: band,
      breakdown: {
        metadata: metaResult.score,
        visual: visualScore,
        content: contentCombined,
        duplicate: dupResult.score,
        ai: aiResult.triggered ? aiResult.score : 0,
      },
      n_findings: findings.length,
      n_positives: positives.length,
      findings_by_severity: findings.reduce((a,f) => { a[f.severity] = (a[f.severity]||0)+1; return a; }, {}),
      created_at: new Date().toISOString(),
    };
    await IF.db.putJob(record);

    fields.raw_text = (fields.raw_text || "").slice(0, 4000);

    const report = {
      job_id: jobId,
      filename: file.name,
      file_type: fileType,
      file_size: file.size,
      verdict,
      risk_score: total,
      risk_band: band,
      breakdown: record.breakdown,
      extracted: fields,
      findings,
      positives,
      check_results: checkResults,
      annotated_data_url: annotatedCanvas.toDataURL("image/png"),
      ela_data_url:       elaResult.canvas ? elaResult.canvas.toDataURL("image/png") : null,
      source_data_url:    sourceCanvas.toDataURL("image/png"),
      metadata_raw:       metaResult.meta,
      annotation_count:   total_boxes,
      pdf_edited_regions: pdfEditedBoxes.length,
      subthreshold_count: total_sub || 0,
      qr_info: qrResult.qr_present ? {
        raw: qrResult.qr_data,
        parsed: qrResult.qr_parsed,
        summary: qrResult.qr_summary,
        jwt_format: qrResult.measurements.jwt_format,
        issuer: qrResult.measurements.issuer,
        matched_fields: qrResult.measurements.matched_fields || [],
        mismatched_fields: qrResult.measurements.mismatched_fields || [],
      } : null,
      benford_info: benfordResult.measurements.sample_size > 0 ? {
        chi_square: benfordResult.measurements.chi_square,
        sample_size: benfordResult.measurements.sample_size,
        distribution: benfordResult.measurements.distribution,
      } : null,
      pdf_structure_info: fileType.startsWith("pdf") ? pdfStructResult.measurements : null,
      image_edit_summary: imgEditResult,
      detector_measurements: {
        ela: elaResult.measurements,
        sensor_pattern: sensorResult.measurements,
        copy_move: cmResult.measurements,
        typography: typoResult.measurements,
        ai: aiResult.measurements,
        pdf_structure: pdfStructResult.measurements,
        jpeg_ghost: jpegGhostResult.measurements,
        double_compress: doubleCompResult.measurements,
        alignment: alignResult.measurements,
        benford: benfordResult.measurements,
        qr: qrResult.measurements,
      },
      sha256: sha, phash,
      checks_run: Object.keys(checks).filter(k => checks[k]),
      weights_used: weights,
      created_at: record.created_at,
    };
    await IF.db.putReport({ id: jobId, report });
    return report;
  };

  IF.exportJson = function(report) {
    const blob = new Blob([JSON.stringify(report, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `forensic_${report.job_id.slice(0,8)}.json`;
    a.click();
  };

  IF.exportPdf = function(report) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: "pt", format: "a4" });
    const bandColors = { GENUINE:[22,163,74], LOW:[202,138,4], SUSPICIOUS:[234,88,12], HIGH_RISK:[220,38,38] };
    const sevBg = { critical:[254,226,226], high:[255,237,213], medium:[254,249,195], low:[209,250,229] };

    let y = 40;
    pdf.setFontSize(20); pdf.setTextColor(15,23,42);
    pdf.text("Forensic Examination Report", 40, y); y += 24;
    pdf.setFontSize(10); pdf.setTextColor(100,116,139);
    pdf.text(`Job: ${report.job_id}`, 40, y); y += 14;
    pdf.text(`File: ${report.filename} (${report.file_type})`, 40, y); y += 14;
    pdf.text(`Generated: ${new Date().toISOString().replace("T"," ").slice(0,19)} UTC`, 40, y); y += 24;

    const [br,bg,bb] = bandColors[report.risk_band] || [100,116,139];
    pdf.setFillColor(br,bg,bb); pdf.rect(40, y, 515, 58, "F");
    pdf.setTextColor(255); pdf.setFontSize(11);
    pdf.text("VERDICT", 52, y + 18);
    pdf.setFontSize(16);
    pdf.text(report.verdict.headline, 52, y + 38);
    pdf.setFontSize(10);
    pdf.text(`Score: ${report.risk_score.toFixed(0)}/100 · ${report.verdict.subhead}`, 52, y + 52);
    y += 74;

    pdf.setTextColor(15,23,42);
    pdf.setFontSize(13); pdf.text("Risk breakdown", 40, y); y += 16;
    pdf.setFontSize(9);
    const bd = report.breakdown;
    const rows = [
      ["Metadata",   bd.metadata,  "20%"],
      ["Visual",     bd.visual,    "30%"],
      ["Content",    bd.content,   "25%"],
      ["Duplicate",  bd.duplicate, "15%"],
      ["AI signals", bd.ai,        "10%"],
    ];
    for (const [layer, s, w] of rows) {
      pdf.setTextColor(15,23,42);
      pdf.text(layer, 40, y + 11);
      pdf.text(`${s.toFixed(0)}/100`, 200, y + 11);
      pdf.text(w, 260, y + 11);
      pdf.setFillColor(226,232,240); pdf.rect(300, y + 5, 200, 8, "F");
      pdf.setFillColor(15,23,42); pdf.rect(300, y + 5, Math.min(200, s*2), 8, "F");
      y += 18;
    }
    y += 8;

    pdf.setFontSize(13); pdf.text("Extracted fields", 40, y); y += 16;
    pdf.setFontSize(9);
    const ex = report.extracted;
    for (const [k, v] of [
      ["Invoice #",  ex.invoice_number || "—"],
      ["Date",       ex.invoice_date || "—"],
      ["Vendor",     ex.vendor_name || "—"],
      ["GSTIN",      ex.gstin || "—"],
      ["Amount",     ex.amount != null ? ex.amount.toFixed(2) : "—"],
      ["Line items", String((ex.line_items||[]).length)],
    ]) {
      pdf.setTextColor(100,116,139);
      pdf.text(k, 40, y + 11);
      pdf.setTextColor(15,23,42);
      pdf.text(String(v).slice(0, 80), 130, y + 11);
      y += 14;
    }
    y += 8;

    // Clean checks (positives)
    if (report.positives && report.positives.length) {
      if (y > 680) { pdf.addPage(); y = 40; }
      pdf.setFontSize(13); pdf.text(`Clean checks (${report.positives.length})`, 40, y); y += 16;
      pdf.setFontSize(9);
      for (const p of report.positives) {
        if (y > 770) { pdf.addPage(); y = 40; }
        pdf.setFillColor(220,252,231);
        const msg = pdf.splitTextToSize(p.message, 480);
        const h = 14 + msg.length * 10;
        pdf.rect(40, y, 515, h, "F");
        pdf.setTextColor(22,101,52); pdf.setFont(undefined, "bold");
        pdf.text(`✓ ${p.category || "check"} · ${p.code}`, 48, y + 10);
        pdf.setTextColor(15,23,42); pdf.setFont(undefined, "normal");
        pdf.text(msg, 48, y + 22);
        y += h + 3;
      }
      y += 8;
    }

    // Findings
    if (y > 680) { pdf.addPage(); y = 40; }
    pdf.setFontSize(13); pdf.text(`Findings (${report.findings.length})`, 40, y); y += 16;
    pdf.setFontSize(9);
    if (report.findings.length === 0) {
      pdf.setTextColor(15,23,42);
      pdf.setFillColor(220,252,231); pdf.rect(40, y, 515, 28, "F");
      pdf.setFont(undefined, "bold");
      pdf.text("✓  No anomalies detected.", 48, y + 18);
      pdf.setFont(undefined, "normal");
      y += 38;
    } else {
      const order = { critical:0, high:1, medium:2, low:3 };
      const sorted = [...report.findings].sort((a,b) => (order[a.severity]||9) - (order[b.severity]||9));
      for (const f of sorted) {
        if (y > 770) { pdf.addPage(); y = 40; }
        const [r,g,b] = sevBg[f.severity] || [241,245,249];
        pdf.setFillColor(r,g,b);
        const msg = pdf.splitTextToSize(f.message, 480);
        const h = 14 + msg.length * 10;
        pdf.rect(40, y, 515, h, "F");
        pdf.setFont(undefined, "bold"); pdf.setTextColor(15,23,42);
        pdf.text(`[${f.severity.toUpperCase()}] ${f.category} · ${f.code}`, 48, y + 10);
        pdf.setFont(undefined, "normal");
        pdf.text(msg, 48, y + 22);
        y += h + 3;
      }
    }

    if (report.annotated_data_url && report.annotation_count > 0) {
      pdf.addPage();
      pdf.setFontSize(13); pdf.text("Annotated evidence", 40, 40);
      pdf.setFontSize(9); pdf.setTextColor(100,116,139);
      pdf.text(`${report.annotation_count} region${report.annotation_count===1?"":"s"} of interest highlighted`, 40, 55);
      try { pdf.addImage(report.annotated_data_url, "PNG", 40, 70, 515, 700, undefined, "FAST"); } catch {}
    }
    if (report.ela_data_url) {
      pdf.addPage();
      pdf.setFontSize(13); pdf.text("Error Level Analysis", 40, 40);
      pdf.setFontSize(9); pdf.setTextColor(100,116,139);
      pdf.text("Amplified recompression residual — bright clusters suggest varying compression history.", 40, 55);
      try { pdf.addImage(report.ela_data_url, "PNG", 40, 70, 515, 700, undefined, "FAST"); } catch {}
    }
    pdf.save(`forensic_${report.job_id.slice(0,8)}.pdf`);
  };

  // ============================================================
  // Excel export — comprehensive multi-sheet workbook
  // Sheets: Executive Summary, Check Results, Findings, Verified Clean,
  // Extracted Fields, Detector Measurements, QR Payload, Benford Distribution,
  // Risk Breakdown, Methodology
  // ============================================================
  IF.exportExcel = function(report) {
    if (!window.XLSX) {
      alert("Excel export library not loaded.");
      return;
    }
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();
    const bandLabels = {
      GENUINE: "Genuine — no tampering indicators",
      LOW: "Low risk — minor inconsistencies",
      SUSPICIOUS: "Suspicious — manual review recommended",
      HIGH_RISK: "High risk — strong evidence of tampering",
    };
    // ---- 1. Executive Summary ----
    const summary = [
      ["FORENSIC EXAMINATION REPORT"],
      [""],
      ["Generated", new Date().toISOString().replace("T"," ").slice(0,19) + " UTC"],
      ["Job ID", report.job_id],
      [""],
      ["FILE"],
      ["Filename", report.filename],
      ["File type", report.file_type.replace("_"," ")],
      ["File size", `${(report.file_size/1024).toFixed(1)} KB`],
      ["SHA-256", report.sha256 || ""],
      ["Perceptual hash", report.phash || ""],
      [""],
      ["VERDICT"],
      ["Band", bandLabels[report.risk_band] || report.risk_band],
      ["Risk score", `${report.risk_score.toFixed(1)} / 100`],
      ["Headline", report.verdict.headline],
      ["Detail", report.verdict.subhead],
      [""],
      ["COUNTS"],
      ["Findings (concerns)", report.findings.length],
      ["  — Critical", (report.findings.filter(f => f.severity === "critical")).length],
      ["  — High", (report.findings.filter(f => f.severity === "high")).length],
      ["  — Medium", (report.findings.filter(f => f.severity === "medium")).length],
      ["  — Low", (report.findings.filter(f => f.severity === "low")).length],
      ["Verified clean checks", (report.positives || []).length],
      ["Evidence regions in image", report.annotation_count || 0],
      ["Checks run", report.checks_run.length],
      [""],
      ["KEY EXTRACTED FIELDS"],
      ["Invoice number", report.extracted.invoice_number || "— not extracted"],
      ["Date", report.extracted.invoice_date || "— not extracted"],
      ["Vendor", report.extracted.vendor_name || "— not extracted"],
      ["GSTIN", report.extracted.gstin || "— not extracted"],
      ["Amount", report.extracted.amount != null ? report.extracted.amount.toFixed(2) : "— not extracted"],
      ["Line items count", (report.extracted.line_items||[]).length],
    ];
    const summarySheet = XLSX.utils.aoa_to_sheet(summary);
    summarySheet["!cols"] = [{ wch: 30 }, { wch: 60 }];
    // Merge title row
    summarySheet["!merges"] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 1 } }];
    XLSX.utils.book_append_sheet(wb, summarySheet, "Executive Summary");

    // ---- 2. Check Results ----
    const cr = report.check_results || {};
    const checkRows = [
      ["CHECK RESULTS — ALL FORENSIC DETECTORS"],
      [""],
      ["Check", "Label", "Score (0-100)", "Validity %", "Confidence %",
       "Triggered", "Verdict", "Detail"],
    ];
    const checkInterpretation = (c) => {
      if (c.confidence === 0) return "Not applicable / insufficient data";
      if (c.triggered) {
        if (c.score >= 70) return "CONCERN — strong anomaly detected";
        return "NOTE — mild anomaly detected";
      }
      return "CLEAN — within expected range";
    };
    for (const [key, c] of Object.entries(cr)) {
      checkRows.push([
        key,
        c.label,
        c.score,
        c.valid_pct,
        c.confidence,
        c.triggered ? "Yes" : "No",
        checkInterpretation(c),
        c.detail || "",
      ]);
    }
    const checkSheet = XLSX.utils.aoa_to_sheet(checkRows);
    checkSheet["!cols"] = [{wch:18},{wch:32},{wch:14},{wch:12},{wch:14},{wch:10},{wch:36},{wch:48}];
    checkSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:7} }];
    XLSX.utils.book_append_sheet(wb, checkSheet, "Check Results");

    // ---- 3. Findings (concerns) ----
    const order = { critical:0, high:1, medium:2, low:3 };
    const sortedFindings = [...report.findings].sort((a,b) => (order[a.severity]||9) - (order[b.severity]||9));
    const findingRows = [
      ["FINDINGS — DETECTED ANOMALIES"],
      [""],
      ["#", "Severity", "Category", "Code", "Message", "Technical details"],
    ];
    if (sortedFindings.length === 0) {
      findingRows.push(["", "—", "—", "—", "No anomalies detected across all enabled checks.", ""]);
    } else {
      sortedFindings.forEach((f, i) => {
        findingRows.push([
          i + 1, f.severity.toUpperCase(), f.category, f.code, f.message,
          f.details ? JSON.stringify(f.details) : "",
        ]);
      });
    }
    const findingSheet = XLSX.utils.aoa_to_sheet(findingRows);
    findingSheet["!cols"] = [{wch:4},{wch:10},{wch:12},{wch:28},{wch:70},{wch:80}];
    findingSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:5} }];
    XLSX.utils.book_append_sheet(wb, findingSheet, "Findings");

    // ---- 4. Verified Clean (positives) ----
    const positiveRows = [
      ["VERIFIED CLEAN CHECKS — PASSED VALIDATIONS"],
      [""],
      ["#", "Category", "Code", "Message"],
    ];
    const positives = report.positives || [];
    if (positives.length === 0) {
      positiveRows.push(["", "—", "—", "No checks passed without notes."]);
    } else {
      positives.forEach((p, i) => positiveRows.push([i + 1, p.category || "", p.code, p.message]));
    }
    const posSheet = XLSX.utils.aoa_to_sheet(positiveRows);
    posSheet["!cols"] = [{wch:4},{wch:12},{wch:32},{wch:90}];
    posSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:3} }];
    XLSX.utils.book_append_sheet(wb, posSheet, "Verified Clean");

    // ---- 5. Extracted Fields ----
    const extracted = report.extracted || {};
    const extractedRows = [
      ["EXTRACTED INVOICE DATA"],
      [""],
      ["Field", "Extracted value"],
      ["Invoice number", extracted.invoice_number || ""],
      ["Date", extracted.invoice_date || ""],
      ["Vendor name", extracted.vendor_name || ""],
      ["GSTIN", extracted.gstin || ""],
      ["Amount", extracted.amount != null ? extracted.amount : ""],
      [""],
      ["LINE ITEMS"],
      ["#", "Description", "Amount"],
    ];
    const lineItems = extracted.line_items || [];
    if (lineItems.length === 0) {
      extractedRows.push(["", "— no line items extracted", ""]);
    } else {
      lineItems.forEach((li, i) => extractedRows.push([i + 1, li.description, li.amount]));
      // Compute sum for reference
      const sum = lineItems.reduce((a, li) => a + (li.amount || 0), 0);
      extractedRows.push(["", "Sum of line items", +sum.toFixed(2)]);
      if (extracted.amount) {
        extractedRows.push(["", "Stated invoice total", extracted.amount]);
        extractedRows.push(["", "Difference", +(extracted.amount - sum).toFixed(2)]);
      }
    }
    const extSheet = XLSX.utils.aoa_to_sheet(extractedRows);
    extSheet["!cols"] = [{wch:22},{wch:60},{wch:14}];
    extSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:2} }];
    XLSX.utils.book_append_sheet(wb, extSheet, "Extracted Fields");

    // ---- 6. Risk Breakdown ----
    const bd = report.breakdown || {};
    const w = report.weights_used || IF.DEFAULT_WEIGHTS;
    const breakdownRows = [
      ["RISK SCORE BREAKDOWN"],
      [""],
      ["Layer", "Score (0-100)", "Weight", "Weighted contribution", "Interpretation"],
      ["Metadata",   bd.metadata  || 0, w.metadata,  +((bd.metadata  || 0)*w.metadata ).toFixed(2), bd.metadata  >= 45 ? "Concerning" : bd.metadata  >= 20 ? "Mild" : "Clean"],
      ["Visual",     bd.visual    || 0, w.visual,    +((bd.visual    || 0)*w.visual   ).toFixed(2), bd.visual    >= 45 ? "Concerning" : bd.visual    >= 20 ? "Mild" : "Clean"],
      ["Content",    bd.content   || 0, w.content,   +((bd.content   || 0)*w.content  ).toFixed(2), bd.content   >= 45 ? "Concerning" : bd.content   >= 20 ? "Mild" : "Clean"],
      ["Duplicate",  bd.duplicate || 0, w.duplicate, +((bd.duplicate || 0)*w.duplicate).toFixed(2), bd.duplicate >= 45 ? "Concerning" : bd.duplicate >= 20 ? "Mild" : "Clean"],
      ["AI signals", bd.ai        || 0, w.ai,        +((bd.ai        || 0)*w.ai       ).toFixed(2), bd.ai        >= 45 ? "Concerning" : bd.ai        >= 20 ? "Mild" : "Clean"],
      [""],
      ["TOTAL", "", "", +report.risk_score.toFixed(2), report.verdict.headline],
    ];
    const breakdownSheet = XLSX.utils.aoa_to_sheet(breakdownRows);
    breakdownSheet["!cols"] = [{wch:14},{wch:16},{wch:10},{wch:22},{wch:22}];
    breakdownSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:4} }];
    XLSX.utils.book_append_sheet(wb, breakdownSheet, "Risk Breakdown");

    // ---- 7. Detector Measurements (raw technical) ----
    const measurementRows = [
      ["DETECTOR MEASUREMENTS — RAW TECHNICAL DATA"],
      [""],
      ["Detector", "Measurement", "Value"],
    ];
    const dm = report.detector_measurements || {};
    for (const [det, m] of Object.entries(dm)) {
      if (!m || Object.keys(m).length === 0) continue;
      for (const [k, v] of Object.entries(m)) {
        measurementRows.push([det, k.replace(/_/g, " "),
          typeof v === "object" ? JSON.stringify(v) : String(v)]);
      }
      measurementRows.push(["", "", ""]);
    }
    const measSheet = XLSX.utils.aoa_to_sheet(measurementRows);
    measSheet["!cols"] = [{wch:20},{wch:28},{wch:60}];
    measSheet["!merges"] = [{ s: {r:0,c:0}, e: {r:0,c:2} }];
    XLSX.utils.book_append_sheet(wb, measSheet, "Measurements");

    // ---- 8. QR Payload (conditional) ----
    if (report.qr_info) {
      const qr = report.qr_info;
      const qrRows = [
        ["QR CODE AUTHENTICITY ANALYSIS"],
        [""],
        ["Attribute", "Value"],
        ["Format", qr.jwt_format ? "Signed JWT (e-invoice format)" : "Plain JSON or text"],
        ["Issuer", qr.issuer || "—"],
        ["Matched fields vs OCR", (qr.matched_fields || []).join(", ") || "none"],
        ["Mismatched fields vs OCR", (qr.mismatched_fields || []).join(", ") || "none"],
        [""],
        ["DECODED PAYLOAD"],
      ];
      if (qr.parsed) {
        qrRows.push(["Key", "Value"]);
        for (const [k, v] of Object.entries(qr.parsed).slice(0, 50)) {
          qrRows.push([k, typeof v === "object" ? JSON.stringify(v) : String(v)]);
        }
      } else {
        qrRows.push(["Raw payload", qr.summary || qr.raw || ""]);
      }
