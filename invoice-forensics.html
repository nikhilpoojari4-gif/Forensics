// JOB DETAIL — the investigator's workspace
// ============================================================
function JobDetail({ jobId, onBack }) {
  const [report, setReport] = useState(null);
  const [notFound, setNotFound] = useState(false);
  const [tab, setTab] = useState("annotated");
  const [rescanning, setRescanning] = useState(false);
  const [rescanProgress, setRescanProgress] = useState("");
  const rescanInputRef = useRef(null);

  useEffect(() => {
    (async () => {
      const entry = await window.IF.db.getReport(jobId);
      if (entry) setReport(entry.report); else setNotFound(true);
    })();
  }, [jobId]);

  const handleRescan = async (e) => {
    // Capture file reference SYNCHRONOUSLY before any await —
    // React nullifies the synthetic event after the first tick.
    const file = e.target.files?.[0];
    e.target.value = "";   // reset input so same file can be picked again
    if (!file) return;
    if (!confirm(`Re-examine "${file.name}"?\n\nAll forensic checks will be re-run. The existing result will be replaced. Duplicate detection is skipped.`)) return;
    setRescanning(true);
    setRescanProgress("Preparing…");
    try {
      // Delete old records BEFORE running so the pipeline's DB reads see a clean slate
      await window.IF.db.deleteJob(jobId);
      await window.IF.db.deleteReport(jobId);
      const weights = (await window.IF.db.getSetting("weights"))?.value || window.IF.DEFAULT_WEIGHTS;
      const newReport = await window.IF.runPipeline(file, jobId, {
        weights,
        skipDuplicate: true,
        onProgress: (_, msg) => setRescanProgress(msg || "Examining…"),
      });
      setReport(newReport);        // update in place — no reload needed
      setTab("annotated");
      setRescanProgress("");
    } catch (err) {
      alert("Re-examination failed: " + (err.message || String(err)));
    } finally {
      setRescanning(false);
      setRescanProgress("");
    }
  };

  if (notFound) {
    return (
      <Card padding="p-12" className="text-center">
        <div className="text-slate-400 mx-auto w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center mb-3">
          <Icon name="file" size={22} />
        </div>
        <h2 className="text-lg font-semibold mb-1">Report not available</h2>
        <p className="text-slate-500 text-sm mb-4">Full reports with annotated images are stored per-browser. Re-upload the file to regenerate.</p>
        <Btn variant="secondary" onClick={onBack}>Back to archive</Btn>
      </Card>
    );
  }
  if (!report) return <div className="p-10 text-center text-slate-500">Loading…</div>;

  const v = report.verdict;
  const bandStyle = BAND_STYLES[v.band];
  const isGenuine = v.band === "GENUINE";
  const isConcerning = v.band === "SUSPICIOUS" || v.band === "HIGH_RISK";

  // Sort findings by severity
  const sevOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  const sortedFindings = [...report.findings].sort((a,b) => (sevOrder[a.severity]||9) - (sevOrder[b.severity]||9));

  // Group positives by category
  const positivesByCategory = {};
  for (const p of (report.positives || [])) {
    if (!positivesByCategory[p.category]) positivesByCategory[p.category] = [];
    positivesByCategory[p.category].push(p);
  }

  return (
    <div className="space-y-4">
      {/* Back link */}
      <button onClick={onBack} className="inline-flex items-center gap-1 text-sm text-slate-500 hover:text-slate-900 transition">
        <Icon name="chevron" size={14} className="rotate-180" /> Back to archive
      </button>

      {/* VERDICT HERO */}
      <div className={`${bandStyle.bg} rounded-xl border-2 ${v.band === "GENUINE" ? "border-emerald-300" :
                    v.band === "LOW" ? "border-yellow-300" :
                    v.band === "SUSPICIOUS" ? "border-orange-300" : "border-red-300"} p-6`}>
        <div className="flex items-start gap-5 flex-wrap">
          {/* Verdict icon */}
          <div className={`flex-shrink-0 w-16 h-16 rounded-full flex items-center justify-center ${
            isGenuine ? "bg-emerald-500" :
            v.band === "LOW" ? "bg-yellow-500" :
            v.band === "SUSPICIOUS" ? "bg-orange-500" : "bg-red-600"
          } text-white`}>
            <Icon name={isGenuine ? "check" : "alert"} size={32} className="stroke-[3]" />
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-[11px] font-semibold uppercase tracking-widest text-slate-600 mb-1">Examination verdict</div>
            <h1 className={`text-[26px] font-bold tracking-tight leading-tight ${bandStyle.text}`}>
              {v.headline}
            </h1>
            <div className="flex items-center gap-3 mt-2.5 flex-wrap">
              <VerdictBadge band={v.band} score={v.score} size="lg" />
              <span className="text-sm text-slate-700">{v.subhead}</span>
            </div>
          </div>
          {/* Actions */}
          <div className="flex flex-col gap-2">
            <Btn variant="default" onClick={() => window.IF.exportPdf(report)}>
              <Icon name="download" size={14} /> PDF report
            </Btn>
            <Btn variant="secondary" onClick={() => window.IF.exportExcel(report)}>
              <Icon name="download" size={14} /> Excel workbook
            </Btn>
            <Btn variant="secondary" onClick={() => window.IF.exportPpt(report)}>
              <Icon name="download" size={14} /> PowerPoint deck
            </Btn>
            <Btn variant="ghost" size="sm" onClick={() => window.IF.exportJson(report)}>
              JSON data
            </Btn>
            <div className="border-t border-slate-200 pt-2 mt-1">
              {/* Hidden file input — triggered programmatically from button */}
              <input ref={rescanInputRef} type="file" hidden
                     accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp,.webp"
                     onChange={handleRescan} />
              <Btn variant="subtle" size="sm"
                   className="w-full justify-center"
                   disabled={rescanning}
                   onClick={() => rescanInputRef.current?.click()}>
                <Icon name="zap" size={13} />
                {rescanning ? (rescanProgress || "Examining…") : "Re-examine"}
              </Btn>
              {rescanning && (
                <div className="text-[10px] text-blue-600 text-center mt-1 leading-tight italic">
                  {rescanProgress}
                </div>
              )}
              {!rescanning && (
                <div className="text-[10px] text-slate-400 text-center mt-1 leading-tight">
                  Re-runs all checks · skips duplicate detection
                </div>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* File context strip */}
      <Card padding="p-3">
        <div className="flex items-center gap-4 text-sm flex-wrap">
          <div className="text-slate-500 flex-shrink-0"><Icon name="file" size={16} /></div>
          <div className="min-w-0 flex-1">
            <div className="font-medium text-slate-900 truncate">{report.filename}</div>
            <div className="text-[11px] text-slate-500 mt-0.5 flex items-center gap-2 flex-wrap">
              <span className="uppercase tracking-wider">{report.file_type.replace("_", " ")}</span>
              <span>·</span>
              <span className="tabular-nums">{(report.file_size/1024).toFixed(1)} KB</span>
              <span>·</span>
              <span className="mono">{report.job_id.slice(0,12)}…</span>
              <span>·</span>
              <span>Checks: {report.checks_run.length}</span>
              {report.annotation_count > 0 && (
                <>
                  <span>·</span>
                  <span className="text-orange-600 font-medium">{report.annotation_count} evidence region{report.annotation_count===1?"":"s"}</span>
                </>
              )}
            </div>
          </div>
        </div>
      </Card>

      {/* RISK BREAKDOWN + EXTRACTED (side by side) */}
      <div className="grid lg:grid-cols-5 gap-4">
        {/* Breakdown */}
        <Card className="lg:col-span-3">
          <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-1">How the risk score was calculated</div>
          <div className="text-[11px] text-slate-500 mb-4 leading-relaxed">
            The document is examined across five categories. Each category gets its own score from 0 (clean) to 100 (strong anomaly). The final verdict score is a weighted average of these five, using the weights shown.
          </div>
          <BreakdownChart breakdown={report.breakdown} weights={report.weights_used || window.IF.DEFAULT_WEIGHTS} total={report.risk_score} />
        </Card>
        {/* Extracted */}
        <Card className="lg:col-span-2">
          <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-3">Extracted data</div>
          <dl className="space-y-2 text-sm">
            <FieldRow label="Invoice #" value={report.extracted.invoice_number} mono />
            <FieldRow label="Date" value={report.extracted.invoice_date} />
            <FieldRow label="Vendor" value={report.extracted.vendor_name} />
            <FieldRow label="GSTIN" value={report.extracted.gstin} mono />
            <FieldRow label="Amount" value={report.extracted.amount != null ? report.extracted.amount.toFixed(2) : null} align="right" />
            <FieldRow label="Line items" value={(report.extracted.line_items||[]).length || null} />
          </dl>
        </Card>
      </div>

      {/* FINDINGS SECTION */}
      <div className="grid lg:grid-cols-5 gap-4">
        {/* Left: findings (concerning) */}
        <Card className="lg:col-span-3" padding="p-0">
          <div className="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="alert" size={16} className={sortedFindings.length > 0 ? "text-red-600" : "text-emerald-600"} />
              <div className="text-xs uppercase font-semibold text-slate-700 tracking-wider">
                Findings ({sortedFindings.length})
              </div>
            </div>
          </div>
          <div className="p-5 space-y-2">
            {sortedFindings.length === 0 ? (
              <div className="text-center py-8">
                <div className="mx-auto w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 mb-2">
                  <Icon name="check" size={24} className="stroke-[3]" />
                </div>
                <div className="text-sm font-medium text-emerald-700">No anomalies detected</div>
                <div className="text-xs text-slate-500 mt-1">Every check came back clean. See the verified checks below.</div>
              </div>
            ) : (
              sortedFindings.map((f, i) => <FindingCard key={i} finding={f} />)
            )}
          </div>
        </Card>

        {/* Right: positives (verified clean checks) */}
        <Card className="lg:col-span-2" padding="p-0">
          <div className="px-5 py-3 border-b border-slate-200 flex items-center justify-between">
            <div className="flex items-center gap-2">
              <Icon name="check" size={16} className="text-emerald-600" />
              <div className="text-xs uppercase font-semibold text-slate-700 tracking-wider">
                Verified clean ({(report.positives||[]).length})
              </div>
            </div>
          </div>
          <div className="p-5">
            {(report.positives || []).length === 0 ? (
              <div className="text-center py-6 text-xs text-slate-500 italic">No checks passed without notes.</div>
            ) : (
              <ul className="space-y-2">
                {(report.positives || []).map((p, i) => <PositiveRow key={i} positive={p} />)}
              </ul>
            )}
          </div>
        </Card>
      </div>

      {/* VISUAL EVIDENCE */}
      {(report.annotated_data_url || report.ela_data_url || report.source_data_url) && (
        <Card padding="p-0">
          <div className="px-5 py-3 border-b border-slate-200 flex items-center justify-between flex-wrap gap-2">
            <div className="text-xs uppercase font-semibold text-slate-700 tracking-wider">Visual evidence</div>
            <div className="flex gap-1 bg-slate-100 p-1 rounded-md">
              {report.annotated_data_url && (
                <button onClick={() => setTab("annotated")}
                        className={`px-3 py-1 text-xs rounded transition ${
                          tab==="annotated" ? "bg-white text-slate-900 shadow-sm font-medium" : "text-slate-600 hover:text-slate-900"
                        }`}>
                  {report.annotation_count > 0 ? `Annotated (${report.annotation_count})` : "Annotated"}
                </button>
              )}
              {report.ela_data_url && (
                <button onClick={() => setTab("ela")}
                        className={`px-3 py-1 text-xs rounded transition ${
                          tab==="ela" ? "bg-white text-slate-900 shadow-sm font-medium" : "text-slate-600 hover:text-slate-900"
                        }`}>
                  ELA visualization
                </button>
              )}
              {report.source_data_url && (
                <button onClick={() => setTab("source")}
                        className={`px-3 py-1 text-xs rounded transition ${
                          tab==="source" ? "bg-white text-slate-900 shadow-sm font-medium" : "text-slate-600 hover:text-slate-900"
                        }`}>
                  Source image
                </button>
              )}
            </div>
          </div>
          <div className="bg-slate-100 p-4">
            {tab === "annotated" && report.annotation_count === 0 ? (
              <div className="bg-white rounded-lg p-12 text-center">
                <div className="mx-auto w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 mb-3">
                  <Icon name="check" size={28} className="stroke-[3]" />
                </div>
                <h3 className="text-base font-semibold text-emerald-700 mb-1">No regions of interest</h3>
                <p className="text-sm text-slate-600 max-w-md mx-auto">
                  Every visual forensic detector came back below trigger threshold. The document shows no signs of digital manipulation.
                </p>
                <div className="mt-4">
                  <img src={report.source_data_url} alt="source"
                       className="max-w-full max-h-[500px] mx-auto rounded border border-slate-300" />
                </div>
              </div>
            ) : (
              <img src={tab === "annotated" ? report.annotated_data_url :
                        tab === "ela" ? report.ela_data_url : report.source_data_url}
                   alt={tab}
                   className="max-w-full max-h-[900px] mx-auto block rounded border border-slate-300 bg-white" />
            )}
          </div>
          {tab === "ela" && (
            <div className="px-5 py-3 bg-slate-50 text-xs text-slate-600 border-t border-slate-200">
              <strong className="text-slate-700">How to read:</strong> Uniform gray tones mean consistent compression across the whole page (clean). Bright clusters suggest regions were saved at different qualities — a hallmark of splicing.
            </div>
          )}
          {tab === "annotated" && report.annotation_count > 0 && (
            <div className="px-5 py-3 bg-slate-50 text-xs text-slate-600 border-t border-slate-200 flex items-center gap-4 flex-wrap">
              <span><strong>Legend:</strong></span>
              <LegendDot color="#ef4444" label="ELA — possible splicing" />
              <LegendDot color="#f97316" label="Noise inconsistency" />
              <LegendDot color="#eab308" label="Copy-move duplicates" />
              <LegendDot color="#06b6d4" label="Font height anomaly" />
            </div>
          )}
        </Card>
      )}

      {/* DETECTOR MEASUREMENTS (technical) */}
      {report.detector_measurements && Object.values(report.detector_measurements).some(m => Object.keys(m).length > 0) && (
        <details className="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <summary className="cursor-pointer px-5 py-3 text-xs uppercase font-semibold text-slate-700 tracking-wider hover:bg-slate-50 flex items-center justify-between">
            <span>Technical measurements</span>
            <Icon name="chevron" size={14} />
          </summary>
          <div className="p-5 border-t border-slate-200 bg-slate-50">
            <div className="grid md:grid-cols-2 gap-4">
              {Object.entries(report.detector_measurements).map(([det, m]) => {
                if (!m || Object.keys(m).length === 0) return null;
                return (
                  <div key={det} className="bg-white rounded-md border border-slate-200 p-3">
                    <div className="text-[10px] uppercase font-semibold tracking-wider text-slate-500 mb-2">{det.replace("_", "-")}</div>
                    <dl className="space-y-1 text-xs">
                      {Object.entries(m).map(([k, v]) => (
                        <div key={k} className="flex justify-between gap-3">
                          <dt className="text-slate-500">{k.replace(/_/g, " ")}</dt>
                          <dd className="text-slate-900 mono tabular-nums text-right">{typeof v === "object" ? JSON.stringify(v) : String(v)}</dd>
                        </div>
                      ))}
                    </dl>
                  </div>
                );
              })}
            </div>
          </div>
        </details>
      )}

      {report.metadata_raw && Object.keys(report.metadata_raw).length > 0 && (
        <details className="bg-white rounded-lg border border-slate-200 overflow-hidden">
          <summary className="cursor-pointer px-5 py-3 text-xs uppercase font-semibold text-slate-700 tracking-wider hover:bg-slate-50 flex items-center justify-between">
            <span>Raw metadata</span>
            <Icon name="chevron" size={14} />
          </summary>
          <pre className="p-4 text-[10px] overflow-x-auto bg-slate-950 text-slate-200 mono leading-relaxed">
{JSON.stringify(report.metadata_raw, null, 2)}
          </pre>
        </details>
      )}
    </div>
  );
}

function BreakdownChart({ breakdown, weights, total }) {
  const W = weights || { metadata:0.20, visual:0.30, content:0.25, duplicate:0.15, ai:0.10 };
  const items = [
    { key: "metadata",  label: "File metadata",          desc: "Editor software traces, timestamps, producer info",
      value: breakdown.metadata,  weight: W.metadata },
    { key: "visual",    label: "Image forensics",        desc: "Pixel-level tampering signals (compression, sensor noise, copy-move, etc.)",
      value: breakdown.visual,    weight: W.visual },
    { key: "content",   label: "Field validation",       desc: "GSTIN checksum, total reconciliation, QR authenticity, Benford's law",
      value: breakdown.content,   weight: W.content },
    { key: "duplicate", label: "Duplicate check",        desc: "Match against previously examined invoices",
      value: breakdown.duplicate, weight: W.duplicate },
    { key: "ai",        label: "Synthetic signals",      desc: "Indicators of AI-generated or fully-digital fabrication",
      value: breakdown.ai,        weight: W.ai },
  ];
  return (
    <div className="space-y-3.5">
      {items.map(it => {
        const v = it.value || 0;
        const contribution = v * it.weight;
        const severityColor =
          v >= 70 ? "bg-red-500"    :
          v >= 45 ? "bg-orange-500" :
          v >= 20 ? "bg-yellow-500" :
                    "bg-emerald-500";
        const statusLabel =
          v >= 70 ? { text: "Concern", cls: "text-red-700" }    :
          v >= 45 ? { text: "Notable", cls: "text-orange-700" } :
          v >= 20 ? { text: "Mild",    cls: "text-yellow-700" } :
                    { text: "Clean",   cls: "text-emerald-700" };
        return (
          <div key={it.key}>
            <div className="flex items-baseline justify-between gap-3 mb-1">
              <div className="min-w-0 flex-1">
                <div className="flex items-baseline gap-2 flex-wrap">
                  <span className="font-medium text-slate-900 text-sm">{it.label}</span>
                  <span className={`text-[10px] uppercase font-semibold tracking-wider ${statusLabel.cls}`}>{statusLabel.text}</span>
                </div>
                <div className="text-[11px] text-slate-500 mt-0.5 leading-snug">{it.desc}</div>
              </div>
              <div className="flex-shrink-0 text-right">
                <div className="tabular-nums text-sm font-semibold text-slate-900">{v.toFixed(0)}<span className="text-slate-400 font-normal text-[11px]"> / 100</span></div>
                <div className="text-[10px] text-slate-500 tabular-nums">× {(it.weight*100).toFixed(0)}% = {contribution.toFixed(1)} pts</div>
              </div>
            </div>
            <div className="h-1.5 bg-slate-100 rounded-full overflow-hidden">
              <div className={`h-full ${severityColor} transition-all duration-500 ease-out rounded-full`}
                   style={{ width: `${Math.min(100, v)}%` }} />
            </div>
          </div>
        );
      })}
      {typeof total === "number" && (
        <div className="pt-3 mt-2 border-t border-slate-200 flex items-baseline justify-between">
          <span className="text-sm font-semibold text-slate-900">Final verdict score</span>
          <span className="tabular-nums text-lg font-bold text-slate-900">{total.toFixed(1)}<span className="text-slate-400 font-normal text-sm"> / 100</span></span>
        </div>
      )}
    </div>
  );
}

function FieldRow({ label, value, mono, align }) {
  return (
    <div className="flex items-baseline justify-between gap-3 py-1.5 border-b border-slate-100 last:border-0">
      <dt className="text-slate-500 text-xs uppercase tracking-wider font-medium flex-shrink-0">{label}</dt>
      <dd className={`${mono ? "mono" : ""} ${align === "right" ? "text-right" : "text-left"} truncate ${value ? "text-slate-900" : "text-slate-400 italic"}`}>
        {value != null ? value : "not extracted"}
      </dd>
    </div>
  );
}

function FindingCard({ finding }) {
  const [open, setOpen] = useState(false);
  const s = SEV_STYLES[finding.severity] || SEV_STYLES.low;
  return (
    <div className={`border-l-4 ${s.border} ${s.bg} rounded-r-md p-3`}>
      <div className="flex items-start gap-2.5">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1.5 flex-wrap">
            <SeverityPill severity={finding.severity} />
            <span className="text-[10px] uppercase tracking-wider text-slate-500 font-medium">{finding.category}</span>
            <span className="text-[10px] mono text-slate-400">{finding.code}</span>
          </div>
          <div className="text-sm text-slate-900 leading-relaxed">{finding.message}</div>
          {finding.details && Object.keys(finding.details).length > 0 && (
            <button onClick={() => setOpen(o => !o)}
                    className="text-[11px] text-slate-500 hover:text-slate-900 mt-1 inline-flex items-center gap-1">
              {open ? "hide" : "show"} technical details
              <Icon name="chevron" size={11} className={`transition-transform ${open ? "rotate-90" : ""}`} />
            </button>
          )}
          {open && (
            <pre className="mt-2 p-2 bg-slate-900 text-slate-200 rounded text-[10px] mono overflow-x-auto leading-relaxed">
{JSON.stringify(finding.details, null, 2)}
            </pre>
          )}
        </div>
      </div>
    </div>
  );
}

function PositiveRow({ positive }) {
  return (
    <li className="flex items-start gap-2 text-sm">
      <div className="flex-shrink-0 w-4 h-4 rounded-full bg-emerald-500 text-white flex items-center justify-center mt-0.5">
        <Icon name="check" size={10} className="stroke-[4]" />
      </div>
      <div className="flex-1">
        <div className="text-slate-800 leading-snug">{positive.message}</div>
        <div className="text-[10px] mono text-slate-400 mt-0.5">{positive.category} · {positive.code}</div>
      </div>
    </li>
  );
}

function LegendDot({ color, label }) {
  return (
    <span className="inline-flex items-center gap-1.5">
      <span className="w-2.5 h-2.5 rounded-sm" style={{ background: color }} />
      <span>{label}</span>
    </span>
  );
}

function SettingsPage({ onCleared }) {
  const [weights, setWeights] = useState(window.IF.DEFAULT_WEIGHTS);
  const [saved, setSaved] = useState(false);
  const [advancedOpen, setAdvancedOpen] = useState(false);

  useEffect(() => {
    (async () => {
      const r = await window.IF.db.getSetting("weights");
      if (r?.value) setWeights(r.value);
    })();
  }, []);

  const sum = Object.values(weights).reduce((a,b) => a+b, 0);
  const update = (k, v) => setWeights(w => ({ ...w, [k]: Math.max(0, Math.min(1, v)) }));
  const save = async () => {
    await window.IF.db.setSetting("weights", weights);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };
  const reset = () => setWeights(window.IF.DEFAULT_WEIGHTS);
  const clearAll = async () => {
    if (!confirm("Delete ALL cases, reports, and settings? This cannot be undone.")) return;
    await window.IF.db.clearJobs();
    await window.IF.db.clearReports();
    if (onCleared) onCleared();
    alert("All data cleared.");
  };

  // Detect if weights have been changed from default
  const D = window.IF.DEFAULT_WEIGHTS;
  const isDefault = Math.abs(weights.metadata - D.metadata) < 0.001
                 && Math.abs(weights.visual - D.visual) < 0.001
                 && Math.abs(weights.content - D.content) < 0.001
                 && Math.abs(weights.duplicate - D.duplicate) < 0.001
                 && Math.abs(weights.ai - D.ai) < 0.001;

  return (
    <>
      <PageHeader eyebrow="Configuration" title="Settings"
                  subtitle="Manage local storage and (optionally) tune scoring" />

      <Card className="mb-4 bg-slate-50 border-slate-200">
        <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-2">About this tool</div>
        <p className="text-sm text-slate-700 leading-relaxed mb-2">
          <strong>Everything runs locally in your browser.</strong> Files are never uploaded; OCR runs on a WebAssembly build of Tesseract that caches after first load. Your case archive lives in this browser's IndexedDB and stays on your device.
        </p>
        <p className="text-sm text-slate-600 leading-relaxed">
          The tool runs up to 15 independent forensic checks grouped into five risk categories. Each check has its own calibrated trigger threshold — below threshold, the check is surfaced as "verified clean" rather than a low-confidence finding. This prevents genuine documents from being flagged by normal variation (paper grain, JPEG edge effects, etc.).
        </p>
      </Card>

      <Card className="mb-4">
        <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-3">Local storage</div>
        <p className="text-sm text-slate-500 mb-4 leading-relaxed">
          All cases, reports, and preferences are stored in this browser's IndexedDB. Clearing data here is permanent — there's no remote backup because nothing was ever uploaded.
        </p>
        <Btn variant="danger" size="md" onClick={clearAll}>
          <Icon name="trash" size={14} /> Clear all archived cases
        </Btn>
      </Card>

      {/* Advanced settings — collapsed by default */}
      <Card padding="p-0">
        <button
          onClick={() => setAdvancedOpen(o => !o)}
          className="w-full flex items-center justify-between gap-3 px-5 py-3 hover:bg-slate-50 transition text-left"
        >
          <div className="flex items-center gap-2.5">
            <Icon name="settings" size={16} className="text-slate-500" />
            <div>
              <div className="text-sm font-semibold text-slate-900">Advanced: scoring weights</div>
              <div className="text-[11px] text-slate-500">
                {isDefault
                  ? "Currently using default weights (recommended)"
                  : <span className="text-amber-700">Custom weights — differs from defaults</span>}
              </div>
            </div>
          </div>
          <Icon name="chevron" size={14} className={`text-slate-400 transition-transform ${advancedOpen ? "rotate-90" : ""}`} />
        </button>

        {advancedOpen && (
          <div className="border-t border-slate-200 p-5 bg-slate-50/50">
            {/* Why this exists */}
            <div className="mb-4">
              <div className="text-xs uppercase font-semibold text-slate-500 tracking-wider mb-2">What are scoring weights?</div>
              <p className="text-sm text-slate-700 leading-relaxed mb-3">
                Each forensic check produces its own 0–100 risk score. The final verdict score is a weighted average of these scores across the five categories below. The weights determine how much each category contributes to the total.
              </p>
              <p className="text-sm text-slate-700 leading-relaxed">
                <strong>You almost certainly don't need to change these.</strong> The defaults are calibrated to match how a human auditor would weigh each kind of evidence. Changing them is useful only if your audit has a specific focus — e.g., raising "Duplicate check" weight when you're specifically hunting for duplicate-submission fraud.
              </p>
            </div>

            <div className="bg-white border border-slate-200 rounded-md p-3 mb-4">
              <div className="text-xs font-semibold text-slate-700 mb-2">Worked example — what changes when you move a slider</div>
              <div className="text-[11px] text-slate-600 leading-relaxed space-y-1">
                <div>Imagine a document where image forensics scored 80/100 and everything else scored 0:</div>
                <div className="mono text-[11px] text-slate-700 ml-3">
                  <div>· At default 30% image weight: <strong>80 × 0.30 = 24 points</strong> → verdict band "Low risk"</div>
                  <div>· If you raise image weight to 50%: <strong>80 × 0.50 = 40 points</strong> → verdict band "Low risk" (boundary)</div>
                  <div>· If you raise image weight to 80%: <strong>80 × 0.80 = 64 points</strong> → verdict band "Suspicious"</div>
                </div>
                <div className="text-slate-500 italic mt-1.5">Same evidence, different verdict — that's why default weights matter for consistency.</div>
              </div>
            </div>

            {/* Sliders */}
            {[
              { key: "metadata",  label: "File metadata",       desc: "Editor software traces, timestamp mismatches, missing producer info" },
              { key: "visual",    label: "Image forensics",     desc: "Pixel-level signals: ELA, sensor noise, copy-move, typography, JPEG ghost, alignment, PDF edits" },
              { key: "content",   label: "Field validation",    desc: "GSTIN checksum, total reconciliation, QR authenticity, Benford's Law on line items" },
              { key: "duplicate", label: "Duplicate check",     desc: "Hash match, perceptual similarity, vendor+amount fuzzy match against prior archive" },
              { key: "ai",        label: "Synthetic signals",   desc: "Indicators of AI-generated or fully-digital fabricated documents" },
            ].map(({key, label, desc}) => {
              const v = weights[key] || 0;
              return (
                <div key={key} className="mb-3 last:mb-0 bg-white border border-slate-200 rounded-md p-3">
                  <div className="flex justify-between items-baseline mb-1">
                    <label className="font-medium text-slate-900 text-sm">{label}</label>
                    <span className="mono text-slate-900 font-semibold tabular-nums text-sm">{(v*100).toFixed(0)}%</span>
                  </div>
                  <div className="text-[11px] text-slate-500 mb-2">{desc}</div>
                  <input type="range" min="0" max="1" step="0.01" value={v}
                         onChange={(e) => update(key, parseFloat(e.target.value))}
                         className="w-full accent-slate-900" />
                </div>
              );
            })}

            <div className="flex items-center gap-3 mt-4">
              <div className={`text-xs px-2.5 py-1.5 rounded-md ${
                Math.abs(sum - 1) < 0.01
                  ? "bg-emerald-50 text-emerald-700"
                  : "bg-amber-50 text-amber-700"
              }`}>
                Sum: {(sum*100).toFixed(0)}%
                {Math.abs(sum - 1) >= 0.01 && " — should total 100% for the math to work correctly"}
              </div>
              <div className="flex gap-2 ml-auto items-center">
                <Btn variant="secondary" size="md" onClick={reset}>Reset to defaults</Btn>
                <Btn variant="default" size="md" onClick={save}>Save weights</Btn>
                {saved && (
                  <span className="inline-flex items-center gap-1 text-xs text-emerald-700">
                    <Icon name="check" size={12} /> Saved
                  </span>
                )}
              </div>
            </div>
          </div>
        )}
      </Card>
    </>
  );
}

// ============================================================
function App() {
  const [page, setPage] = useState("dashboard");
  const [currentJobId, setCurrentJobId] = useState(null);
  const [counts, setCounts] = useState({ total: 0, genuine: 0, concerning: 0 });
  const [refreshKey, setRefreshKey] = useState(0);

  const refreshCounts = useCallback(async () => {
    const jobs = await window.IF.db.allJobs();
    const genuine = jobs.filter(j => j.risk_band === "GENUINE").length;
    const concerning = jobs.filter(j => j.risk_band === "SUSPICIOUS" || j.risk_band === "HIGH_RISK").length;
    setCounts({ total: jobs.length, genuine, concerning });
  }, []);
  useEffect(() => { refreshCounts(); }, [refreshCounts, refreshKey]);

  const goto = (p) => { setPage(p); setCurrentJobId(null); };
  const viewJob = (id) => { setCurrentJobId(id); setPage("detail"); };

  let content;
  if (page === "detail" && currentJobId) content = <JobDetail jobId={currentJobId} onBack={() => goto("history")} />;
  else if (page === "dashboard") content = <Dashboard onViewJob={viewJob} onGoto={goto} />;
  else if (page === "upload") content = <UploadPage onViewJob={viewJob} onDone={() => setRefreshKey(k => k+1)} />;
  else if (page === "history") content = <HistoryPage onViewJob={viewJob} refreshKey={refreshKey} />;
  else if (page === "settings") content = <SettingsPage onCleared={() => setRefreshKey(k => k+1)} />;

  return (
    <div className="min-h-screen flex bg-slate-50 text-slate-900">
      <Sidebar page={page} onPage={goto} counts={counts} />
      <main className="flex-1 min-w-0">
        <div className="max-w-[1400px] mx-auto px-6 py-6">
          {content}
        </div>
      </main>
    </div>
  );
}

function boot() {
  document.getElementById("boot").classList.add("hidden");
  setTimeout(() => document.getElementById("boot").remove(), 500);
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}

if (window.IF && window.React && window.ReactDOM) boot();
else window.addEventListener("if-libs-ready", boot);
</script>

<script>
window.addEventListener("if-libs-ready", function() {
  try {
    const src = document.getElementById("app-source").textContent;
    const compiled = Babel.transform(src, { presets: ["react"] }).code;
    new Function(compiled)();
  } catch (err) {
    document.getElementById("boot-sub").textContent = "App failed to start";
    const eb = document.getElementById("boot-err");
    eb.style.display = "block";
    eb.innerHTML = `<strong>Script error:</strong><br>${err.message}<br><br>See console for details.`;
    console.error("Boot failure", err);
  }
});
</script>
</body>
</html>
